<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>软件库 · 实用工具分享站</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --sub: #555;
      --border: #e0e0e0;
      --accent: #1e3c72;
      --btn: #ff6b35;
      --nav-bg: #1e3c72;
      --nav-text: #ffffff;
      --radius: 8px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
.top-nav {
  background: var(--nav-bg); color: var(--nav-text);
  padding: 10px 16px; display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; position: sticky; top: 0; z-index: 100;
}
.top-nav a { color: var(--nav-text); text-decoration: none; font-size: 13px; }
.top-nav a:hover { opacity: 0.8; }
.logo { font-size: 18px; font-weight: 700; margin-right: auto; }
.nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
.nav-links a { padding: 4px 8px; border-radius: 20px; transition: 0.2s; font-size: 13px; }
.nav-links a.active { background: rgba(255,255,255,0.2); }.search-box {
  padding: 6px 10px; border: none; border-radius: 20px; outline: none;
  font-size: 13px; width: 160px; max-width: 100%;
}
.container { max-width: 800px; margin: 16px auto; padding: 0 16px; }
.card {
  background: var(--card); border-radius: var(--radius);
  padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 12px; transition: 0.2s;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.card-icon { width: 48px; height: 48px; border-radius: 8px; background: #eee; flex-shrink: 0; }
.card-info { flex: 1; }
.card-info h3 { font-size: 16px; margin-bottom: 4px; }
.card-info .desc { font-size: 13px; color: var(--sub); }.download-btn {
  background: var(--btn); color: white; border: none;
  padding: 6px 16px; border-radius: 20px; font-weight: 600; cursor: pointer;
  text-decoration: none; font-size: 13px; white-space: nowrap;
}
.download-btn:hover { opacity: 0.9; }
.sidebar-card {
  background: var(--card); border-radius: var(--radius);
  padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow);
}
.sidebar-card h3 { font-size: 15px; margin-bottom: 8px; color: var(--accent); }
.footer { text-align: center; color: #999; font-size: 12px; margin-top: 20px; padding: 16px; }
.hidden { display: none !important; }
.announcement {
  background: #fff8e1; border-left: 4px solid var(--btn);
  padding: 10px 14px; margin-bottom: 16px; border-radius: 4px;
}
.badge { background: var(--btn); color: white; border-radius: 4px; padding: 2px 8px; font-size: 11px; }
.type-badge { border-radius: 4px; padding: 2px 8px; font-size: 11px; color: white; }
.badge-software { background: #4caf93; }
.badge-tool { background: #7386d5; }
.badge-notice { background: #f0a86e; }    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); display: flex; align-items: center;
      justify-content: center; z-index: 200;
    }
    .modal-content {
      background: var(--card); border-radius: var(--radius);
      padding: 20px; width: 90%; max-width: 400px;
    }
    .modal-content input { width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid var(--border); border-radius: 4px; }
    .modal-content button { padding: 8px 16px; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head><body>
  <div class="top-nav">
    <div class="logo">软件库</div>
    <div class="nav-links" id="navBar">
      <a href="#" data-category="all" class="active">全部</a>
      <a href="#" data-category="software">软件</a>
      <a href="#" data-category="tool">工具</a>
      <a href="#" data-category="personal">个人</a>
    </div>
    <input type="text" class="search-box" id="searchInput" placeholder="搜索软件..." oninput="filterSoftwares()">
    <a href="./chat.html" style="background:var(--btn);padding:4px 12px;border-radius:20px;">聊天室</a>
    <a href="mailto:dghkkppp@qq.com">私信</a>
    <a href="./login.html" id="loginLink">登录</a>
    <span id="userDisplay" class="hidden"></span>
    <a href="#" id="logoutLink" class="hidden">退出</a>
  </div><div class="container">
  <div class="announcement" id="announcement">
    🔥 欢迎来到软件库！这里收集了实用软件和工具。登录后可下载，聊天室支持积分、等级、文件上传，快来体验吧！
  </div>
  <div id="list"></div>

  <!-- 侧边栏区域（显示在列表下方） -->
  <div class="sidebar-card">
    <h3>社区统计</h3>
    <div id="statsContent">加载中...</div>
  </div>
  <div class="sidebar-card">
    <h3>最新通知</h3>
    <div id="sidebarNotices">暂无通知</div>
  </div>
  <div class="sidebar-card">
    <h3>联系管理员</h3>
    <p style="font-size:13px;">如有问题，请发送邮件至：<br><a href="mailto:dghkkppp@qq.com">dghkkppp@qq.com</a></p>
  </div>
  </div><div id="aboutModal" class="modal hidden" onclick="hideAbout()">
  <div class="modal-content" onclick="event.stopPropagation()" style="text-align:center;">
    <h3>软件库</h3><p>测试版 1.1</p>
    <p>管理员: zeruan</p>
    <button onclick="hideAbout()">关闭</button>
  </div>
</div>
<div class="footer" id="secretTrigger">✔zeci rjk</div><script>
  const API = 'https://api.github.com/repos/ctctycyc/softlib/issues';
  const ADMIN_USERNAMES = ['zeruan'];
  let allSoftwares = [], currentCategory = 'all', adminToken = localStorage.getItem('adminToken');

  // 管理员激活
  let clickCount = 0;
  document.getElementById('secretTrigger').addEventListener('click', () => {
    clickCount++;
    if (clickCount >= 5) {
      clickCount = 0;
      const input = prompt('管理员登录：请输入 GitHub Token');
      if (input && input.trim()) verifyAdminToken(input.trim());
    }
    setTimeout(() => clickCount = 0, 2000);
  });
  async function verifyAdminToken(token) {
    try {
      const res = await fetch('https://api.github.com/user', { headers: { Authorization: `token ${token}` } });
      if (res.ok) {
        adminToken = token; localStorage.setItem('adminToken', adminToken);
        alert('管理功能已激活！'); document.getElementById('adminArea')?.classList.remove('hidden');
      } else alert('Token 无效');
    } catch (e) { alert('网络错误'); }
  }// 导航
document.getElementById('navBar').addEventListener('click', e => {
  if (e.target.tagName === 'A') {
    e.preventDefault();
    document.querySelectorAll('#navBar a').forEach(a => a.classList.remove('active'));
    e.target.classList.add('active');
    currentCategory = e.target.dataset.category;
    renderFilteredSoftwares();
  }
});

function getDefaultIcon(sw) {
  if (sw.isNotice) return '<span class="type-badge badge-notice">公告</span>';
  if (sw.isTool) return '<span class="type-badge badge-tool">工具</span>';
  return '<span class="type-badge badge-software">软件</span>';
  }async function loadSoftwares() {
  try {
    const res = await fetch(API + '?labels=approved&state=open&sort=created&direction=desc&per_page=100');
    const issues = await res.json();
    allSoftwares = issues.map(issue => {
      let body = issue.body || '', downloadUrl = '', description = '';
      const lines = body.split('\n');
      for (let line of lines) {
        if (line.trim().startsWith('http')) { if (!/\.(png|jpg|jpeg|gif|svg|ico)(\?.*)?$/.test(line.trim())) downloadUrl = line.trim(); }
        else if (line.trim() && !description) description = line.trim();
      }
      const labels = issue.labels.map(l => l.name);
      const isNotice = labels.includes('notice'), isTool = labels.includes('tool');
      return { id: issue.number, title: issue.title, description, downloadUrl: isNotice ? '' : downloadUrl, created_at: issue.created_at, isNotice, isTool, isSoftware: !isNotice && !isTool };
    });
    allSoftwares.sort((a, b) => a.isNotice ? -1 : 1);
    updateStats();
    renderFilteredSoftwares();
  } catch(e) { document.getElementById('list').innerHTML = '<p>加载失败</p>'; }
}

function updateStats() {
  const softwareCount = allSoftwares.filter(s => s.isSoftware && !s.isNotice).length;
  const toolCount = allSoftwares.filter(s => s.isTool).length;
  const noticeCount = allSoftwares.filter(s => s.isNotice).length;
  document.getElementById('statsContent').innerHTML = `
    <p>软件: ${softwareCount}</p><p>工具: ${toolCount}</p><p>公告: ${noticeCount}</p>
  `;
              }function renderFilteredSoftwares() {
  let filtered = allSoftwares;
  if (currentCategory === 'all') filtered = allSoftwares.filter(sw => !sw.isTool);
  else if (currentCategory === 'software') filtered = allSoftwares.filter(sw => sw.isSoftware && !sw.isNotice);
  else if (currentCategory === 'tool') filtered = allSoftwares.filter(sw => sw.isTool);
  else if (currentCategory === 'personal') {
    document.getElementById('list').innerHTML = `
      <div class="card" style="justify-content:center;">
        <div>
          <h3>关于软件库</h3>
          <p>联系邮箱：dghkkppp@qq.com</p>
          <button class="download-btn" onclick="showAbout()">查看详情</button>
        </div>
      </div>`;
    return;
  }
  renderSoftwares(filtered);
}function renderSoftwares(softwares) {
  const listDiv = document.getElementById('list');
  if (softwares.length === 0) { listDiv.innerHTML = '<div class="card" style="justify-content:center;">暂无内容</div>'; return; }
  let html = '';
  softwares.forEach(sw => {
    const iconHtml = '<div class="card-icon" style="display:flex;align-items:center;justify-content:center;">' + getDefaultIcon(sw) + '</div>';
    let downloadBtn = '';
    if (sw.downloadUrl && !sw.isNotice) {
      if (localStorage.getItem('authToken')) {
        downloadBtn = `<a class="download-btn" href="${sw.downloadUrl}" target="_blank">下载</a>`;
      } else {
        downloadBtn = `<a class="download-btn" href="javascript:void(0)" onclick="alert('请先登录后再下载'); location.href='./login.html';" style="background:#aaa;">登录后下载</a>`;
      }
    }
    const date = sw.created_at ? new Date(sw.created_at).toLocaleDateString('zh-CN') : '';
    html += `<div class="card">
      ${iconHtml}
      <div class="card-info">
        <h3>${sw.title}</h3>
        <div class="desc">${sw.description || ''}</div>
        <div style="font-size:12px;color:#888;">${date}</div>
      </div>
      ${downloadBtn}
    </div>`;
  });
  listDiv.innerHTML = html;
}// 通知
async function loadNotices() {
  try {
    const res = await fetch(API + '?labels=notice&state=open&sort=created&direction=desc&per_page=10');
    const issues = await res.json();
    const list = document.getElementById('noticeList');
    if (issues.length === 0) { list.innerHTML = '<div class="card">暂无通知</div>'; return; }
    let html = '';
    issues.forEach(issue => {
      const date = new Date(issue.created_at).toLocaleDateString('zh-CN');
      html += `<div class="card notice"><h3>${issue.title}</h3><div class="desc">${issue.body ? issue.body.substring(0,200) : ''}</div><div class="meta"><span>${date}</span></div></div>`;
    });
    list.innerHTML = html;
  } catch(e) { document.getElementById('noticeList').innerHTML = '<p>加载通知失败</p>'; }
}
function toggleNotice() {
  const list = document.getElementById('noticeList');
  const btn = document.getElementById('noticeToggleBtn');
  if (list.classList.contains('hidden')) { loadNotices(); list.classList.remove('hidden'); btn.textContent = '收起通知'; }
  else { list.classList.add('hidden'); btn.textContent = '查看通知'; }
}async function loadSidebarNotices() {
  try {
    const res = await fetch(API + '?labels=notice&state=open&sort=created&direction=desc&per_page=3');
    const issues = await res.json();
    const div = document.getElementById('sidebarNotices');
    if (issues.length === 0) { div.innerHTML = '<p style="font-size:13px;">暂无通知</p>'; return; }
    let html = '<ul style="font-size:13px; padding-left:18px;">';
    issues.forEach(issue => { html += `<li><a href="#" onclick="alert('${issue.title}')" style="color:var(--accent);">${issue.title}</a></li>`; });
    html += '</ul>';
    div.innerHTML = html;
  } catch(e) { document.getElementById('sidebarNotices').innerHTML = '<p>加载失败</p>'; }
}
loadSidebarNotices();// 登录状态
function updateAuthUI() {
  const email = localStorage.getItem('authEmail');
  const token = localStorage.getItem('authToken');
  const loginLink = document.getElementById('loginLink');
  const userDisplay = document.getElementById('userDisplay');
  const logoutLink = document.getElementById('logoutLink');
  if (email && token) { loginLink.classList.add('hidden'); userDisplay.classList.remove('hidden'); logoutLink.classList.remove('hidden'); userDisplay.textContent = email; }
  else { loginLink.classList.remove('hidden'); userDisplay.classList.add('hidden'); logoutLink.classList.add('hidden'); }
}
updateAuthUI();
document.getElementById('logoutLink').addEventListener('click', function(e) {
  e.preventDefault();
  localStorage.removeItem('authEmail');
  localStorage.removeItem('authToken');
  location.reload();
});function filterSoftwares() {
  let base = allSoftwares;
  if (currentCategory === 'all') base = base.filter(sw => !sw.isTool);
  else if (currentCategory === 'software') base = base.filter(sw => sw.isSoftware && !sw.isNotice);
  else if (currentCategory === 'tool') base = base.filter(sw => sw.isTool);
  else if (currentCategory === 'personal') return;
  const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!keyword) renderSoftwares(base);
  else renderSoftwares(base.filter(sw => sw.title.toLowerCase().includes(keyword) || (sw.description&&sw.description.toLowerCase().includes(keyword))));
}

function showAbout() { document.getElementById('aboutModal').classList.remove('hidden'); }
function hideAbout() { document.getElementById('aboutModal').classList.add('hidden'); }async function loadPendingIssues() {
  if (!adminToken) return;
  const res = await fetch(API + '?labels=pending&state=open&sort=created&direction=desc');
  const issues = await res.json(); const div = document.getElementById('pendingList');
  if (!issues.length) { div.innerHTML = '<p>暂无待审核</p>'; return; }
  let html = ''; issues.forEach(issue => { html += `<div class="card"><h3>${issue.title}</h3><p>${issue.body ? issue.body.substring(0,80) : ''}...</p><div style="margin-top:10px;"><button class="download-btn" onclick="approve(${issue.number})">通过</button><button class="download-btn" style="background:#e74c3c;margin-left:5px;" onclick="reject(${issue.number})">驳回</button></div></div>`; });
  div.innerHTML = html;
}
async function approve(number) {
  if (!adminToken) return;
  await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${number}/labels`, { method: 'PUT', headers: { Authorization: `token ${adminToken}` }, body: JSON.stringify({ labels: ['approved'] }) });
  alert('已通过'); loadPendingIssues(); loadSoftwares();
}
async function reject(number) {
  if (!adminToken) return;
  await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${number}`, { method: 'PATCH', headers: { Authorization: `token ${adminToken}` }, body: JSON.stringify({ state: 'closed', labels: ['rejected'] }) });
  alert('已驳回'); loadPendingIssues();
}    loadSoftwares();
  </script>
</body>
</html>
