<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>软件库</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f6f9;
      --card-bg: #ffffff;
      --text: #2c3e50;
      --text-secondary: #5a6d80;
      --border: #e1e8ed;
      --link: #3b6ff5;
      --btn-bg: #3b6ff5;
      --btn-hover: #2b5cd4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow: 0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.06);
      --radius: 14px;
      --radius-sm: 10px;
      --header-bg: rgba(255,255,255,0.85);
      --announce-bg: #eef3ff;
      --announce-text: #1e3a8a;
      --notice-bg: #fff8f0;
      --notice-border: #f0b878;
      --notice-text: #6d4c00;
      --nav-active-bg: #3b6ff5;
      --nav-active-text: white;
    }.dark {
  --bg: #181c26;
  --card-bg: #212636;
  --text: #e0e4ec;
  --text-secondary: #a0a8b8;
  --border: #2e3440;
  --link: #6ea8fe;
  --btn-bg: #3b6ff5;
  --btn-hover: #2b5cd4;
  --shadow-sm: 0 1px 3px rgba(255,255,255,0.03);
  --shadow: 0 2px 8px rgba(255,255,255,0.03), 0 1px 2px rgba(255,255,255,0.04);
  --shadow-lg: 0 8px 24px rgba(255,255,255,0.04);
  --header-bg: rgba(24,28,38,0.85);
  --announce-bg: #1e2332;
  --announce-text: #93b4f5;
  --notice-bg: #2b2416;
  --notice-border: #f0b400;
  --notice-text: #f7e7a0;
  --nav-active-bg: #3b6ff5;
  --nav-active-text: white;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 680px; margin: 0 auto; padding: 0 16px; }.header {
  background: var(--header-bg);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}
.header-inner { max-width: 680px; margin: auto; padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
.header-top { display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 24px; font-weight: 700; color: var(--text); }
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.icon-btn {
  background: var(--card-bg);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: 24px;
  padding: 6px 16px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  font-weight: 500;
  text-decoration: none;
  box-shadow: var(--shadow-sm);
}
.icon-btn:hover { background: var(--border); color: var(--text); transform: translateY(-1px); }.nav-bar { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0; }
.nav-btn {
  background: var(--card-bg);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: 24px;
  padding: 6px 18px;
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  font-weight: 500;
  box-shadow: var(--shadow-sm);
}
.nav-btn.active { background: var(--nav-active-bg); color: var(--nav-active-text); border-color: var(--nav-active-bg); }
.search-box {
  width: 100%;
  padding: 10px 16px;
  margin: 8px 0 6px;
  border: 1px solid var(--border);
  border-radius: 24px;
  background: var(--card-bg);
  color: var(--text);
  font-size: 15px;
  transition: border 0.2s;
  box-shadow: var(--shadow-sm);
}
.search-box:focus { outline: none; border-color: var(--link); }
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px 24px;
  background: var(--btn-bg);
  color: white;
  border-radius: 24px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  font-size: 14px;
  text-decoration: none;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(59,111,245,0.25);
}
.btn:hover { background: var(--btn-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,111,245,0.3); }.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.15s, box-shadow 0.15s;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.card.notice { background: var(--notice-bg); border-color: var(--notice-border); color: var(--notice-text); }
.card h3 { font-size: 17px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; font-weight: 600; }
.desc { color: var(--text-secondary); font-size: 14px; margin-bottom: 10px; line-height: 1.5; }
.card.notice .desc { color: inherit; }
.download-link {
  display: inline-flex;
  background: var(--link);
  color: white;
  padding: 6px 18px;
  border-radius: 20px;
  font-size: 13px;
  text-decoration: none;
  font-weight: 500;
  transition: filter 0.2s;
}
.download-link:hover { filter: brightness(1.1); }    .admin-panel { background: var(--card-bg); border: 2px dashed var(--border); border-radius: var(--radius); padding: 18px; margin: 14px 0; }
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .modal-content {
      background: var(--card-bg); border-radius: var(--radius); padding: 24px; width: 90%;
      max-width: 400px; box-shadow: var(--shadow-lg); border: 1px solid var(--border);
    }
    .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 14px; }
    .footer { text-align: center; color: var(--text-secondary); font-size: 12px; margin-top: 30px; opacity: 0.6; }
    .hidden { display: none !important; }
    .announcement {
      background: var(--announce-bg);
      color: var(--announce-text);
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      margin: 14px 0;
      font-size: 14px;
      font-weight: 450;
      border-left: 4px solid var(--link);
      box-shadow: var(--shadow-sm);
    }
    .badge { display: inline-block; background: #e74c3c; color: white; border-radius: 4px; padding: 1px 6px; font-size: 11px; margin-left: 4px; font-weight: 600; }
    .type-badge { display: inline-block; border-radius: 4px; padding: 2px 8px; font-size: 11px; margin-right: 6px; color: white; font-weight: 600; }
    .badge-software { background: #4caf93; }
    .badge-tool { background: #7386d5; }
    .badge-notice { background: #f0a86e; }
    #noticeList .card { border-left: 4px solid var(--link); padding-left: 16px; }
  </style>
</head><body>
  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <h1>软件库</h1>
        <div class="header-actions">
          <button class="icon-btn" onclick="toggleDark()" id="darkToggle">暗色模式</button>
          <a href="mailto:dghkkppp@qq.com" class="icon-btn" id="messageBtn" style="text-decoration:none;">私信</a>
          <a href="./login.html" class="icon-btn" style="text-decoration:none;" id="loginLink">登录</a>
          <span id="userDisplay" class="hidden" style="font-size:14px; margin-right:8px; color: var(--text-secondary);"></span>
          <a href="#" class="icon-btn hidden" id="logoutLink" style="text-decoration:none;">退出</a>
          <span id="adminArea" class="hidden">
            <button class="icon-btn" onclick="toggleAdmin()">审核模式</button>
            <a href="https://github.com/ctctycyc/softlib/issues" target="_blank" class="icon-btn" style="text-decoration:none;">后台</a>
          </span>
        </div>
      </div>
      <div class="nav-bar" id="navBar">
        <button class="nav-btn active" data-category="all">全部</button>
        <button class="nav-btn" data-category="software">软件</button>
        <button class="nav-btn" data-category="tool">工具</button>
        <button class="nav-btn" data-category="personal">个人</button>
      </div>
      <input type="text" class="search-box" id="searchInput" placeholder="搜索..." oninput="filterSoftwares()">
    </div>
  </div>

  <div class="container" style="margin-top:10px;">
    <div class="announcement">欢迎来到软件库！这里收集了一些实用软件和工具，仅供学习交流。</div>
    <div style="text-align:right; margin-bottom:10px;">
      <button class="icon-btn" onclick="toggleNotice()" id="noticeToggleBtn">查看通知</button>
    </div>
    <div id="noticeList" class="hidden" style="margin-bottom:14px;"></div>
    <div id="adminPanel" class="admin-panel hidden">
      <h3>待审核内容</h3>
      <div id="pendingList">加载中...</div>
    </div>
    <div id="list"></div>
    <div class="footer" id="secretTrigger">✔zeci rjk</div>
  </div>

  <div id="aboutModal" class="modal hidden" onclick="hideAbout()">
    <div class="modal-content" onclick="event.stopPropagation()" style="text-align:center;">
      <h3 style="font-size:22px; font-weight:700;">软件库</h3>
      <p style="color: var(--text-secondary);">测试版</p>
      <div style="margin: 20px 0; padding: 16px; background: var(--bg); border-radius: 12px;">
        <p><strong>版本</strong><br>1.1</p>
        <p><strong>管理员</strong><br>zeruan</p>
        <p><strong>联系邮箱</strong><br><a href="mailto:dghkkppp@qq.com">dghkkppp@qq.com</a></p>
      </div>
      <button class="btn" onclick="hideAbout()">关闭</button>
    </div>
  </div><script>
  const API = 'https://api.github.com/repos/ctctycyc/softlib/issues';
  const ADMIN_USERNAMES = ['zeruan'];
  let allSoftwares = [], currentCategory = 'all', adminToken = localStorage.getItem('adminToken');

  // ========== 管理员激活 ==========
  let clickCount = 0;
  document.getElementById('secretTrigger').addEventListener('click', () => {
    clickCount++;
    if (clickCount >= 5) {
      clickCount = 0;
      const input = prompt('管理员登录：请输入 GitHub Token');
      if (input && input.trim()) verifyAdminToken(input.trim());
    }
    setTimeout(() => clickCount = 0, 2000);
  });
  async function verifyAdminToken(token) {
    try {
      const res = await fetch('https://api.github.com/user', { headers: { Authorization: `token ${token}` } });
      if (res.ok) {
        adminToken = token; localStorage.setItem('adminToken', adminToken);
        alert('管理功能已激活！'); document.getElementById('adminArea').classList.remove('hidden');
      } else alert('Token 无效');
    } catch (e) { alert('网络错误'); }
  }
  document.getElementById('adminArea').classList.add('hidden');

  // ========== 导航 ==========
  document.getElementById('navBar').addEventListener('click', e => {
    if (e.target.classList.contains('nav-btn')) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentCategory = e.target.dataset.category;
      renderFilteredSoftwares();
    }
  });

  function toggleDark() {
    document.documentElement.classList.toggle('dark');
    const isDark = document.documentElement.classList.contains('dark');
    localStorage.setItem('darkMode', isDark);
    document.getElementById('darkToggle').textContent = isDark ? '亮色模式' : '暗色模式';
  }
  if (localStorage.getItem('darkMode') === 'true') { document.documentElement.classList.add('dark'); document.getElementById('darkToggle').textContent = '亮色模式'; }

  function getDefaultIcon(sw) {
    if (sw.isNotice) return '<span class="type-badge badge-notice">公告</span>';
    if (sw.isTool) return '<span class="type-badge badge-tool">工具</span>';
    return '<span class="type-badge badge-software">软件</span>';
  }

  async function loadSoftwares() {
    try {
      const res = await fetch(API + '?labels=approved&state=open&sort=created&direction=desc&per_page=100');
      const issues = await res.json();
      allSoftwares = issues.map(issue => {
        let body = issue.body || '', downloadUrl = '', description = '';
        const lines = body.split('\n');
        for (let line of lines) {
          if (line.trim().startsWith('http')) { if (!/\.(png|jpg|jpeg|gif|svg|ico)(\?.*)?$/.test(line.trim())) downloadUrl = line.trim(); }
          else if (line.trim() && !description) description = line.trim();
        }
        const labels = issue.labels.map(l => l.name);
        const isNotice = labels.includes('notice'), isTool = labels.includes('tool');
        return { id: issue.number, title: issue.title, description, downloadUrl: isNotice ? '' : downloadUrl, htmlUrl: issue.html_url, isNotice, isTool, isSoftware: !isNotice && !isTool };
      });
      allSoftwares.sort((a, b) => a.isNotice ? -1 : 1);
      renderFilteredSoftwares();
    } catch(e) { document.getElementById('list').innerHTML = '<p>加载失败</p>'; }
  }function renderFilteredSoftwares() {
  let filtered = allSoftwares;
  if (currentCategory === 'all') filtered = allSoftwares.filter(sw => !sw.isTool);
  else if (currentCategory === 'software') filtered = allSoftwares.filter(sw => sw.isSoftware && !sw.isNotice);
  else if (currentCategory === 'tool') filtered = allSoftwares.filter(sw => sw.isTool);
  else if (currentCategory === 'personal') {
    document.getElementById('list').innerHTML = `
      <div class="card" style="text-align:center;">
        <h3>关于软件库</h3>
        <p>如有问题或建议，请联系：</p>
        <p style="font-size:16px; margin:10px 0;">
          <a href="mailto:dghkkppp@qq.com" style="color: var(--link);">dghkkppp@qq.com</a>
        </p>
        <button class="btn" onclick="showAbout()">查看详情</button>
      </div>`;
    return;
  }
  renderSoftwares(filtered);
}

function renderSoftwares(softwares) {
  const listDiv = document.getElementById('list');
  if (softwares.length === 0) { listDiv.innerHTML = '<div class="card">暂无内容</div>'; return; }
  let html = '';
  softwares.forEach(sw => {
    const iconHtml = getDefaultIcon(sw);
    let downloadBtn = '';
    if (sw.downloadUrl && !sw.isNotice) {
      if (localStorage.getItem('authToken')) {
        downloadBtn = `<a class="download-link" href="${sw.downloadUrl}" target="_blank">下载</a>`;
      } else {
        downloadBtn = `<a class="download-link" href="javascript:void(0)" onclick="alert('请先登录后再下载'); location.href='./login.html';" style="background:#aaa;">登录后下载</a>`;
      }
    }
    html += `<div class="card${sw.isNotice ? ' notice' : ''}"><h3>${iconHtml}${sw.title}</h3><div class="desc">${sw.description || ''}</div>${downloadBtn}</div>`;
  });
  listDiv.innerHTML = html;
}

// ========== 通知 ==========
async function loadNotices() {
  try {
    const res = await fetch(API + '?labels=notice&state=open&sort=created&direction=desc&per_page=10');
    const issues = await res.json();
    const list = document.getElementById('noticeList');
    if (issues.length === 0) {
      list.innerHTML = '<div class="card" style="text-align:center; color:var(--text-secondary);">暂无通知</div>';
      return;
    }
    let html = '';
    issues.forEach(issue => {
      const date = new Date(issue.created_at).toLocaleDateString('zh-CN');
      html += `<div class="card notice" style="margin-bottom:8px;">
        <h3 style="font-size:16px;">${issue.title}</h3>
        <div class="desc">${issue.body ? issue.body.substring(0,200) : ''}</div>
        <div style="font-size:12px; color:var(--text-secondary);">${date}</div>
      </div>`;
    });
    list.innerHTML = html;
  } catch(e) {
    document.getElementById('noticeList').innerHTML = '<p style="color:red;">加载通知失败</p>';
  }
}
function toggleNotice() {
  const list = document.getElementById('noticeList');
  const btn = document.getElementById('noticeToggleBtn');
  if (list.classList.contains('hidden')) {
    loadNotices();
    list.classList.remove('hidden');
    btn.textContent = '收起通知';
  } else {
    list.classList.add('hidden');
    btn.textContent = '查看通知';
  }
}    // ========== 登录状态显示 ==========
    function updateAuthUI() {
      const email = localStorage.getItem('authEmail');
      const token = localStorage.getItem('authToken');
      const loginLink = document.getElementById('loginLink');
      const userDisplay = document.getElementById('userDisplay');
      const logoutLink = document.getElementById('logoutLink');
      if (email && token) {
        loginLink.classList.add('hidden');
        userDisplay.classList.remove('hidden');
        logoutLink.classList.remove('hidden');
        userDisplay.textContent = email;
      } else {
        loginLink.classList.remove('hidden');
        userDisplay.classList.add('hidden');
        logoutLink.classList.add('hidden');
      }
    }
    updateAuthUI();
    document.getElementById('logoutLink').addEventListener('click', function(e) {
      e.preventDefault();
      localStorage.removeItem('authEmail');
      localStorage.removeItem('authToken');
      location.reload();
    });

    // ========== 私信按钮：已登录自动附带邮箱 ==========
    document.getElementById('messageBtn').addEventListener('click', function(e) {
      const email = localStorage.getItem('authEmail');
      if (email) {
        e.preventDefault();
        window.location.href = `mailto:dghkkppp@qq.com?subject=来自软件库的私信&body=我的邮箱：${email}`;
      } else {
        e.preventDefault();
        alert('请先登录后再发送私信');
        location.href = './login.html';
      }
    });

    // ========== 搜索 ==========
    function filterSoftwares() {
      let base = allSoftwares;
      if (currentCategory === 'all') base = base.filter(sw => !sw.isTool);
      else if (currentCategory === 'software') base = base.filter(sw => sw.isSoftware && !sw.isNotice);
      else if (currentCategory === 'tool') base = base.filter(sw => sw.isTool);
      else if (currentCategory === 'personal') return;
      const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!keyword) renderSoftwares(base);
      else renderSoftwares(base.filter(sw => sw.title.toLowerCase().includes(keyword) || (sw.description&&sw.description.toLowerCase().includes(keyword))));
    }

    function showAbout() { document.getElementById('aboutModal').classList.remove('hidden'); }
    function hideAbout() { document.getElementById('aboutModal').classList.add('hidden'); }
    function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); if (!document.getElementById('adminPanel').classList.contains('hidden')) loadPendingIssues(); }

    async function loadPendingIssues() {
      if (!adminToken) return;
      const res = await fetch(API + '?labels=pending&state=open&sort=created&direction=desc');
      const issues = await res.json(); const div = document.getElementById('pendingList');
      if (!issues.length) { div.innerHTML = '<p>暂无待审核</p>'; return; }
      let html = ''; issues.forEach(issue => { html += `<div class="card"><h3>${issue.title}</h3><p>${issue.body ? issue.body.substring(0,80) : ''}...</p><div style="margin-top:10px;"><button class="btn" onclick="approve(${issue.number})">通过</button><button class="btn" style="background:#e74c3c;margin-left:5px;" onclick="reject(${issue.number})">驳回</button></div></div>`; });
      div.innerHTML = html;
    }
    async function approve(number) {
      if (!adminToken) return;
      await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${number}/labels`, { method: 'PUT', headers: { Authorization: `token ${adminToken}` }, body: JSON.stringify({ labels: ['approved'] }) });
      alert('已通过'); loadPendingIssues(); loadSoftwares();
    }
    async function reject(number) {
      if (!adminToken) return;
      await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${number}`, { method: 'PATCH', headers: { Authorization: `token ${adminToken}` }, body: JSON.stringify({ state: 'closed', labels: ['rejected'] }) });
      alert('已驳回'); loadPendingIssues();
    }

    loadSoftwares();
  </script>
</body>
</html>
