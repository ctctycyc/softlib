</head><body>
  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <h1>软件库</h1>
        <div class="header-actions">
          <button class="icon-btn" onclick="toggleDark()" id="darkToggle">暗色模式</button>
          <span id="adminArea" class="hidden">
            <button class="icon-btn" onclick="toggleAdmin()">审核模式</button>
            <button class="icon-btn" id="maintenanceBtn" onclick="toggleMaintenance()">维护模式</button>

    </div>

  <div class="container" style="margin-top:10px;">
    <div class="announcement">欢迎来到软件库！这里收集了一些实用软件和工具，仅供学习交流。</div>
    <div id="adminPanel" class="admin-panel hidden">
      <h3>待审核内容</h3>
      <div id="pendingList">加载中...</div>
    </div>
    <div id="list"></div>
    <div class="footer" id="secretTrigger">✔zeci rjk</div>
  </div>

  <div id="aboutModal" class="modal hidden" onclick="hideAbout()">
    <div class="modal-content" onclick="event.stopPropagation()" style="text-align:center;">
      <h3 style="font-size:22px; font-weight:700;">软件库</h3>
      <p style="color: var(--text-secondary);">测试版</p>
      <div style="margin: 20px 0; padding: 16px; background: var(--bg); border-radius: 12px;">
        <p><strong>版本</strong><br>1.1</p>
        <p><strong>管理员</strong><br>zeruan</p>
        <p><strong>联系邮箱</strong><br><a href="mailto:dghkkppp@qq.com">dghkkppp@qq.com</a></p>
      </div>
      <button class="btn" onclick="hideAbout()">关闭</button>
    </div>
  </div><script>
  const API = 'https://api.github.com/repos/ctctycyc/softlib/issues';
  const ADMIN_USERNAMES = ['zeruan'];
  let allSoftwares = [];
  let currentCategory = 'all';
  let adminToken = localStorage.getItem('adminToken');
  let maintenanceMode = localStorage.getItem('maintenanceMode') === 'true';

  // 初始化维护按钮状态
  if (maintenanceMode) {
    document.getElementById('maintenanceBtn').classList.add('maintenance-active');
    document.getElementById('maintenanceBtn').textContent = '维护中...';
  }

  // 管理员激活
  let clickCount = 0;
  document.getElementById('secretTrigger').addEventListener('click', () => {
    clickCount++;
    if (clickCount >= 5) {
      clickCount = 0;
      const input = prompt('管理员登录：请输入 GitHub Token');
      if (input && input.trim()) verifyAdminToken(input.trim());
    }
    setTimeout(() => clickCount = 0, 2000);
  });

  async function verifyAdminToken(token) {
    try {
      const res = await fetch('https://api.github.com/user', { headers: { Authorization: `token ${token}` } });
      if (res.ok) {
        const scopes = res.headers.get('X-OAuth-Scopes') || '';
        if (scopes.includes('public_repo') || scopes.includes('repo')) {
          adminToken = token;
          localStorage.setItem('adminToken', adminToken);
          alert('管理功能已激活！');
          document.getElementById('adminArea').classList.remove('hidden');
          if (!document.getElementById('adminPanel').classList.contains('hidden')) loadPendingIssues();
        } else alert('Token 缺少权限');
      } else alert('Token 无效');
    } catch (e) { alert('网络错误'); }
  }
  document.getElementById('adminArea').classList.add('hidden');// 维护模式切换
function toggleMaintenance() {
  maintenanceMode = !maintenanceMode;
  localStorage.setItem('maintenanceMode', maintenanceMode);
  const btn = document.getElementById('maintenanceBtn');
  if (maintenanceMode) {
    btn.classList.add('maintenance-active');
    btn.textContent = '维护中...';
  } else {
    btn.classList.remove('maintenance-active');
    btn.textContent = '维护模式';
  }
}

// 导航
document.getElementById('navBar').addEventListener('click', e => {
  if (e.target.classList.contains('nav-btn')) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentCategory = e.target.dataset.category;
    renderFilteredSoftwares();
  }
});

function toggleDark() {
  document.documentElement.classList.toggle('dark');
  const isDark = document.documentElement.classList.contains('dark');
  localStorage.setItem('darkMode', isDark);
  document.getElementById('darkToggle').textContent = isDark ? '亮色模式' : '暗色模式';
}
if (localStorage.getItem('darkMode') === 'true') {
  document.documentElement.classList.add('dark');
  document.getElementById('darkToggle').textContent = '亮色模式';
}

function extractIconUrl(body) {
  if (!body) return null;
  const lines = body.split('\n');
  for (let line of lines) {
    const trimmed = line.trim();
    if (/^https?:\/\/.+\.(png|jpg|jpeg|gif|svg|ico)(\?.*)?$/i.test(trimmed)) return trimmed;
    if (trimmed.startsWith('https://github.com/user-attachments/assets/')) return trimmed;
  }
  return null;
}

function getDefaultIcon(sw) {
  if (sw.isNotice) return '<span class="type-badge badge-notice">公告</span>';
  if (sw.isTool) return '<span class="type-badge badge-tool">工具</span>';
  if (sw.isSoftware) return '<span class="type-badge badge-software">软件</span>';
  return '';
    }async function loadSoftwares() {
  try {
    const res = await fetch(API + '?labels=approved&state=open&sort=created&direction=desc&per_page=100');
    const issues = await res.json();
    allSoftwares = issues.map(issue => {
      let body = issue.body || '', downloadUrl = '', description = '';
      const lines = body.split('\n');
      for (let line of lines) {
        if (line.trim().startsWith('http')) {
          if (!/\.(png|jpg|jpeg|gif|svg|ico)(\?.*)?$/i.test(line.trim()) &&
              !line.trim().startsWith('https://github.com/user-attachments/assets/'))
            downloadUrl = line.trim();
        } else if (line.trim() && !description) description = line.trim();
      }
      const labels = issue.labels.map(l => l.name);
      const isNotice = labels.includes('notice');
      const isTool = labels.includes('tool');
      const isSoftware = labels.includes('software') || (!isNotice && !isTool);
      return { id: issue.number, title: issue.title, description, downloadUrl: (isSoftware || isTool) ? downloadUrl : '', htmlUrl: issue.html_url, isNotice, isSoftware, isTool, iconUrl: extractIconUrl(body) };
    });
    allSoftwares.sort((a, b) => a.isNotice && !b.isNotice ? -1 : (!a.isNotice && b.isNotice ? 1 : 0));
    renderFilteredSoftwares();
  } catch(e) { document.getElementById('list').innerHTML = '<p>加载失败</p>'; }
}

function renderFilteredSoftwares() {
  let filtered = allSoftwares;
  if (currentCategory === 'all') filtered = allSoftwares.filter(sw => !sw.isTool);
  else if (currentCategory === 'software') filtered = allSoftwares.filter(sw => sw.isSoftware && !sw.isNotice);
  else if (currentCategory === 'tool') filtered = allSoftwares.filter(sw => sw.isTool);
  else if (currentCategory === 'personal') {
    document.getElementById('list').innerHTML = `<div class="card" style="text-align:center;"><h3>关于软件库</h3><p>查看版本与联系信息</p><button class="btn" onclick="showAbout()">查看详情</button></div>`;
    return;
  }
  renderSoftwares(filtered);
}function renderSoftwares(softwares) {
  const listDiv = document.getElementById('list');
  if (softwares.length === 0) { listDiv.innerHTML = '<div class="card">暂无内容</div>'; return; }
  let html = '';
  softwares.forEach(sw => {
    const iconHtml = sw.iconUrl ? `<img class="card-icon" src="${sw.iconUrl}" onerror="this.style.display='none'">` : getDefaultIcon(sw);
    const isMusic = sw.downloadUrl && /music\d*\.html/.test(sw.downloadUrl);
    let downloadBtn = '';
    if (sw.downloadUrl && !sw.isNotice) {
      if (maintenanceMode) {
        downloadBtn = `<a class="download-link" href="javascript:void(0)" onclick="alert('维护中，暂不可下载')">${isMusic ? '展开播放器' : '下载'}</a>`;
      } else if (isMusic) {
        downloadBtn = `<a class="download-link" href="#" onclick="document.getElementById('player-${sw.id}').style.display='block'; return false;">展开播放器</a>`;
      } else {
        downloadBtn = `<a class="download-link" href="${sw.downloadUrl}" target="_blank">下载</a>`;
      }
    }
    const musicPlayer = (isMusic && !maintenanceMode) ? `<div class="music-player" id="player-${sw.id}" style="margin-top:12px; display:none;"><iframe src="${sw.downloadUrl}" width="100%" height="500" frameborder="0" style="border-radius:12px;"></iframe></div>` : '';
    html += `<div class="card${sw.isNotice ? ' notice' : ''}">
      <h3>${iconHtml}${sw.title}</h3>
      <div class="desc">${sw.description || ''}</div>
      ${downloadBtn}
      ${musicPlayer}
      <div class="card-actions">
        <a href="#" onclick="toggleComments(${sw.id}); return false;">查看评论</a>
        <a href="https://github.com/ctctycyc/softlib/issues/${sw.id}" target="_blank">发表评论</a>
      </div>
      <div id="comments-${sw.id}" class="comments-section hidden"><div id="comment-list-${sw.id}"></div></div>
    </div>`;
  });
  listDiv.innerHTML = html;
}async function loadComments(issueNumber) {
  const listEl = document.getElementById(`comment-list-${issueNumber}`);
  if (!listEl) return;
  listEl.innerHTML = '加载中...';
  try {
    const res = await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${issueNumber}/comments`);
    const comments = await res.json();
    if (!comments.length) { listEl.innerHTML = '<p>暂无评论</p>'; return; }
    let html = '';
    comments.forEach(c => {
      let body = c.body || '', displayName = c.user ? c.user.login : '匿名', badge = '';
      if (body.startsWith('【官方】') || ADMIN_USERNAMES.includes(c.user?.login)) {
        badge = '<span class="badge">官方</span>';
        if (body.startsWith('【官方】')) body = body.slice(4);
      }
      const idx = body.indexOf(':');
      if (idx > 0) { displayName = body.slice(0, idx); body = body.slice(idx+1).trim(); }
      html += `<div class="comment-item"><strong>${displayName}</strong>${badge}: ${body}</div>`;
    });
    listEl.innerHTML = html;
  } catch(e) { listEl.innerHTML = '<p>加载失败</p>'; }
}

function toggleComments(id) {
  const div = document.getElementById(`comments-${id}`);
  if (!div) return;
  div.classList.toggle('hidden');
  if (!div.classList.contains('hidden')) loadComments(id);
}

function filterSoftwares() {
  let base = allSoftwares;
  if (currentCategory === 'all') base = base.filter(sw => !sw.isTool);
  else if (currentCategory === 'software') base = base.filter(sw => sw.isSoftware && !sw.isNotice);
  else if (currentCategory === 'tool') base = base.filter(sw => sw.isTool);
  else if (currentCategory === 'personal') return;
  const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!keyword) renderSoftwares(base);
  else renderSoftwares(base.filter(sw => sw.title.toLowerCase().includes(keyword) || (sw.description&&sw.description.toLowerCase().includes(keyword))));
}    function showAbout() { document.getElementById('aboutModal').classList.remove('hidden'); }
    function hideAbout() { document.getElementById('aboutModal').classList.add('hidden'); }

    function toggleAdmin() {
      const panel = document.getElementById('adminPanel');
      panel.classList.toggle('hidden');
      if (!panel.classList.contains('hidden')) loadPendingIssues();
    }

    async function loadPendingIssues() {
      if (!adminToken) return;
      const res = await fetch(API + '?labels=pending&state=open&sort=created&direction=desc');
      const issues = await res.json();
      const div = document.getElementById('pendingList');
      if (!issues.length) { div.innerHTML = '<p>暂无待审核</p>'; return; }
      let html = '';
      issues.forEach(issue => {
        html += `<div class="card"><h3>${issue.title}</h3><p>${issue.body ? issue.body.substring(0,80) : ''}...</p>
          <div style="margin-top:10px;"><button class="btn" onclick="approve(${issue.number})">通过</button>
          <button class="btn" style="background:#e74c3c;margin-left:5px;" onclick="reject(${issue.number})">驳回</button></div></div>`;
      });
      div.innerHTML = html;
    }

    async function approve(number) {
      if (!adminToken) return;
      await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${number}/labels`, { method: 'PUT', headers: { Authorization: `token ${adminToken}` }, body: JSON.stringify({ labels: ['approved'] }) });
      alert('已通过');
      loadPendingIssues();
      loadSoftwares();
    }

    async function reject(number) {
      if (!adminToken) return;
      await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${number}`, { method: 'PATCH', headers: { Authorization: `token ${adminToken}` }, body: JSON.stringify({ state: 'closed', labels: ['rejected'] }) });
      alert('已驳回');
      loadPendingIssues();
    }

    loadSoftwares();
  </script>
</body>
</html>
