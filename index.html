<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>软件库</title>
  <style>
    /* 所有样式在这里 */
    :root {
      --bg: #f0f2f5; --card-bg: #ffffff; --text: #1e293b; --text-secondary: #64748b;
      --border: #e2e8f0; --link: #3b82f6; --btn-bg: #10b981; --btn-hover: #059669;
      --shadow: 0 4px 12px rgba(0,0,0,0.06); --radius: 16px; --header-bg: rgba(255,255,255,0.72);
      --announce-bg: #e8f0fe; --announce-text: #1e40af;
      --notice-bg: #fff9e6; --notice-border: #ffd43b; --notice-text: #8a6d3b;
      --nav-active-bg: #3b82f6; --nav-active-text: white;
    }
    .dark {
      --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8;
      --border: #334155; --link: #60a5fa; --btn-bg: #22c55e; --btn-hover: #16a34a;
      --shadow: 0 4px 12px rgba(255,255,255,0.03); --header-bg: rgba(15,23,42,0.75);
      --announce-bg: #1e293b; --announce-text: #93c5fd;
      --notice-bg: #2d2416; --notice-border: #f0b400; --notice-text: #f7e7a0;
      --nav-active-bg: #2563eb; --nav-active-text: white;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 40px; }
    .container { max-width: 640px; margin: auto; padding: 0 16px; }
    .header { background: var(--header-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 16px 0; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 640px; margin: auto; padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
    .header-top { display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .icon-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); border-radius: 30px; padding: 6px 14px; font-size: 13px; cursor: pointer; backdrop-filter: blur(4px); transition: 0.2s; white-space: nowrap; }
    .icon-btn:hover { background: var(--border); }
    .nav-bar { display: flex; gap: 8px; overflow-x: auto; padding: 8px 0; margin: 8px 0; scrollbar-width: none; }
    .nav-bar::-webkit-scrollbar { display: none; }
    .nav-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); border-radius: 20px; padding: 6px 16px; font-size: 14px; cursor: pointer; white-space: nowrap; transition: 0.2s; font-weight: 500; }
    .nav-btn.active { background: var(--nav-active-bg); color: var(--nav-active-text); border-color: var(--nav-active-bg); }
    .search-box { width: 100%; padding: 12px 18px; margin: 12px 0 8px; border: 1px solid var(--border); border-radius: 30px; background: var(--card-bg); color: var(--text); font-size: 15px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 20px; background: var(--btn-bg); color: white; border-radius: 30px; font-weight: 600; border: none; cursor: pointer; font-size: 14px; text-decoration: none; transition: 0.3s; }
    .btn:hover { background: var(--btn-hover); transform: translateY(-2px); }
    .card { background: var(--card-bg); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .card.notice { background: var(--notice-bg); border-color: var(--notice-border); color: var(--notice-text); }
    .card h3 { font-size: 20px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .desc { color: var(--text-secondary); font-size: 14px; margin-bottom: 12px; }
    .card.notice .desc { color: inherit; }
    .download-link { display: inline-flex; background: var(--link); color: white; padding: 6px 16px; border-radius: 20px; font-size: 13px; text-decoration: none; }
    .card-actions { display: flex; gap: 20px; margin-top: 14px; font-size: 14px; flex-wrap: wrap; }
    .card-actions a { color: var(--link); font-weight: 500; }
    .comments-section { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; }
    .comment-item { border-bottom: 1px solid var(--border); padding: 8px 0; font-size: 14px; }
    .comment-item strong { color: var(--link); }
    .admin-panel { background: var(--card-bg); border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px; margin: 16px 0; }
    .footer { text-align: center; color: var(--text-secondary); font-size: 12px; margin-top: 30px; opacity: 0.7; }
    .hidden { display: none !important; }
    .announcement { background: var(--announce-bg); color: var(--announce-text); padding: 12px 16px; border-radius: 12px; margin: 12px 0; font-size: 14px; font-weight: 500; line-height: 1.5; border: 1px solid transparent; box-shadow: var(--shadow); }
       .badge { display: inline-block; background: #e74c3c; color: white; border-radius: 4px; padding: 1px 6px; font-size: 12px; margin-left: 4px; vertical-align: middle; }
       .type-badge { display: inline-block; border-radius: 4px; padding: 1px 6px; font-size: 12px; margin-right: 5px; color: white; }
       .badge-software { background: #10b981; }
       .badge-tool { background: #3b82f6; }
       .badge-notice { background: #f0ad4e; }
       .card-icon { width: 24px; height: 24px; border-radius: 4px; object-fit: contain; flex-shrink: 0; }
     </style>
   </head><body>
  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <h1>软件库</h1>
        <div class="header-actions">
          <button class="icon-btn" onclick="toggleDark()" id="darkToggle">暗色模式</button>
          <span id="adminArea" class="hidden">
            <button class="icon-btn" onclick="toggleAdmin()" id="adminToggle">审核模式</button>
            <a href="https://github.com/ctctycyc/softlib/issues" target="_blank" class="icon-btn" style="text-decoration:none;">后台</a>
          </span>
        </div>
      </div>
      <div class="nav-bar" id="navBar">
        <button class="nav-btn active" data-category="all">全部</button>
        <button class="nav-btn" data-category="software">软件</button>
        <button class="nav-btn" data-category="tool">工具</button>
        <button class="nav-btn" data-category="personal">个人</button>
      </div>
      <input type="text" class="search-box" id="searchInput" placeholder="搜索..." oninput="filterSoftwares()" />
    </div>
  </div>
  <div class="container" style="margin-top:12px;">
    <div class="announcement" id="announcement">
      欢迎来到软件库！这里收集了一些实用软件和工具，仅供学习交流。
    </div>
    <div id="adminPanel" class="admin-panel hidden">
      <h3>待审核内容</h3>
      <div id="pendingList">加载中...</div>
    </div>
    <div id="list"></div>
    <!-- 关于弹窗 -->
<div id="aboutModal" class="modal hidden" onclick="hideAbout()">
  <div class="modal-content" onclick="event.stopPropagation()" style="text-align:center;">
    <h3 style="font-size:24px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">软件库</h3>
    <p style="font-size:16px; margin-top:8px; color: var(--text-secondary);">测试版</p>
    <div style="margin: 20px 0; padding: 16px; background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow);">
      <p style="margin: 10px 0;"><strong>版本</strong><br>1.1</p>
      <p style="margin: 10px 0;"><strong>管理员</strong><br>zeruan</p>
      <p style="margin: 10px 0;"><strong>联系邮箱</strong><br><a href="mailto:dghkkppp@qq.com" style="color: var(--link);">dghkkppp@qq.com</a></p>
    </div>
    <button class="btn" onclick="hideAbout()">关闭</button>
  </div>
</div>
    <div class="footer" id="secretTrigger">✔zeci rjk</div>
  </div>  <script>
    const WORKER_URL = 'https://softlib-submit.dghkkppp.workers.dev';
    const API = 'https://api.github.com/repos/ctctycyc/softlib/issues';
    const ADMIN_USERNAMES = ['zeruan'];
    let allSoftwares = [];
    let currentCategory = 'all';
    let adminToken = localStorage.getItem('adminToken');

    let clickCount = 0;
    document.getElementById('secretTrigger').addEventListener('click', () => {
      clickCount++;
      if (clickCount >= 5) {
        clickCount = 0;
        const input = prompt('登录：请输入 密码验证');
        if (input && input.trim()) verifyAdminToken(input.trim());
      }
      setTimeout(() => { clickCount = 0; }, 2000);
    });

    async function verifyAdminToken(token) {
      try {
        const res = await fetch('https://api.github.com/user', {
          headers: { 'Authorization': `token ${token}` }
        });
        if (res.ok) {
          const scopes = res.headers.get('X-OAuth-Scopes') || '';
          if (scopes.includes('public_repo') || scopes.includes('repo')) {
            adminToken = token;
            localStorage.setItem('adminToken', adminToken);
            alert('管理功能已激活！');
            document.getElementById('adminArea').classList.remove('hidden');
            if (!document.getElementById('adminPanel').classList.contains('hidden')) loadPendingIssues();
          } else {
            alert('Token 缺少 public_repo 权限');
          }
        } else {
          alert('Token 无效');
        }
      } catch (e) {
        alert('网络错误');
      }
    }

    document.getElementById('adminArea').classList.add('hidden');

    document.getElementById('navBar').addEventListener('click', (e) => {
      if (e.target.classList.contains('nav-btn')) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentCategory = e.target.dataset.category;
        renderFilteredSoftwares();
      }
    });
    function showAbout() {
  document.getElementById('aboutModal').classList.remove('hidden');
}

function hideAbout() {
  document.getElementById('aboutModal').classList.add('hidden');
}

    function toggleDark() {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('darkMode', isDark);
      document.getElementById('darkToggle').textContent = isDark ? '亮色模式' : '暗色模式';
    }
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark');
      document.getElementById('darkToggle').textContent = '亮色模式';
    }

    function extractIconUrl(body) {
  if (!body) return null;
  const lines = body.split('\n');
  for (let line of lines) {
    const trimmed = line.trim();
    // 常规图片链接
    if (/^https?:\/\/.+\.(png|jpg|jpeg|gif|svg|ico)(\?.*)?$/i.test(trimmed)) {
      return trimmed;
    }
    // 支持 GitHub 附件链接
    if (trimmed.startsWith('https://github.com/user-attachments/assets/')) {
      return trimmed;
    }
  }
  return null;
    }

    function getDefaultIcon(sw) {
      if (sw.isNotice) return '<span class="type-badge badge-notice" style="font-size:12px;padding:2px 6px;">公告</span>';
      if (sw.isTool) return '<span class="type-badge badge-tool" style="font-size:12px;padding:2px 6px;">工具</span>';
      if (sw.isSoftware) return '<span class="type-badge badge-software" style="font-size:12px;padding:2px 6px;">软件</span>';
      return '';
    }

    async function loadSoftwares() {
      try {
        const res = await fetch(API + '?labels=approved&state=open&sort=created&direction=desc&per_page=100');
        const issues = await res.json();
        allSoftwares = issues.map(issue => {
          let body = issue.body || '';
          let downloadUrl = '', description = '';
          const lines = body.split('\n');
          for (let line of lines) {
            if (line.trim().startsWith('http')) {
              if (!/\.(png|jpg|jpeg|gif|svg|ico)(\?.*)?$/i.test(line.trim())) {
                downloadUrl = line.trim();
              }
            } else if (line.trim() && !description) {
              description = line.trim();
            }
          }
          const labels = issue.labels.map(l => l.name);
          const isNotice = labels.includes('notice');
          const isTool = labels.includes('tool');
          const isSoftware = labels.includes('software') || (!isNotice && !isTool);
          const iconUrl = extractIconUrl(body);
          return { id: issue.number, title: issue.title, description, downloadUrl: (isSoftware || isTool) ? downloadUrl : '', htmlUrl: issue.html_url, isNotice, isSoftware, isTool, iconUrl, labels };
        });
        allSoftwares.sort((a, b) => {
          if (a.isNotice && !b.isNotice) return -1;
          if (!a.isNotice && b.isNotice) return 1;
          return 0;
        });
        renderFilteredSoftwares();
      } catch(e) {
        document.getElementById('list').innerHTML = '<p style="color:red;">加载失败，请刷新重试</p>';
      }
    }

    function renderFilteredSoftwares() {
      let filtered = allSoftwares;
      if (currentCategory === 'software') filtered = allSoftwares.filter(sw => sw.isSoftware && !sw.isNotice);
      else if (currentCategory === 'tool') filtered = allSoftwares.filter(sw => sw.isTool);
         else if (currentCategory === 'personal') {
  document.getElementById('list').innerHTML = `
    <div class="card" style="text-align:center;">
      <h3>关于软件库</h3>
      <p style="color:var(--text-secondary);">查看版本与联系信息</p>
      <button class="btn" onclick="showAbout()">查看详情</button>
    </div>`;
  return;
         }
         renderSoftwares(filtered);
       }
   
       function renderSoftwares(softwares) {
         const listDiv = document.getElementById('list');
         if (softwares.length === 0) {
           listDiv.innerHTML = '<div class="card" style="text-align:center;color:var(--text-secondary);">暂无内容</div>';
           return;
         }
         let html = '';
         softwares.forEach(sw => {
           const noticeClass = sw.isNotice ? ' notice' : '';
           let iconHtml = sw.iconUrl ? `<img class="card-icon" src="${sw.iconUrl}" alt="icon" onerror="this.style.display='none'">` : getDefaultIcon(sw);
           const downloadButton = (sw.downloadUrl && !sw.isNotice) ? `<a class="download-link" href="${sw.downloadUrl}" target="_blank">下载</a>` : '';
           html += `<div class="card${noticeClass}"><h3>${iconHtml}${sw.title}</h3><div class="desc">${sw.description || '暂无描述'}</div>${downloadButton}<div class="card-actions"><a href="#" onclick="toggleComments(${sw.id}); return false;">查看评论</a><a href="https://github.com/ctctycyc/softlib/issues/${sw.id}" target="_blank">发表评论</a></div><div id="comments-${sw.id}" class="comments-section hidden"><div id="comment-list-${sw.id}"></div></div></div>`;
         });
         listDiv.innerHTML = html;
       }
        async function loadComments(issueNumber) {
         const listEl = document.getElementById(`comment-list-${issueNumber}`);
         if (!listEl) return;
         listEl.innerHTML = '加载中...';
         try {
           const res = await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${issueNumber}/comments`);
           const comments = await res.json();
           if (!Array.isArray(comments) || comments.length === 0) {
             listEl.innerHTML = '<p style="color:var(--text-secondary);">暂无评论</p>';
             return;
           }
           let html = '';
           comments.forEach(c => {
             let body = c.body || '';
             let displayName = c.user ? c.user.login : '匿名';
             let badge = '';
             if (body.startsWith('【官方】') || ADMIN_USERNAMES.includes(c.user?.login)) {
               badge = '<span class="badge">官方</span>';
               if (body.startsWith('【官方】')) body = body.slice(4);
             }
             const colonIndex = body.indexOf(':');
             if (colonIndex > 0) {
               displayName = body.slice(0, colonIndex);
               body = body.slice(colonIndex + 1).trim();
             }
    html += `<div class="comment-item"><strong>${displayName}</strong>${badge}: ${body}</div>`;
           });
           listEl.innerHTML = html;
         } catch (e) {
           listEl.innerHTML = '<p style="color:red;">加载失败</p>';
         }
       }
   
       function toggleComments(id) {
         const commentsDiv = document.getElementById(`comments-${id}`);
         if (!commentsDiv) return;
         const toggleLink = window.event?.target;
         if (!commentsDiv.classList.contains('hidden')) {
           commentsDiv.classList.add('hidden');
           if (toggleLink) toggleLink.textContent = '查看评论';
           return;
         }
         if (toggleLink) toggleLink.textContent = '收起评论';
         commentsDiv.classList.remove('hidden');
         loadComments(id);
       }
   
   
       function filterSoftwares() {
         const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
         let base = allSoftwares;
         if (currentCategory === 'software') base = allSoftwares.filter(sw => sw.isSoftware && !sw.isNotice);
         else if (currentCategory === 'tool') base = allSoftwares.filter(sw => sw.isTool);
         else if (currentCategory === 'personal') return;
         if (!keyword) { renderSoftwares(base); return; }
         renderSoftwares(base.filter(sw => sw.title.toLowerCase().includes(keyword) || (sw.description && sw.description.toLowerCase().includes(keyword))));
       }
   
       function toggleAdmin() {
         const panel = document.getElementById('adminPanel');
         panel.classList.toggle('hidden');
         if (!panel.classList.contains('hidden')) {
           loadPendingIssues();
           document.getElementById('adminToggle').textContent = '关闭审核';
         } else {
           document.getElementById('adminToggle').textContent = '审核模式';
         }
       }
   
       async function loadPendingIssues() {
         if (!adminToken) {
           document.getElementById('pendingList').innerHTML = '<p>请先激活管理功能。</p>';
           return;
         }
         const res = await fetch(API + '?labels=pending&state=open&sort=created&direction=desc');
         const issues = await res.json();
         const div = document.getElementById('pendingList');
         if (issues.length === 0) {
           div.innerHTML = '<p>暂无待审核内容</p>';
           return;
         }
         let html = '';
         issues.forEach(issue => {
           html += `<div class="card" style="padding:14px;"><h3 style="font-size:18px;">${issue.title}</h3><p style="font-size:14px;color:var(--text-secondary);">${issue.body ? issue.body.substring(0,80) : ''}...</p><div style="margin-top:12px; display:flex; gap:8px;"><button class="btn" onclick="approve(${issue.number})">通过</button><button class="btn btn-danger" onclick="reject(${issue.number})">驳回</button></div></div>`;
         });
         div.innerHTML = html;
       }
   

       async function approve(number) {
         if (!adminToken) return alert('Token 未设置');
         await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${number}/labels`, { method: 'PUT', headers: { 'Authorization': `token ${adminToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ labels: ['approved'] }) });
         alert('已通过');
         loadPendingIssues();
         loadSoftwares();
       }
   
       async function reject(number) {
         if (!adminToken) return alert('Token 未设置');
         await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${number}`, { method: 'PATCH', headers: { 'Authorization': `token ${adminToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ state: 'closed', labels: ['rejected'] }) });
         alert('已驳回');
         loadPendingIssues();
       }
   
       loadSoftwares();
     </script>
   </body>
   </html>
