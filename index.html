<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>软件库</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --card-bg: #ffffff;
      --text: #2c3e50;
      --text-secondary: #5a6d7e;
      --border: #e1e8ed;
      --link: #3498db;
      --btn-bg: #2ecc71;
      --btn-hover: #27ae60;
      --shadow: 0 4px 12px rgba(0,0,0,0.05);
      --radius: 12px;
      --header-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --header-text: white;
    }
    .dark {
      --bg: #1a1d23;
      --card-bg: #242730;
      --text: #e4e6eb;
      --text-secondary: #b0b3b8;
      --border: #3a3b45;
      --link: #8ab4f8;
      --btn-bg: #3fb950;
      --btn-hover: #2ea043;
      --shadow: 0 4px 12px rgba(255,255,255,0.03);
      --header-bg: linear-gradient(135deg, #2d2f3a 0%, #1f2128 100%);
      --header-text: #e4e6eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
      padding-bottom: 30px;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 15px;
    }
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 20px 15px;
      border-radius: 0 0 var(--radius) var(--radius);
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 26px; font-weight: 700; letter-spacing: 0.5px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: 0.2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.35); }
    .search-box {
      width: 100%;
      padding: 12px 16px;
      margin: 10px 0 15px;
      border: 1px solid var(--border);
      border-radius: 30px;
      background: var(--card-bg);
      color: var(--text);
      font-size: 15px;
      box-shadow: var(--shadow);
    }
    .search-box:focus {
      outline: none;
      border-color: var(--link);
      box-shadow: 0 0 0 3px rgba(52,152,219,0.2);
    }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: var(--btn-bg);
      color: white;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-size: 14px;
      text-decoration: none;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(46,204,113,0.3);
    }
    .btn:hover { background: var(--btn-hover); transform: translateY(-1px); }
    .btn-block { display: block; text-align: center; margin: 15px 0; }
    .btn-danger { background: #e74c3c; box-shadow: 0 4px 10px rgba(231,76,60,0.3); }
    .btn-danger:hover { background: #c0392b; }
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 15px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-2px); }
    .card h3 { font-size: 20px; margin-bottom: 6px; }
    .desc { color: var(--text-secondary); font-size: 14px; margin: 8px 0; }
    .download-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--link);
      color: white;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      text-decoration: none;
      margin: 10px 0;
    }
    .card-actions { display: flex; gap: 15px; margin-top: 12px; font-size: 14px; }
    .card-actions a { color: var(--link); font-weight: 500; }
    .comments-section { margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
    .admin-panel {
      background: var(--card-bg);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 15px;
      margin: 15px 0;
      box-shadow: var(--shadow);
    }
    .footer { text-align: center; color: var(--text-secondary); font-size: 12px; margin-top: 30px; opacity: 0.8; }
    .hidden { display: none; }
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--card-bg); border-radius: var(--radius); padding: 20px;
      width: 90%; max-width: 400px; box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }
    .modal-content h3 { margin-bottom: 15px; }
    .modal-content input, .modal-content textarea {
      width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg); color: var(--text);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="container header-inner">
      <h1>软件库</h1>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleDark()" id="darkToggle">🌙</button>
        <span id="adminArea" class="hidden">
          <button class="icon-btn" onclick="toggleAdmin()" id="adminToggle">审核模式</button>
        </span>
        <button class="icon-btn" id="setTokenBtn" onclick="promptToken()">设置Token</button>
        <a href="https://github.com/ctctycyc/softlib/issues" target="_blank" class="icon-btn" style="text-decoration:none;">后台</a>
      </div>
    </div>
  </div>

  <div class="container">
    <input type="text" class="search-box" id="searchInput" placeholder="搜索软件" oninput="filterSoftwares()" />

    <a class="btn btn-block" href="#" onclick="openSubmitForm(); return false;">＋ 上传新软件</a>

    <div id="submitModal" class="modal hidden">
      <div class="modal-content">
        <h3>上传新软件</h3>
        <input type="text" id="swName" placeholder="软件名称（必填）">
        <textarea id="swDesc" placeholder="描述（选填）" rows="3"></textarea>
        <input type="text" id="swUrl" placeholder="下载链接（必填，http开头）">
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:10px;">
          <button class="btn" style="background:#aaa;" onclick="closeSubmitForm()">取消</button>
          <button class="btn" onclick="submitSoftware()">提交审核</button>
        </div>
      </div>
    </div>
    <div id="adminPanel" class="admin-panel hidden">
      <h3 style="margin-bottom:10px;">待审核软件</h3>
      <div id="pendingList">加载中...</div>
    </div>

    <div id="list"></div>

    <div class="footer">由 GitHub Issues 驱动 · 评论系统 Cusdis</div>
  </div>

  <!-- Cusdis -->
  <script>
    const CUSDIS_APP_ID = 'bea65001-cdd3-483a-8b75-7749040db913';
    window.CUSDIS_LOCALE = 'zh-cn';
    function loadCusdis(targetId, pageId, pageUrl, pageTitle) {
      const container = document.getElementById(targetId);
      if (!container) return;
      container.innerHTML = '';
      const iframe = document.createElement('iframe');
      iframe.src = `https://cusdis.com/widget?appId=${CUSDIS_APP_ID}&pageId=${pageId}&pageUrl=${pageUrl}&pageTitle=${pageTitle}&requireNameEmail=1`;
      iframe.style.width = '100%';
      iframe.style.border = 'none';
      iframe.style.minHeight = '350px';
      iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-popups');
      container.appendChild(iframe);
    }
  </script>

  <script>
    const ADMIN_USERNAMES = ['ctctycyc'];
    // 👇 Worker 地址已帮你填好
    const WORKER_URL = 'https://softlib-submit.dghkkppp.workers.dev';
    const API = 'https://api.github.com/repos/ctctycyc/softlib/issues';
    let allSoftwares = [];
    let adminToken = localStorage.getItem('adminToken');

    function initTokenUI() {
      if (adminToken) {
        document.getElementById('adminArea').classList.remove('hidden');
        document.getElementById('setTokenBtn').classList.add('hidden');
      } else {
        document.getElementById('setTokenBtn').classList.remove('hidden');
      }
    }
    window.promptToken = function() {
      const input = prompt('请输入你的 GitHub Token：\n（勾选 public_repo 权限）');
      if (input && input.trim()) {
        adminToken = input.trim();
        localStorage.setItem('adminToken', adminToken);
        alert('Token 已保存！');
        initTokenUI();
        if (!document.getElementById('adminPanel').classList.contains('hidden')) loadPendingIssues();
      }
    };
    initTokenUI();

    function toggleDark() {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('darkMode', isDark);
      document.getElementById('darkToggle').textContent = isDark ? '☀️' : '🌙';
    }
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark');
      document.getElementById('darkToggle').textContent = '☀️';
    }

    async function loadSoftwares() {
      try {
        const res = await fetch(API + '?labels=approved&state=open&sort=created&direction=desc');
        const issues = await res.json();
        allSoftwares = issues.map(issue => {
          let body = issue.body || '';
          let downloadUrl = '';
          let description = '';
          const lines = body.split('\n');
          for (let line of lines) {
            if (line.trim().startsWith('http')) downloadUrl = line.trim();
            else if (line.trim() && !description) description = line.trim();
          }
          return { id: issue.number, title: issue.title, description, downloadUrl, htmlUrl: issue.html_url };
        });
        renderSoftwares(allSoftwares);
      } catch(e) {
        document.getElementById('list').innerHTML = '<p style="color:red;">加载失败，请刷新重试</p>';
      }
    }

   function renderSoftwares(softwares) {
      const listDiv = document.getElementById('list');
      if (softwares.length === 0) {
        listDiv.innerHTML = '<div class="card" style="text-align:center;color:var(--text-secondary);">暂无软件，快去上传吧</div>';
        return;
      }
      let html = '';
      softwares.forEach(sw => {
        html += `<div class="card">
          <h3>${sw.title}</h3>
          <div class="desc">${sw.description || '暂无描述'}</div>
          ${sw.downloadUrl ? `<a class="download-link" href="${sw.downloadUrl}" target="_blank">下载</a>` : ''}
        <div class="card-actions">
            <a href="#" onclick="toggleComments(${sw.id}); return false;">评论</a>
            <a href="${sw.htmlUrl}" target="_blank">详情</a>
          </div>
          <div id="comments-${sw.id}" class="comments-section hidden">
            <div id="cusdis-${sw.id}"></div>
          </div>
        </div>`;
      });
      listDiv.innerHTML = html;
    }

  function toggleComments(id) {
      const commentsDiv = document.getElementById(`comments-${id}`);
      if (!commentsDiv) return;
      const toggleLink = window.event ? window.event.target : null;
      if (!commentsDiv.classList.contains('hidden')) {
        commentsDiv.classList.add('hidden');
        if (toggleLink) toggleLink.textContent = '评论';
        return;
      }
      if (toggleLink) toggleLink.textContent = '收起评论';
      commentsDiv.classList.remove('hidden');
      const pageId = `software-${id}`;
      const pageUrl = `https://ctctycyc.github.io/softlib/#!${pageId}`;
      const pageTitle = `软件 #${id}`;
      loadCusdis(`cusdis-${id}`, pageId, pageUrl, pageTitle);
    }

  function filterSoftwares() {
      const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!keyword) { renderSoftwares(allSoftwares); return; }
      const filtered = allSoftwares.filter(sw => 
        sw.title.toLowerCase().includes(keyword) || 
        (sw.description && sw.description.toLowerCase().includes(keyword))
      );
      renderSoftwares(filtered);
    }

    function openSubmitForm() {
      document.getElementById('submitModal').classList.remove('hidden');
    }
    function closeSubmitForm() {
      document.getElementById('submitModal').classList.add('hidden');
    }
    async function submitSoftware() {
      const name = document.getElementById('swName').value.trim();
      const desc = document.getElementById('swDesc').value.trim();
      const url = document.getElementById('swUrl').value.trim();
      if (!name || !url) return alert('软件名称和下载链接不能为空');

      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: name, description: desc, downloadUrl: url })
        });
        const data = await res.json();
        if (data.success) {
          alert('提交成功，等待管理员审核！');
          document.getElementById('swName').value = '';
          document.getElementById('swDesc').value = '';
          document.getElementById('swUrl').value = '';
          closeSubmitForm();
          loadSoftwares();
        } else {
          alert('提交失败：' + (data.error || '未知错误'));
        }
      } catch (e) {
        alert('网络错误，请稍后再试');
      }
    }

    function toggleAdmin() {
      const panel = document.getElementById('adminPanel');
      panel.classList.toggle('hidden');
      if (!panel.classList.contains('hidden')) {
        loadPendingIssues();
        document.getElementById('adminToggle').textContent = '关闭审核';
      } else {
        document.getElementById('adminToggle').textContent = '审核模式';
      }
    }

    async function loadPendingIssues() {
      if (!adminToken) {
        document.getElementById('pendingList').innerHTML = '<p>请先点击“设置Token”输入GitHub Token。</p>';
        return;
      }
      const res = await fetch(API + '?labels=pending&state=open&sort=created&direction=desc');
      const issues = await res.json();
      const div = document.getElementById('pendingList');
      if (issues.length === 0) {
        div.innerHTML = '<p>暂无待审核软件</p>';
        return;
      }
      let html = '';
      issues.forEach(issue => {
        html += `<div class="card" style="padding:12px;">
          <h3 style="font-size:18px;">${issue.title}</h3>
          <p style="font-size:14px;color:var(--text-secondary);">${issue.body ? issue.body.substring(0,80) : ''}...</p>
          <div style="margin-top:10px;">
            <button class="btn" style="margin-right:5px;" onclick="approve(${issue.number})">通过</button>
            <button class="btn btn-danger" onclick="reject(${issue.number})">驳回</button>
          </div>
        </div>`;
      });
      div.innerHTML = html;
    }

    async function approve(number) {
      if (!adminToken) return alert('Token 未设置');
      await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${number}/labels`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${adminToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ labels: ['approved'] })
      });
      alert('已通过');
      loadPendingIssues();
      loadSoftwares();
    }

    async function reject(number) {
      if (!adminToken) return alert('Token 未设置');
      await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${number}`, {
        method: 'PATCH',
        headers: { 'Authorization': `token ${adminToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ state: 'closed', labels: ['rejected'] })
      });
      alert('已驳回');
      loadPendingIssues();
    }

    loadSoftwares();
  </script>
</body>
</html>
