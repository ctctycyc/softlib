    }.dark {
  --bg: #181c26;

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
  -webkit-font-smoothing: antialiased;
}.header {
  background: var(--header-bg);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}
.header-inner { max-width: 1000px; margin: auto; padding: 0 16px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.icon-btn {
  background: var(--card-bg);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: 0.2s;
  white-space: nowrap;
  font-weight: 500;
  text-decoration: none;
  box-shadow: var(--shadow-sm);
}
.icon-btn:hover { background: var(--border); color: var(--text); transform: translateY(-1px); }
.nav-bar { display: flex; gap: 6px; overflow-x: auto; padding: 8px 0; }
.nav-btn {
  background: var(--card-bg);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: 20px;
  padding: 5px 16px;
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
  transition: 0.2s;
  font-weight: 500;
  box-shadow: var(--shadow-sm);
}
.nav-btn.active { background: var(--nav-active-bg); color: var(--nav-active-text); border-color: var(--nav-active-bg); }
.search-box {
  width: 100%;
  padding: 10px 16px;
  margin: 8px 0;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--card-bg);
  color: var(--text);
  font-size: 15px;
  transition: 0.2s;
}
.search-box:focus { outline: none; border-color: var(--link); }
    .btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 8px 20px;
  background: var(--btn-bg);
  color: white;
  border-radius: 20px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  font-size: 14px;
  text-decoration: none;
  transition: 0.2s;
  box-shadow: 0 2px 8px rgba(59,111,245,0.25);
}
.btn:hover { background: var(--btn-hover); transform: translateY(-1px); }
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.15s;
}
.card:hover { transform: translateY(-2px); }
.card.notice { background: var(--notice-bg); border-color: var(--notice-border); }
.card h3 { font-size: 17px; margin-bottom: 4px; font-weight: 600; }
.desc { color: var(--text-secondary); font-size: 14px; margin-bottom: 8px; }
.download-link {
  display: inline-flex;
  background: var(--link);
  color: white;
  padding: 5px 16px;
  border-radius: 16px;
  font-size: 13px;
  text-decoration: none;
  font-weight: 500;
}
.meta { font-size: 12px; color: var(--text-secondary); margin-top: 8px; display: flex; gap: 15px; flex-wrap: wrap; }
.announcement {
  background: var(--announce-bg);
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 15px;
  border-left: 4px solid var(--link);
  color: var(--text);
  font-size: 14px;
}    .sidebar-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 15px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .sidebar-card h3 { font-size: 15px; margin-bottom: 10px; font-weight: 600; }
    .banner {
      background: var(--banner-bg);
      color: white;
      padding: 20px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .banner h2 { font-size: 22px; margin-bottom: 5px; }
    .banner p { opacity: 0.9; font-size: 14px; }
    .hidden { display: none !important; }
    .badge { display: inline-block; background: #e74c3c; color: white; border-radius: 4px; padding: 1px 6px; font-size: 11px; margin-left: 4px; }
    .type-badge { display: inline-block; border-radius: 4px; padding: 2px 8px; font-size: 11px; margin-right: 6px; color: white; }
    .badge-software { background: #4caf93; }
    .badge-tool { background: #7386d5; }
    .badge-notice { background: #f0a86e; }
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .modal-content { background: var(--card-bg); border-radius: var(--radius); padding: 24px; width: 90%; max-width: 400px; }
    
    /* 侧边栏抽屉 */
    .main-content { max-width: 800px; margin: 0 auto; padding: 0 16px; }
    .sidebar-drawer {
      position: fixed; left: -300px; top: 0; width: 280px; height: 100%;
      background: var(--card-bg); z-index: 250; transition: left 0.3s ease;
      box-shadow: var(--shadow); padding: 20px; overflow-y: auto;
    }
    .sidebar-drawer.open { left: 0; }
    .overlay {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 200;
    }
    .overlay.show { display: block; }
  </style>

  <script>
  function openSidebar() {
    document.getElementById('sidebarDrawer').classList.add('open');
    document.getElementById('overlay').classList.add('show');
  }
  function closeSidebar() {
    document.getElementById('sidebarDrawer').classList.remove('open');

  }

  const SUPABASE_URL = 'https://rgekpmuujozhkkctpdup.supabase.co';
const SUPABASE_KEY = 'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const API = 'https://api.github.com/repos/ctctycyc/softlib/issues';
  const ADMIN_USERNAMES = ['zeruan'];
  let allSoftwares = [], currentCategory = 'all', adminToken = localStorage.getItem('adminToken');

  // 管理员激活
  let clickCount = 0;
  document.getElementById('secretTrigger').addEventListener('click', () => {
    clickCount++;
    if (clickCount >= 5) {
      clickCount = 0;
      const input = prompt('管理员登录：请输入 GitHub Token');

    }
    setTimeout(() => clickCount = 0, 2000);
  });
  async function verifyAdminToken(token) {
    try {
      const res = await fetch('https://api.github.com/user', { headers: { Authorization: `token ${token}` } });
      if (res.ok) {
        adminToken = token; localStorage.setItem('adminToken', adminToken);
        alert('管理功能已激活！'); document.getElementById('adminArea').classList.remove('hidden');
      } else alert('Token 无效');
    } catch (e) { alert('网络错误'); }
  }
  document.getElementById('adminArea').classList.add('hidden');

  // 导航
  document.getElementById('navBar').addEventListener('click', e => {
    if (e.target.classList.contains('nav-btn')) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentCategory = e.target.dataset.category;
      renderFilteredSoftwares();
    }
  });

  function toggleDark() {
    document.documentElement.classList.toggle('dark');
    const isDark = document.documentElement.classList.contains('dark');
    localStorage.setItem('darkMode', isDark);
    document.getElementById('darkToggle').textContent = isDark ? '亮色模式' : '暗色模式';
  }
  if (localStorage.getItem('darkMode') === 'true') { document.documentElement.classList.add('dark'); document.getElementById('darkToggle').textContent = '亮色模式'; }

  function getDefaultIcon(sw) {
    if (sw.isNotice) return '<span class="type-badge badge-notice">公告</span>';
    if (sw.isTool) return '<span class="type-badge badge-tool">工具</span>';
    return '<span class="type-badge badge-software">软件</span>';
  }async function loadSoftwares() {
  try {
    const res = await fetch(API + '?labels=approved&state=open&sort=created&direction=desc&per_page=100');
    const issues = await res.json();
    allSoftwares = issues.map(issue => {
      let body = issue.body || '', downloadUrl = '', description = '';
      const lines = body.split('\n');
      for (let line of lines) {
        if (line.trim().startsWith('http')) { if (!/\.(png|jpg|jpeg|gif|svg|ico)(\?.*)?$/.test(line.trim())) downloadUrl = line.trim(); }
        else if (line.trim() && !description) description = line.trim();
      }
      const labels = issue.labels.map(l => l.name);
      const isNotice = labels.includes('notice'), isTool = labels.includes('tool');
      return { id: issue.number, title: issue.title, description, downloadUrl: isNotice ? '' : downloadUrl, created_at: issue.created_at, isNotice, isTool, isSoftware: !isNotice && !isTool };
    });
    allSoftwares.sort((a, b) => a.isNotice ? -1 : 1);
    updateStats();
    renderFilteredSoftwares();
  } catch(e) { document.getElementById('list').innerHTML = '<p>加载失败</p>'; }
}

function updateStats() {
  const softwareCount = allSoftwares.filter(s => s.isSoftware && !s.isNotice).length;
  const toolCount = allSoftwares.filter(s => s.isTool).length;
  const noticeCount = allSoftwares.filter(s => s.isNotice).length;
  document.getElementById('statsContent').innerHTML = `
    <p>软件: ${softwareCount}</p><p>工具: ${toolCount}</p><p>公告: ${noticeCount}</p>
  `;
}

function renderFilteredSoftwares() {
  let filtered = allSoftwares;
  if (currentCategory === 'all') filtered = allSoftwares.filter(sw => !sw.isTool);
  else if (currentCategory === 'software') filtered = allSoftwares.filter(sw => sw.isSoftware && !sw.isNotice);
  else if (currentCategory === 'tool') filtered = allSoftwares.filter(sw => sw.isTool);
  else if (currentCategory === 'personal') {
    document.getElementById('list').innerHTML = `
      <div class="card" style="text-align:center;">
        <h3>关于软件库</h3>
        <p>联系邮箱：dghkkppp@qq.com</p>
        <button class="btn" onclick="showAbout()">查看详情</button>
      </div>`;
    return;
  }
  renderSoftwares(filtered);
}

function renderSoftwares(softwares) {
  const listDiv = document.getElementById('list');
  if (softwares.length === 0) { listDiv.innerHTML = '<div class="card">暂无内容</div>'; return; }
  let html = '';
  softwares.forEach(sw => {
    const iconHtml = getDefaultIcon(sw);
    let downloadBtn = '';
    if (sw.downloadUrl && !sw.isNotice) {
      if (localStorage.getItem('authToken')) {
        downloadBtn = `<a class="download-link" href="${sw.downloadUrl}" target="_blank">下载</a>`;
      } else {
        downloadBtn = `<a class="download-link" href="javascript:void(0)" onclick="alert('请先登录后再下载'); location.href='./login.html';" style="background:#aaa;">登录后下载</a>`;
      }
    }
    const date = sw.created_at ? new Date(sw.created_at).toLocaleDateString('zh-CN') : '';
    html += `<div class="card${sw.isNotice ? ' notice' : ''}">
      <h3>${iconHtml}${sw.title}</h3>
      <div class="desc">${sw.description || ''}</div>
      ${downloadBtn}
      <div class="meta"><span>${date}</span><span>${sw.isNotice ? '公告' : sw.isTool ? '工具' : '软件'}</span></div>
    </div>`;
  });
  listDiv.innerHTML = html;
    }// 通知列表（主区域）
async function loadNotices() {
  try {
    const res = await fetch(API + '?labels=notice&state=open&sort=created&direction=desc&per_page=10');
    const issues = await res.json();
    const list = document.getElementById('noticeList');
    if (issues.length === 0) {
      list.innerHTML = '<div class="card">暂无通知</div>';
      return;
    }
    let html = '';
    issues.forEach(issue => {
      const date = new Date(issue.created_at).toLocaleDateString('zh-CN');
      html += `<div class="card notice">
        <h3>${issue.title}</h3>
        <div class="desc">${issue.body ? issue.body.substring(0,200) : ''}</div>
        <div class="meta"><span>${date}</span></div>
      </div>`;
    });
    list.innerHTML = html;
  } catch(e) {
    document.getElementById('noticeList').innerHTML = '<p>加载通知失败</p>';
  }
}
function toggleNotice() {
  const list = document.getElementById('noticeList');
  const btn = document.getElementById('noticeToggleBtn');
  if (list.classList.contains('hidden')) {
    loadNotices();
    list.classList.remove('hidden');
    btn.textContent = '收起通知';
  } else {
    list.classList.add('hidden');
    btn.textContent = '查看通知';
  }
}

// 侧边栏最新通知
async function loadSidebarNotices() {
  try {
    const res = await fetch(API + '?labels=notice&state=open&sort=created&direction=desc&per_page=3');
    const issues = await res.json();
    const div = document.getElementById('sidebarNotices');
    if (issues.length === 0) { div.innerHTML = '<p style="font-size:13px;">暂无通知</p>'; return; }
    let html = '<ul style="font-size:13px; padding-left:18px;">';
    issues.forEach(issue => { html += `<li><a href="#" onclick="alert('${issue.title}')" style="color:var(--link);">${issue.title}</a></li>`; });
    html += '</ul>';
    div.innerHTML = html;
  } catch(e) { document.getElementById('sidebarNotices').innerHTML = '<p>加载失败</p>'; }
}
loadSidebarNotices();

    function filterSoftwares() {
      let base = allSoftwares;
      if (currentCategory === 'all') base = base.filter(sw => !sw.isTool);
      else if (currentCategory === 'software') base = base.filter(sw => sw.isSoftware && !sw.isNotice);
      else if (currentCategory === 'tool') base = base.filter(sw => sw.isTool);
      else if (currentCategory === 'personal') return;
      const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!keyword) renderSoftwares(base);
      else renderSoftwares(base.filter(sw => sw.title.toLowerCase().includes(keyword) || (sw.description&&sw.description.toLowerCase().includes(keyword))));
    }

    function showAbout() { document.getElementById('aboutModal').classList.remove('hidden'); }
    function hideAbout() { document.getElementById('aboutModal').classList.add('hidden'); }
    function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); if (!document.getElementById('adminPanel').classList.contains('hidden')) loadPendingIssues(); }

    async function loadPendingIssues() {
      if (!adminToken) return;
      const res = await fetch(API + '?labels=pending&state=open&sort=created&direction=desc');
      const issues = await res.json(); const div = document.getElementById('pendingList');
      if (!issues.length) { div.innerHTML = '<p>暂无待审核</p>'; return; }
      let html = ''; issues.forEach(issue => { html += `<div class="card"><h3>${issue.title}</h3><p>${issue.body ? issue.body.substring(0,80) : ''}...</p><div style="margin-top:10px;"><button class="btn" onclick="approve(${issue.number})">通过</button><button class="btn" style="background:#e74c3c;margin-left:5px;" onclick="reject(${issue.number})">驳回</button></div></div>`; });
      div.innerHTML = html;
    }
    async function approve(number) {
      if (!adminToken) return;
      await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${number}/labels`, { method: 'PUT', headers: { Authorization: `token ${adminToken}` }, body: JSON.stringify({ labels: ['approved'] }) });
      alert('已通过'); loadPendingIssues(); loadSoftwares();
    }
    async function reject(number) {
      if (!adminToken) return;
      await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${number}`, { method: 'PATCH', headers: { Authorization: `token ${adminToken}` }, body: JSON.stringify({ state: 'closed', labels: ['rejected'] }) });
      alert('已驳回'); loadPendingIssues();
    }

    loadSoftwares();
// ========== 聊天功能（安全模式） ==========
(function() {
  try {
    if (typeof supabase === 'undefined') throw new Error('Supabase 未加载');

    async function loadChatHistory() {
      const { data, error } = await supabase
        .from('chat_messages')
        .select('*')
        .order('created_at', { ascending: true })
        .limit(50);
      if (data) {
        const box = document.getElementById('chat-messages');
        if (!box) return;
        box.innerHTML = '';
        data.forEach(m => addMessageToChat(m.email, m.message));
      }
    }

    function addMessageToChat(email, msg) {
      const box = document.getElementById('chat-messages');
      if (!box) return;
      const div = document.createElement('div');
      div.innerHTML = `<strong>${email}:</strong> ${msg}`;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    window.sendChat = async function() {
      const email = localStorage.getItem('authEmail');
      if (!email) {
        alert('请先登录后再发言');
        location.href = './login.html';
        return;
      }
      const input = document.getElementById('chat-input');
      const msg = input ? input.value.trim() : '';
      if (!msg) return;
      const { error } = await supabase
        .from('chat_messages')
        .insert({ email: email, message: msg });
      if (error) {
        alert('发送失败: ' + error.message);
      } else {
        input.value = '';
      }
    };

    // 订阅实时消息
    supabase
      .channel('chat-room')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, payload => {
        addMessageToChat(payload.new.email, payload.new.message);
      })
      .subscribe();

    // 延迟加载历史消息，确保 DOM 已就绪
    window.addEventListener('load', () => {
      setTimeout(loadChatHistory, 500);
    });

  } catch (e) {
    console.error('聊天功能初始化失败：', e);
  }
})();

  </script>
