<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>软件库</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8; --card-bg: #fffdf7; --text: #3e3232; --text-secondary: #6b5e5e;
      --border: #d4c9b5; --link: #8b5e3c; --btn-bg: #8b5e3c; --btn-hover: #6d4a2e;
      --shadow: 0 4px 8px rgba(0,0,0,0.04); --radius: 16px; --radius-sm: 8px;
      --header-bg: rgba(255,252,245,0.9); --announce-bg: #faf5e6; --announce-text: #5c4a2e;
      --notice-bg: #fff8ea; --notice-border: #e0b870; --notice-text: #5a4718;
      --nav-active-bg: #8b5e3c; --nav-active-text: white;
    }
    .dark {
      --bg: #1e1b16; --card-bg: #28241c; --text: #e0d7c6; --text-secondary: #b0a590;
      --border: #4a4034; --link: #c0956c; --btn-bg: #8b5e3c; --btn-hover: #6d4a2e;
      --shadow: 0 4px 8px rgba(255,255,255,0.03); --header-bg: rgba(30,27,22,0.9);
      --announce-bg: #2c281e; --announce-text: #c9b896; --notice-bg: #2c2616;
      --notice-border: #b8862c; --notice-text: #e0c478; --nav-active-bg: #8b5e3c;
      --nav-active-text: white;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; transition: 0.3s; min-height: 100vh; padding-bottom: 40px; }
    .container { max-width: 640px; margin: auto; padding: 0 16px; }
    .header { background: var(--header-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 14px 0; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
    .header-inner { max-width: 640px; margin: auto; padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
    .header-top { display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 26px; font-weight: 700; }
    .header-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .icon-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-secondary); border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: 0.2s; white-space: nowrap; font-weight: 500; box-shadow: inset 0 1px 2px rgba(255,255,255,0.5); }
    .icon-btn:hover { background: var(--border); color: var(--text); }
    .nav-bar { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0; scrollbar-width: none; }
    .nav-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-secondary); border-radius: 20px; padding: 6px 16px; font-size: 14px; cursor: pointer; white-space: nowrap; transition: 0.2s; font-weight: 500; }
    .nav-btn.active { background: var(--nav-active-bg); color: var(--nav-active-text); border-color: var(--nav-active-bg); }
    .search-box { width: 100%; padding: 10px 16px; margin: 8px 0 6px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--card-bg); color: var(--text); font-size: 15px; transition: border 0.2s; }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 20px; background: var(--btn-bg); color: white; border-radius: var(--radius-sm); font-weight: 600; border: none; cursor: pointer; font-size: 14px; text-decoration: none; transition: 0.2s; box-shadow: 0 2px 0 rgba(0,0,0,0.1); }
    .btn:hover { background: var(--btn-hover); }
    .card { background: var(--card-bg); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; box-shadow: var(--shadow); border: 1px solid var(--border); transition: transform 0.15s; }
    .card.notice { background: var(--notice-bg); border-color: var(--notice-border); color: var(--notice-text); }
    .card h3 { font-size: 18px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; font-weight: 600; }
    .desc { color: var(--text-secondary); font-size: 14px; margin-bottom: 12px; }
    .download-link { display: inline-flex; background: var(--link); color: white; padding: 6px 16px; border-radius: var(--radius-sm); font-size: 13px; text-decoration: none; font-weight: 500; }
    .card-actions { display: flex; gap: 18px; margin-top: 14px; font-size: 14px; flex-wrap: wrap; }
    .card-actions a { color: var(--link); font-weight: 500; }
    .comments-section { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; }
    .comment-item { border-bottom: 1px solid var(--border); padding: 10px 0; font-size: 14px; }
    .admin-panel { background: var(--card-bg); border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px; margin: 16px 0; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .modal-content { background: var(--card-bg); border-radius: var(--radius); padding: 24px; width: 90%; max-width: 420px; }
    .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 14px; }
    .footer { text-align: center; color: var(--text-secondary); font-size: 12px; margin-top: 30px; opacity: 0.6; }
    .hidden { display: none !important; }
    .announcement { background: var(--announce-bg); color: var(--announce-text); padding: 14px 18px; border-radius: 4px 12px 12px 4px; margin: 14px 0; font-size: 14px; border-left: 4px solid #d4a76a; }
    .badge { display: inline-block; background: #c0392b; color: white; border-radius: 4px; padding: 1px 6px; font-size: 11px; margin-left: 4px; }
    .type-badge { display: inline-block; border-radius: 4px; padding: 2px 8px; font-size: 11px; margin-right: 6px; color: white; }
    .badge-software { background: #6d8c6d; } .badge-tool { background: #8b6e5c; } .badge-notice { background: #c98e4e; }
    .card-icon { width: 28px; height: 28px; border-radius: 6px; object-fit: contain; }
  </style>
</head>
<body>  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <h1>软件库</h1>
        <div class="header-actions">
          <button class="icon-btn" onclick="toggleDark()" id="darkToggle">暗色模式</button>
          <button class="icon-btn" id="loginBtn" onclick="showLoginModal()">登录</button>
          <span id="userInfo" class="hidden" style="font-size:14px; margin-right:8px;"></span>
          <button class="icon-btn hidden" id="logoutBtn" onclick="logout()">退出</button>
          <span id="adminArea" class="hidden">
            <button class="icon-btn" onclick="toggleAdmin()">审核模式</button>
            <a href="https://github.com/ctctycyc/softlib/issues" class="icon-btn">后台</a>
          </span>
        </div>
      </div>
      <div class="nav-bar" id="navBar">
        <button class="nav-btn active" data-category="all">全部</button>
        <button class="nav-btn" data-category="software">软件</button>
        <button class="nav-btn" data-category="tool">工具</button>
        <button class="nav-btn" data-category="personal">个人</button>
      </div>
      <input type="text" class="search-box" id="searchInput" placeholder="搜索..." oninput="filterSoftwares()">
    </div>
</div>  <div class="container" style="margin-top:10px;">
    <div class="announcement">欢迎来到软件库！</div>
    <div id="adminPanel" class="admin-panel hidden"><h3>待审核内容</h3><div id="pendingList">加载中...</div></div>
    <div id="list"></div>
    <div class="footer" id="secretTrigger">✔zeci rjk</div>
  </div>
  <div id="aboutModal" class="modal hidden" onclick="hideAbout()">
    <div class="modal-content" onclick="event.stopPropagation()" style="text-align:center;">
      <h3>软件库</h3><p>测试版</p>
      <div style="margin:20px 0; padding:16px; background:var(--bg); border-radius:12px;">
        <p><strong>版本</strong><br>1.1</p><p><strong>管理员</strong><br>zeruan</p>
        <p><strong>联系邮箱</strong><br><a href="mailto:dghkkppp@qq.com">dghkkppp@qq.com</a></p>
      </div>
      <button class="btn" onclick="hideAbout()">关闭</button>
    </div>
  </div>
  <div id="authModal" class="modal hidden" onclick="closeAuthModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h3 id="authTitle">登录</h3>
      <input type="email" id="authEmail" placeholder="邮箱">
      <input type="password" id="authPassword" placeholder="密码">
      <p id="authError" style="color:red; font-size:13px; margin-top:8px;"></p>
      <div style="margin-top:10px; display:flex; gap:8px; justify-content:space-between;">
        <button class="btn" onclick="handleAuth()" id="authSubmitBtn">登录</button>
        <button class="btn" style="background:#aaa;" onclick="switchAuthMode()" id="switchModeBtn">没有账号？去注册</button>
      </div>
    </div>
  </div>  <script>
    const supabase = window.supabase.createClient('https://rgekpmuujozhkkctpdup.supabase.co', 'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr');
    const API = 'https://api.github.com/repos/ctctycyc/softlib/issues';
    const ADMIN_USERNAMES = ['zeruan'];
    let allSoftwares = [], currentCategory = 'all', adminToken = localStorage.getItem('adminToken'), isRegisterMode = false;

    function updateAuthUI() {
      supabase.auth.getSession().then(({ data: { session } }) => {
        if (session && session.user) {
          document.getElementById('loginBtn').classList.add('hidden');
          document.getElementById('userInfo').classList.remove('hidden');
          document.getElementById('logoutBtn').classList.remove('hidden');
          document.getElementById('userInfo').textContent = session.user.email;
        } else {
          document.getElementById('loginBtn').classList.remove('hidden');
          document.getElementById('userInfo').classList.add('hidden');
          document.getElementById('logoutBtn').classList.add('hidden');
        }
      });
    }   updateAuthUI();
    supabase.auth.onAuthStateChange(() => updateAuthUI());

    function showLoginModal() { document.getElementById('authModal').classList.remove('hidden'); }
    function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }
    function switchAuthMode() {
      isRegisterMode = !isRegisterMode;
      document.getElementById('authTitle').textContent = isRegisterMode ? '注册' : '登录';
      document.getElementById('authSubmitBtn').textContent = isRegisterMode ? '注册' : '登录';
      document.getElementById('switchModeBtn').textContent = isRegisterMode ? '已有账号？去登录' : '没有账号？去注册';
    }

    async function handleAuth() {
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value.trim();
      document.getElementById('authError').textContent = '';
      if (!email || !password) { document.getElementById('authError').textContent = '请输入邮箱和密码'; return; }     try {
        if (isRegisterMode) {
          const { data, error } = await supabase.auth.signUp({ email, password });
          if (error) throw error;
          alert('注册成功！');
          closeAuthModal();
          updateAuthUI();
        } else {
          const { error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
          closeAuthModal();
          updateAuthUI();
        }
      } catch (error) {
        document.getElementById('authError').textContent = error.message || '操作失败';
      }
    }
    async function logout() { await supabase.auth.signOut(); updateAuthUI(); }

    let clickCount = 0;
    document.getElementById('secretTrigger').addEventListener('click', () => {
      clickCount++;
      if (clickCount >= 5) {
        clickCount = 0;
        const input = prompt('管理员登录：请输入 GitHub Token');
        if (input && input.trim()) verifyAdminToken(input.trim());
      }
      setTimeout(() => clickCount = 0, 2000);
    });

    async function verifyAdminToken(token) {
      try {
        const res = await fetch('https://api.github.com/user', { headers: { Authorization: `token ${token}` } });
        if (res.ok) {
          adminToken = token; localStorage.setItem('adminToken', adminToken);
          alert('管理功能已激活！'); document.getElementById('adminArea').classList.remove('hidden');
        } else alert('Token 无效');
      } catch (e) { alert('网络错误'); }
    }
    document.getElementById('adminArea').classList.add('hidden');

    document.getElementById('navBar').addEventListener('click', e => {
      if (e.target.classList.contains('nav-btn')) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentCategory = e.target.dataset.category;
        renderFilteredSoftwares();
      }
    });

   function toggleDark() {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('darkMode', isDark);
      document.getElementById('darkToggle').textContent = isDark ? '亮色模式' : '暗色模式';
    }
    if (localStorage.getItem('darkMode') === 'true') { document.documentElement.classList.add('dark'); }

    function extractIconUrl(body) { /* ... same ... */ return null; }
    function getDefaultIcon(sw) { if (sw.isNotice) return '<span class="type-badge badge-notice">公告</span>'; if (sw.isTool) return '<span class="type-badge badge-tool">工具</span>'; return '<span class="type-badge badge-software">软件</span>'; }

    async function loadSoftwares() {
      try {
        const res = await fetch(API + '?labels=approved&state=open&sort=created&direction=desc&per_page=100');
        const issues = await res.json();
        allSoftwares = issues.map(issue => {
          let body = issue.body || '', downloadUrl = '', description = '';
          const lines = body.split('\n');
          for (let line of lines) {
            if (line.trim().startsWith('http')) { if (!/\.(png|jpg|jpeg|gif|svg|ico)(\?.*)?$/.test(line.trim())) downloadUrl = line.trim(); }
            else if (line.trim() && !description) description = line.trim();
          }
          const labels = issue.labels.map(l => l.name);
          const isNotice = labels.includes('notice'); const isTool = labels.includes('tool');
          return { id: issue.number, title: issue.title, description, downloadUrl: (isNotice ? '' : downloadUrl), htmlUrl: issue.html_url, isNotice, isTool, isSoftware: !isNotice && !isTool };
        });
        allSoftwares.sort((a, b) => a.isNotice ? -1 : 1);
        renderFilteredSoftwares();
      } catch(e) { document.getElementById('list').innerHTML = '<p>加载失败</p>'; }
    }
 function renderFilteredSoftwares() {
      let filtered = allSoftwares;
      if (currentCategory === 'all') filtered = allSoftwares.filter(sw => !sw.isTool);
      else if (currentCategory === 'software') filtered = allSoftwares.filter(sw => sw.isSoftware && !sw.isNotice);
      else if (currentCategory === 'tool') filtered = allSoftwares.filter(sw => sw.isTool);
      else if (currentCategory === 'personal') { document.getElementById('list').innerHTML = '<div class="card" style="text-align:center;"><h3>关于软件库</h3><button class="btn" onclick="showAbout()">查看详情</button></div>'; return; }
      renderSoftwares(filtered);
    }

    function renderSoftwares(softwares) {
      const listDiv = document.getElementById('list');
      if (softwares.length === 0) { listDiv.innerHTML = '<div class="card">暂无内容</div>'; return; }
      let html = '';
      softwares.forEach(sw => {
        const iconHtml = sw.iconUrl ? `<img class="card-icon" src="${sw.iconUrl}" onerror="this.style.display='none'">` : getDefaultIcon(sw);
        const downloadBtn = sw.downloadUrl && !sw.isNotice ? `<a class="download-link" href="${sw.downloadUrl}" target="_blank">下载</a>` : '';
        html += `<div class="card${sw.isNotice ? ' notice' : ''}"><h3>${iconHtml}${sw.title}</h3><div class="desc">${sw.description || ''}</div>${downloadBtn}<div class="card-actions"><a href="#" onclick="toggleComments(${sw.id}); return false;">查看评论</a><a href="https://github.com/ctctycyc/softlib/issues/${sw.id}" target="_blank">发表评论</a></div><div id="comments-${sw.id}" class="comments-section hidden"><div id="comment-list-${sw.id}"></div></div></div>`;
      });
      listDiv.innerHTML = html;
    }

    async function loadComments(issueNumber) { /* ... same as before ... */ }
    function toggleComments(id) { /* ... */ }
    function filterSoftwares() { /* ... */ }
    function showAbout() { document.getElementById('aboutModal').classList.remove('hidden'); }
    function hideAbout() { document.getElementById('aboutModal').classList.add('hidden'); }
    function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); }

    loadSoftwares();
  </script>
</body>
</html>
