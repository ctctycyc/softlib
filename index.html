<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>软件库</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --link: #3b82f6;
      --btn-bg: #10b981;
      --btn-hover: #059669;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 4px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 10px 30px rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-sm: 10px;
      --header-bg: rgba(255,255,255,0.72);
      --blur: blur(20px);
    }
    .dark {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #334155;
      --link: #60a5fa;
      --btn-bg: #22c55e;
      --btn-hover: #16a34a;
      --shadow-sm: 0 1px 2px rgba(255,255,255,0.03);
      --shadow: 0 4px 12px rgba(255,255,255,0.03);
      --shadow-lg: 0 10px 30px rgba(255,255,255,0.05);
      --header-bg: rgba(15,23,42,0.75);
      --blur: blur(20px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
      padding-bottom: 40px;
    }
    .container { max-width: 640px; margin: 0 auto; padding: 0 16px; }

    /* 顶部导航 */
    .header {
      background: var(--header-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .header-inner {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 640px;
      margin: 0 auto;
      padding: 0 16px;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .icon-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 30px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      box-shadow: var(--shadow-sm);
    }
    .icon-btn:hover { background: var(--border); transform: translateY(-1px); }
    .icon-btn.active { background: var(--link); color: white; border-color: var(--link); }

    /* 搜索 */
    .search-box {
      width: 100%;
      padding: 12px 18px;
      margin: 12px 0 8px;
      border: 1px solid var(--border);
      border-radius: 30px;
      background: var(--card-bg);
      color: var(--text);
      font-size: 15px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s;
    }
    .search-box:focus {
      outline: none;
      border-color: var(--link);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    /* 按钮 */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 24px;
      background: var(--btn-bg);
      color: white;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-size: 15px;
      text-decoration: none;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(16,185,129,0.25);
    }
    .btn:hover { background: var(--btn-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16,185,129,0.35); }
    .btn-block { width: 100%; margin: 12px 0; }
    .btn-danger { background: #ef4444; box-shadow: 0 4px 12px rgba(239,68,68,0.25); }
    .btn-danger:hover { background: #dc2626; }

    /* 卡片 */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .card h3 { font-size: 20px; margin-bottom: 8px; font-weight: 600; }
    .desc { color: var(--text-secondary); font-size: 14px; margin-bottom: 12px; line-height: 1.5; }
    .download-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--link);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      text-decoration: none;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(59,130,246,0.3);
      transition: all 0.2s;
    }
    .download-link:hover { filter: brightness(1.1); }
    .card-actions { display: flex; gap: 20px; margin-top: 14px; font-size: 14px; flex-wrap: wrap; }
    .card-actions a { color: var(--link); font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }

    /* 评论区 */
    .comments-section { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; }

    /* 审核面板 */
    .admin-panel {
      background: var(--card-bg);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin: 16px 0;
      box-shadow: var(--shadow);
    }
    .admin-panel h3 { font-size: 18px; margin-bottom: 15px; }

    /* 弹窗 */
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .modal-content {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      width: 90%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }
    .modal-content h3 { margin-bottom: 18px; font-size: 22px; }
    .modal-content input, .modal-content textarea {
      width: 100%; padding: 12px; margin-bottom: 12px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg); color: var(--text); font-size: 15px;
    }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }

    .footer { text-align: center; color: var(--text-secondary); font-size: 12px; margin-top: 30px; opacity: 0.7; }
    .hidden { display: none !important; }

    /* 响应式微调 */
    @media (max-width: 480px) {
      .header h1 { font-size: 24px; }
      .card { padding: 16px; }
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <h1>软件库</h1>
        <div class="header-actions">
          <button class="icon-btn" onclick="toggleDark()" id="darkToggle">暗色模式</button>
          <span id="adminArea" class="hidden">
            <button class="icon-btn" onclick="toggleAdmin()" id="adminToggle">审核模式</button>
          </span>
          <button class="icon-btn" id="setTokenBtn" onclick="promptToken()">设置Token</button>
          <a href="https://github.com/ctctycyc/softlib/issues" target="_blank" class="icon-btn" style="text-decoration:none;">后台</a>
        </div>
      </div>
      <input type="text" class="search-box" id="searchInput" placeholder="搜索软件..." oninput="filterSoftwares()" />
    </div>
  </div>

  <div class="container" style="margin-top: 12px;">
    <a class="btn btn-block" href="#" onclick="openSubmitForm(); return false;">提交新软件</a>

   <!-- 提交表单弹窗 -->
    <div id="submitModal" class="modal hidden" onclick="closeSubmitForm()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <h3>提交新软件</h3>
        <input type="text" id="swName" placeholder="软件名称（必填）">
        <textarea id="swDesc" placeholder="描述（选填）" rows="3"></textarea>
        <input type="text" id="swUrl" placeholder="下载链接（必填）">
        <div class="modal-actions">
          <button class="btn" style="background:#94a3b8;" onclick="closeSubmitForm()">取消</button>
          <button class="btn" onclick="submitSoftware()">提交审核</button>
        </div>
      </div>
    </div>

    <!-- 审核面板 -->
    <div id="adminPanel" class="admin-panel hidden">
      <h3>待审核软件</h3>
      <div id="pendingList">加载中...</div>
    </div>

    <!-- 软件列表 -->
    <div id="list"></div>

    <div class="footer">由 GitHub Issues 驱动 · 评论系统 Cusdis</div>
  </div>

  <!-- Cusdis 官方 SDK 方式，更稳定 -->
  <script async src="https://cusdis.com/js/cusdis.es.js"></script>
  <script>
    const CUSDIS_APP_ID = 'bea65001-cdd3-483a-8b75-7749040db913';
    function loadCusdis(targetId, pageId, pageUrl, pageTitle) {
      const container = document.getElementById(targetId);
      if (!container) return;
      // 创建 Cusdis 需要的 div，使用官方属性
      container.innerHTML = `<div id="cusdis-${pageId}" data-app-id="${CUSDIS_APP_ID}" data-page-id="${pageId}" data-page-url="${pageUrl}" data-page-title="${pageTitle}" data-theme="auto"></div>`;
      // 如果 SDK 已加载，立即渲染；否则等待脚本加载完成自动渲染
      if (window.CUSDIS) {
        window.CUSDIS.renderTo(document.getElementById(`cusdis-${pageId}`));
      }
    }
    // 如果 SDK 已加载，重新渲染已存在的评论（切换时有用）
    window.addEventListener('load', () => {
      if (window.CUSDIS) {
        // 可以预留
      }
    });
  </script>

  <script>
    const ADMIN_USERNAMES = ['ctctycyc'];
    const WORKER_URL = 'https://softlib-submit.dghkkppp.workers.dev';
    const API = 'https://api.github.com/repos/ctctycyc/softlib/issues';
    let allSoftwares = [];
    let adminToken = localStorage.getItem('adminToken');

    function initTokenUI() {
      if (adminToken) {
        document.getElementById('adminArea').classList.remove('hidden');
        document.getElementById('setTokenBtn').classList.add('hidden');
      } else {
        document.getElementById('setTokenBtn').classList.remove('hidden');
      }
    }
    window.promptToken = function() {
      const input = prompt('请输入你的 GitHub Token：');
      if (input && input.trim()) {
        adminToken = input.trim();
        localStorage.setItem('adminToken', adminToken);
        alert('Token 已保存！');
        initTokenUI();
        if (!document.getElementById('adminPanel').classList.contains('hidden')) loadPendingIssues();
      }
    };
    initTokenUI();

    function toggleDark() {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('darkMode', isDark);
      document.getElementById('darkToggle').textContent = isDark ? '亮色模式' : '暗色模式';
    }
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark');
      document.getElementById('darkToggle').textContent = '亮色模式';
    }

    async function loadSoftwares() {
      try {
        const res = await fetch(API + '?labels=approved&state=open&sort=created&direction=desc');
        const issues = await res.json();
        allSoftwares = issues.map(issue => {
          let body = issue.body || '';
          let downloadUrl = '', description = '';
          const lines = body.split('\n');
          for (let line of lines) {
            if (line.trim().startsWith('http')) downloadUrl = line.trim();
            else if (line.trim() && !description) description = line.trim();
          }
          return { id: issue.number, title: issue.title, description, downloadUrl, htmlUrl: issue.html_url };
        });
        renderSoftwares(allSoftwares);
      } catch(e) {
        document.getElementById('list').innerHTML = '<p style="color:red;">加载失败，请刷新重试</p>';
      }
    }

    function renderSoftwares(softwares) {
      const listDiv = document.getElementById('list');
      if (softwares.length === 0) {
        listDiv.innerHTML = '<div class="card" style="text-align:center;color:var(--text-secondary);">暂无软件，快去提交吧</div>';
        return;
      }
      let html = '';
      softwares.forEach(sw => {
        html += `<div class="card">
          <h3>${sw.title}</h3>
          <div class="desc">${sw.description || '暂无描述'}</div>
          ${sw.downloadUrl ? `<a class="download-link" href="${sw.downloadUrl}" target="_blank">下载</a>` : ''}
          <div class="card-actions">
            <a href="#" onclick="toggleComments(${sw.id}); return false;">评论</a>
            <a href="${sw.htmlUrl}" target="_blank">详情</a>
          </div>
          <div id="comments-${sw.id}" class="comments-section hidden">
            <div id="cusdis-${sw.id}"></div>
          </div>
        </div>`;
      });
      listDiv.innerHTML = html;
    }

    function toggleComments(id) {
      const commentsDiv = document.getElementById(`comments-${id}`);
      if (!commentsDiv) return;
      const toggleLink = window.event?.target;
      if (!commentsDiv.classList.contains('hidden')) {
        commentsDiv.classList.add('hidden');
        if (toggleLink) toggleLink.textContent = '评论';
        return;
    }
           if (toggleLink) toggleLink.textContent = '收起评论';
      commentsDiv.classList.remove('hidden');
      const pageId = `software-${id}`;
      loadCusdis(`cusdis-${id}`, pageId, `https://ctctycyc.github.io/softlib/#!${pageId}`, `软件 #${id}`);
    }

    function filterSoftwares() {
      const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!keyword) { renderSoftwares(allSoftwares); return; }
      renderSoftwares(allSoftwares.filter(sw => 
        sw.title.toLowerCase().includes(keyword) || 
        (sw.description && sw.description.toLowerCase().includes(keyword))
      ));
    }

    function openSubmitForm() { document.getElementById('submitModal').classList.remove('hidden'); }
    function closeSubmitForm() { document.getElementById('submitModal').classList.add('hidden'); }
    async function submitSoftware() {
      const name = document.getElementById('swName').value.trim();
      const desc = document.getElementById('swDesc').value.trim();
      const url = document.getElementById('swUrl').value.trim();
      if (!name || !url) return alert('软件名称和下载链接不能为空');
      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: name, description: desc, downloadUrl: url })
        });
        const data = await res.json();
        if (data.success) {
          alert('提交成功，等待管理员审核！');
document.getElementById('swName').value = '';
          document.getElementById('swDesc').value = '';
          document.getElementById('swUrl').value = '';
          closeSubmitForm();
          loadSoftwares();
        } else {
          alert('提交失败：' + (data.error || '未知错误'));
        }
      } catch (e) {
        alert('网络错误，请稍后再试');
      }
    }

    function toggleAdmin() {
      const panel = document.getElementById('adminPanel');
      panel.classList.toggle('hidden');
      if (!panel.classList.contains('hidden')) {
        loadPendingIssues();
        document.getElementById('adminToggle').textContent = '关闭审核';
      } else {
        document.getElementById('adminToggle').textContent = '审核模式';
      }
    }

    async function loadPendingIssues() {
      if (!adminToken) {
        document.getElementById('pendingList').innerHTML = '<p>请先点击“设置Token”输入Token。</p>';
        return;
      }
      const res = await fetch(API + '?labels=pending&state=open&sort=created&direction=desc');
      const issues = await res.json();
      const div = document.getElementById('pendingList');
      if (issues.length === 0) {
        div.innerHTML = '<p>暂无待审核软件</p>';
        return;
      }
      let html = '';
      issues.forEach(issue => {
        html += `<div class="card" style="padding:14px;">
          <h3 style="font-size:18px;">${issue.title}</h3>
          <p style="font-size:14px;color:var(--text-secondary);">${issue.body ? issue.body.substring(0,80) : ''}...</p>
          <div style="margin-top:12px; display:flex; gap:8px;">
            <button class="btn" onclick="approve(${issue.number})">通过</button>
            <button class="btn btn-danger" onclick="reject(${issue.number})">驳回</button>
          </div>
        </div>`;
      });
      div.innerHTML = html;
    }

  async function approve(number) {
      if (!adminToken) return alert('Token 未设置');
      await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${number}/labels`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${adminToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ labels: ['approved'] })
      });
      alert('已通过');
      loadPendingIssues();
      loadSoftwares();
    }

    async function reject(number) {
      if (!adminToken) return alert('Token 未设置');
      await fetch(`https://api.github.com/repos/ctctycyc/softlib/issues/${number}`, {
        method: 'PATCH',
        headers: { 'Authorization': `token ${adminToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ state: 'closed', labels: ['rejected'] })
      });
      alert('已驳回');
      loadPendingIssues();
    }

    loadSoftwares();
  </script>
</body>
</html>
