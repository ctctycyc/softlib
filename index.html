<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>软件库</title>
<style>
  :root {
    --bg: #fafafa;
    --card-bg: #ffffff;
    --text: #333;
    --text-secondary: #555;
    --border: #ddd;
    --link: #1a73e8;
    --btn-bg: #2ea44f;
    --btn-hover: #22863a;
    --shadow: 0 1px 3px rgba(0,0,0,0.05);
  }
  .dark {
    --bg: #1e1e1e;
    --card-bg: #2a2a2a;
    --text: #e0e0e0;
    --text-secondary: #aaa;
    --border: #444;
    --link: #8ab4f8;
    --btn-bg: #3fb950;
    --btn-hover: #2ea043;
    --shadow: 0 1px 3px rgba(255,255,255,0.05);
  }
  body {
    font-family: sans-serif;
    padding: 10px;
    max-width: 600px;
    margin: 0 auto;
    background: var(--bg);
    color: var(--text);
    transition: background 0.3s, color 0.3s;
  }
  a { color: var(--link); text-decoration: none; }
  .btn {
    display: inline-block;
    padding: 10px 20px;
    background: var(--btn-bg);
    color: white;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    font-size: 14px;
  }
  .btn:hover { background: var(--btn-hover); }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .header h1 { margin: 0; font-size: 24px; }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .search-box {
    width: 100%;
    padding: 8px;
    margin: 10px 0;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--card-bg);
    color: var(--text);
    box-sizing: border-box;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    box-shadow: var(--shadow);
    transition: background 0.3s, border 0.3s;
  }
  .card h3 { margin: 0 0 5px; font-size: 18px; }
  .desc { color: var(--text-secondary); font-size: 14px; margin: 5px 0; }
  .link { font-size: 14px; word-break: break-all; margin: 5px 0; }
  .comments-section {
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .comment {
    border-bottom: 1px solid var(--border);
    padding: 8px 0;
    font-size: 14px;
  }
  .comment:last-child { border-bottom: none; }
  .comment strong { color: var(--link); }
  .toggle-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .footer { text-align: center; color: var(--text-secondary); font-size: 12px; margin-top: 20px; }
  .loading { text-align: center; color: var(--text-secondary); }
  .error { color: red; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="header">
  <h1>软件库</h1>
  <div class="header-actions">
    <button class="toggle-btn" onclick="toggleDark()" id="darkToggle">夜间模式</button>
    <a href="https://github.com/ctctycyc/softlib/issues" target="_blank" style="font-size:14px;">管理后台</a>
  </div>
</div>

<input type="text" class="search-box" id="searchInput" placeholder="搜索软件..." oninput="filterSoftwares()" />

<a class="btn" href="https://github.com/ctctycyc/softlib/issues/new?labels=pending" target="_blank" style="display:block;text-align:center;margin:10px 0;">提交新软件</a>

<div id="list">加载中...</div>
<div class="footer">Powered by GitHub Issues</div>

<script>
const API = 'https://api.github.com/repos/ctctycyc/softlib/issues';
let allSoftwares = [];

// 夜间模式切换
function toggleDark() {
  document.documentElement.classList.toggle('dark');
  const isDark = document.documentElement.classList.contains('dark');
  localStorage.setItem('darkMode', isDark);
  document.getElementById('darkToggle').textContent = isDark ? '日间模式' : '夜间模式';
}

// 初始化夜间模式
if (localStorage.getItem('darkMode') === 'true') {
  document.documentElement.classList.add('dark');
  document.getElementById('darkToggle').textContent = '日间模式';
} else {
  document.getElementById('darkToggle').textContent = '夜间模式';
}

// 加载软件列表
async function loadSoftwares() {
  try {
    const res = await fetch(API + '?labels=approved&state=open&sort=created&direction=desc');
    const issues = await res.json();
    allSoftwares = issues.map(issue => {
      let body = issue.body || '';
      let downloadUrl = '';
      let description = '';
      const lines = body.split('\n');
      for (let line of lines) {
        if (line.trim().startsWith('http')) downloadUrl = line.trim();
        else if (line.trim() && !description) description = line.trim();
      }
      return { id: issue.number, title: issue.title, description, downloadUrl, commentsUrl: issue.comments_url, htmlUrl: issue.html_url };
    });
    renderSoftwares(allSoftwares);
  } catch(e) {
    document.getElementById('list').innerHTML = '<p class="error">加载失败，请刷新重试</p>';
  }
}

// 渲染软件列表
function renderSoftwares(softwares) {
  const listDiv = document.getElementById('list');
  if (softwares.length === 0) {
    listDiv.innerHTML = '<p class="loading">暂无软件</p>';
    return;
  }
  let html = '';
  softwares.forEach(sw => {
    html += `<div class="card" id="card-${sw.id}">
      <h3>${sw.title}</h3>
      <div class="desc">${sw.description || '无描述'}</div>
      <div class="link">
        ${sw.downloadUrl ? `<a href="${sw.downloadUrl}" target="_blank">下载链接</a>` : ''}
      </div>
      <div style="margin-top:8px;">
        <a href="#" onclick="toggleComments(${sw.id}, '${sw.commentsUrl}'); return false;" style="font-size:14px;" id="toggle-link-${sw.id}">查看评论</a>
        <a href="${sw.htmlUrl}" target="_blank" style="font-size:13px;color:var(--text-secondary);margin-left:10px;">在 GitHub 上评论</a>
      </div>
      <div id="comments-${sw.id}" class="comments-section hidden"></div>
    </div>`;
  });
  listDiv.innerHTML = html;
}

// 切换评论显示
async function toggleComments(id, commentsUrl) {
  const commentsDiv = document.getElementById(`comments-${id}`);
  const toggleLink = document.getElementById(`toggle-link-${id}`);
  if (!commentsDiv.classList.contains('hidden')) {
    commentsDiv.classList.add('hidden');
    toggleLink.textContent = '查看评论';
    return;
  }
  // 显示评论
  toggleLink.textContent = '隐藏评论';
  if (commentsDiv.dataset.loaded === 'true') {
    commentsDiv.classList.remove('hidden');
    return;
  }
  // 加载评论
  commentsDiv.innerHTML = '<p class="loading">加载评论中...</p>';
  commentsDiv.classList.remove('hidden');
  try {
    const res = await fetch(commentsUrl);
    const comments = await res.json();
    let html = '';
    if (comments.length === 0) {
      html = '<p style="color:var(--text-secondary);">暂无评论</p>';
    } else {
      comments.forEach(c => {
        html += `<div class="comment"><strong>${c.user.login}</strong>: ${c.body}</div>`;
      });
    }
    commentsDiv.innerHTML = html;
    commentsDiv.dataset.loaded = 'true';
  } catch(e) {
    commentsDiv.innerHTML = '<p class="error">加载评论失败</p>';
  }
}

// 搜索过滤
function filterSoftwares() {
  const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!keyword) {
    renderSoftwares(allSoftwares);
    return;
  }
  const filtered = allSoftwares.filter(sw => 
    sw.title.toLowerCase().includes(keyword) || 
    (sw.description && sw.description.toLowerCase().includes(keyword))
  );
  renderSoftwares(filtered);
}

// 初始加载
loadSoftwares();
</script>
</body>
</html>
