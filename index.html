<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件库 · 社区</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #f3f5f9; --card: #ffffff; --text: #2c3e50; --sub: #5a6b7a; --muted: #9099a8;
            --border: #e2e8f0; --accent: #4a6fa5; --radius: 8px;
            --shadow: 0 2px 6px rgba(0,0,0,0.04); --shadow-hover: 0 8px 20px rgba(0,0,0,0.08);
            --danger: #d88a8a; --success: #7bb89e; --btn: #5b8cbd; --btn-hover: #4876a8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui; background: var(--bg); color: var(--text); line-height: 1.6; font-size: 14px; padding-bottom: 60px; }
        .top-bar { background: var(--card); padding: 10px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; font-weight: 700; color: #2c4a6e; cursor: default; }
        .container { max-width: 800px; margin: 0 auto; padding: 16px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
        .card h3 { font-size: 1rem; color: #1e2d3d; margin-bottom: 4px; }
        .card .desc { font-size: 0.88rem; color: var(--sub); }
        .card .meta { font-size: 0.76rem; color: var(--muted); margin-top: 6px; }
        .btn { display: inline-block; background: var(--btn); color: #fff; border: none; padding: 6px 16px; border-radius: 18px; cursor: pointer; font-size: 0.85rem; transition: background 0.2s; }
        .btn:hover { background: var(--btn-hover); }
        .btn-sm { padding: 4px 12px; font-size: 0.8rem; }
        .btn-danger { background: var(--danger); } .btn-success { background: var(--success); }
        .btn-outline { background: transparent; color: var(--sub); border: 1px solid var(--border); }
        .hidden { display: none !important; }
        .input-group { display: flex; gap: 8px; margin-bottom: 12px; }
        .input-group input, .input-group textarea { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; background: #fff; color: var(--text); }
        .input-group textarea { min-height: 80px; resize: vertical; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 100; }
        .bottom-nav .tab { flex: 1; text-align: center; padding: 8px 0; color: var(--muted); font-size: 0.72rem; cursor: pointer; transition: color 0.2s; }
        .bottom-nav .tab i { font-size: 1.3rem; display: block; margin-bottom: 2px; }
        .bottom-nav .tab.active { color: var(--accent); font-weight: 600; }
        .admin-badge { background: linear-gradient(135deg, #7bb89e, #5ea386); color: #fff; padding: 1px 6px; border-radius: 4px; font-size: 0.7rem; margin-left: 4px; }
        .comment-item { padding: 10px 0; border-bottom: 1px solid #f0f4f8; font-size: 0.9rem; }
        .comment-item .author { font-weight: 600; color: var(--accent); }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.15); z-index: 200; }
        .drawer-panel { position: fixed; right: 0; top: 0; height: 100%; width: 320px; background: var(--card); z-index: 201; padding: 20px; overflow-y: auto; box-shadow: -4px 0 16px rgba(0,0,0,0.06); }
    </style>
</head>
<body>
<div class="top-bar" id="logo-text">软件库</div>
<div class="container" id="main-content">
    <div id="page-home"><h2 style="margin-bottom:12px;">软件</h2><div id="software-list"><div class="card">加载中...</div></div></div>
    <div id="page-forum" class="hidden">
        <div id="category-list"></div>
        <div id="post-list-section" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <button class="btn btn-outline btn-sm" onclick="backToCategories()">返回板块</button>
                <button class="btn btn-sm" onclick="showNewPost()"><i class="fas fa-pen"></i> 发帖</button>
            </div>
            <div id="post-list"></div>
            <div id="new-post-form" class="hidden">
                <h3 style="margin-bottom:8px;">发新帖</h3>
                <div class="input-group"><input id="post-title" placeholder="标题"></div>
                <div class="input-group"><textarea id="post-content" placeholder="内容..."></textarea></div>
                <button class="btn" onclick="createPost()">发布</button><button class="btn btn-outline" onclick="hideNewPost()">取消</button>
                <div id="post-error" style="color:red;margin-top:8px;"></div>
            </div>
        </div>
        <div id="page-detail" class="hidden">
            <button class="btn btn-outline btn-sm" onclick="backToPosts()" style="margin-bottom:12px;">返回帖子</button>
     <div id="detail-content"></div>
            <h3 style="margin-top:16px;">回复</h3>
            <div id="comments-list"></div>
            <div class="input-group" style="margin-top:12px;"><textarea id="comment-content" placeholder="写下你的回复..."></textarea></div>
            <button class="btn" onclick="addComment()">发表回复</button>
        </div>
    </div>
    <div id="page-messages" class="hidden"><h2 style="margin-bottom:12px;">消息</h2><div id="message-list"><p style="color:var(--muted);">暂无新消息</p></div></div>
    <div id="page-profile" class="hidden">
        <h2 style="margin-bottom:12px;">个人</h2>
        <div class="card">
            <p>昵称：<strong id="profile-nickname"></strong></p>
            <p>身份：<span id="profile-badge"></span></p>
            <div id="admin-panel" class="hidden" style="margin-top:12px;">
                <h4>管理面板</h4>
                <div class="input-group"><input id="admin-rename-old" placeholder="旧昵称"><input id="admin-rename-new" placeholder="新昵称"><button class="btn btn-sm" onclick="adminRename()">改昵称</button></div>
                <div class="input-group"><input id="admin-category-old" placeholder="旧板块名"><input id="admin-category-new" placeholder="新板块名"><button class="btn btn-sm" onclick="adminRenameCategory()">改板块名</button></div>
                <button class="btn btn-danger btn-sm" onclick="showBannedList()">封禁名单</button>
            </div>
        </div>
    </div>
</div><div class="bottom-nav">
    <div class="tab active" data-tab="home"><i class="fas fa-download"></i>软件</div>
    <div class="tab" data-tab="forum"><i class="fas fa-comments"></i>广场</div>
    <div class="tab" data-tab="messages"><i class="fas fa-bell"></i>消息</div>
    <div class="tab" data-tab="profile"><i class="fas fa-user"></i>个人</div>
</div>
<div id="drawer-overlay" class="drawer-overlay hidden" onclick="closeDrawer()"></div>
<div id="drawer-panel" class="drawer-panel hidden"><button class="btn btn-outline btn-sm" style="margin-bottom:12px;" onclick="closeDrawer()">关闭</button><div id="drawer-content"></div></div><script>
    const SUPABASE_URL = 'https://rgekpmuujozhkkctpdup.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr';
    const WORKER_URL = 'https://softlib-submit.dghkkppp.workers.dev';

    let isAdmin = localStorage.getItem('isAdmin') === 'true';
    let nickname = localStorage.getItem('custom_nickname') || ('游客' + Math.floor(Math.random()*9000+1000));
    if (!localStorage.getItem('custom_nickname')) localStorage.setItem('custom_nickname', nickname);
    let currentCategoryId = null, currentPostId = null;

    // 页面切换
    function showTab(tab) {
        ['home','forum','messages','profile'].forEach(t => document.getElementById('page-'+t).classList.add('hidden'));
        document.getElementById('page-'+tab).classList.remove('hidden');
        document.querySelectorAll('.bottom-nav .tab').forEach(el => el.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
        if (tab === 'home') loadSoftwares();
        if (tab === 'forum') loadCategories();
        if (tab === 'messages') loadMessages();
        if (tab === 'profile') renderProfile();
    }
    document.querySelectorAll('.bottom-nav .tab').forEach(el => el.addEventListener('click', () => showTab(el.dataset.tab)));

    function backToCategories() { document.getElementById('category-list').classList.remove('hidden'); document.getElementById('post-list-section').classList.add('hidden'); document.getElementById('page-detail').classList.add('hidden'); }
    function backToPosts() { document.getElementById('page-detail').classList.add('hidden'); document.getElementById('post-list-section').classList.remove('hidden'); }
    function showNewPost() { document.getElementById('new-post-form').classList.remove('hidden'); }
    function hideNewPost() { document.getElementById('new-post-form').classList.add('hidden'); }// ===== 管理员验证 =====
let titleClicks = 0, clickTimer = null;
document.getElementById('logo-text').addEventListener('click', () => {
    titleClicks++; if (clickTimer) clearTimeout(clickTimer);
    clickTimer = setTimeout(() => titleClicks = 0, 2000);
    if (titleClicks >= 5) { titleClicks = 0; isAdmin ? logoutAdmin() : verifyAdmin(); }
});
async function verifyAdmin() {
    const pwd = prompt('管理员密码：'); if (!pwd) return;
    const res = await fetch(WORKER_URL+'/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd, nickname})});
    const data = await res.json();
    if (data.valid) { isAdmin = true; localStorage.setItem('isAdmin','true'); alert('管理员已激活'); showTab('profile'); renderProfile(); }
    else alert('密码错误');
}
async function logoutAdmin() { isAdmin = false; localStorage.removeItem('isAdmin'); await fetch(WORKER_URL+'/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nickname})}); alert('已退出管理'); showTab('profile'); renderProfile(); }

// ===== 管理标识（所有人可见） =====
async function getAdminNicknames() {
    try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/admin_sessions?expires_at=gt.' + new Date().toISOString() + '&select=nickname', { headers: { 'apikey': SUPABASE_KEY } });
        const data = await res.json(); return Array.isArray(data) ? [...new Set(data.map(d=>d.nickname))] : [];
    } catch (e) { return []; }
}
async function getDisplayName(name) {
    const admins = await getAdminNicknames();
    return admins.includes(name) ? `${name} <span class="admin-badge">管理</span>` : name;
    }// ===== 软件库 =====
async function loadSoftwares() {
    const div = document.getElementById('software-list'); div.innerHTML = '<div class="card">加载中...</div>';
    try {
        const res = await fetch('https://api.github.com/repos/ctctycyc/softlib/issues?labels=approved&state=open&sort=created&direction=desc&per_page=20');
        if (!res.ok) throw new Error('HTTP '+res.status);
        const issues = await res.json();
        if (!Array.isArray(issues) || !issues.length) { div.innerHTML = '<div class="card">暂无软件</div>'; return; }
        div.innerHTML = issues.map(i => {
            const body = i.body||'', lines = body.split('\n').filter(l=>l.trim()), desc = lines.find(l=>!l.startsWith('http'))||'', link = lines.find(l=>l.startsWith('http'))||'';
            return `<div class="card"><h3>${i.title}</h3><div class="desc">${desc}</div>${link?`<a href="${link}" target="_blank" class="btn btn-sm" style="margin-top:8px;">下载</a>`:''}</div>`;
        }).join('');
    } catch (e) { div.innerHTML = '<div class="card">软件加载失败：'+e.message+'</div>'; }
}

// ===== 板块 =====
async function loadCategories() {
    backToCategories();
    const div = document.getElementById('category-list'); div.innerHTML = '<div class="card">加载中...</div>';
    try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/categories?select=*', { headers: { 'apikey': SUPABASE_KEY } });
        if (!res.ok) throw new Error('HTTP '+res.status);
        const data = await res.json();
        if (!Array.isArray(data) || !data.length) { div.innerHTML = '<div class="card">暂无板块</div>'; return; }
        div.innerHTML = data.map(c => `<div class="card" onclick="openCategory(${c.id},'${c.name}')"><h3>${c.name}</h3><div class="desc">${c.description||''}</div></div>`).join('');
    } catch (e) { div.innerHTML = '<div class="card">板块加载失败：'+e.message+'</div>'; }
}
async function openCategory(id, name) { currentCategoryId = id; document.getElementById('category-list').classList.add('hidden'); document.getElementById('post-list-section').classList.remove('hidden'); loadPosts(); }// ===== 帖子列表 =====
async function loadPosts() {
    const div = document.getElementById('post-list'); div.innerHTML = '<div class="card">加载中...</div>';
    try {
        let url = SUPABASE_URL + '/rest/v1/posts?select=*&order=created_at.desc.nullslast&limit=80';
        if (currentCategoryId) url += '&category_id=eq.' + currentCategoryId;
        const res = await fetch(url, { headers: { 'apikey': SUPABASE_KEY } });
        if (!res.ok) throw new Error('HTTP '+res.status);
        const data = await res.json();
        if (!Array.isArray(data) || !data.length) { div.innerHTML = '<div class="card">暂无帖子</div>'; return; }
        div.innerHTML = await Promise.all(data.map(async p => {
            const display = await getDisplayName(p.author||'未知');
            const time = p.created_at ? new Date(p.created_at).toLocaleString('zh-CN') : '';
            return `<div class="card" onclick="openPost(${p.id})"><h3>${p.title||'(无标题)'}</h3><div class="desc">${(p.content||'').substring(0,100)}...</div><div class="meta">${display} · ${time}</div></div>`;
        })).then(arr => arr.join(''));
    } catch (e) { div.innerHTML = '<div class="card">帖子加载失败：'+e.message+'</div>'; }
            }// ===== 发帖 =====
async function createPost() {
    if (await isBannedNickname(nickname)) { alert('您已被封禁，无法发帖'); return; }
    const title = document.getElementById('post-title').value.trim(), content = document.getElementById('post-content').value.trim(), err = document.getElementById('post-error');
    if (!title || !content) { err.textContent = '标题和内容不能为空'; return; }
    try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/posts', { method:'POST', headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Prefer':'return=minimal'}, body:JSON.stringify({title,content,author:nickname,category_id:currentCategoryId}) });
        if (!res.ok) throw new Error('HTTP '+res.status);
        document.getElementById('post-title').value = ''; document.getElementById('post-content').value = ''; hideNewPost(); loadPosts();
    } catch (e) { err.textContent = '发布失败：'+e.message; }
}

// ===== 帖子详情 =====
async function openPost(id) {
    currentPostId = id;
    document.getElementById('post-list-section').classList.add('hidden');
    document.getElementById('page-detail').classList.remove('hidden');
    const detailDiv = document.getElementById('detail-content');
    detailDiv.innerHTML = '<div class="card">加载中...</div>';
    try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/posts?id=eq.'+id, { headers:{'apikey':SUPABASE_KEY} });
        if (!res.ok) throw new Error('HTTP '+res.status);
        const data = await res.json();
        if (!Array.isArray(data) || !data.length) { detailDiv.innerHTML = '<div class="card">帖子不存在</div>'; return; }
        const p = data[0]; const time = p.created_at ? new Date(p.created_at).toLocaleString('zh-CN') : '';
        const display = await getDisplayName(p.author||'未知');
        detailDiv.innerHTML = `<h2>${p.title||'(无标题)'}</h2><div class="meta">${display} · ${time}</div><p style="margin:12px 0;line-height:1.7;">${p.content||''}</p>
            ${isAdmin?`<button class="btn btn-danger btn-sm" onclick="deletePost(${p.id})">删除帖子</button> <button class="btn btn-danger btn-sm" onclick="banUser('${p.author}')">封禁</button>`:''}`;
        loadComments(id);
    } catch (e) { detailDiv.innerHTML = '<div class="card">加载失败：'+e.message+'</div>'; }
}// ===== 回复列表 =====
async function loadComments(postId) {
    const div = document.getElementById('comments-list'); div.innerHTML = '<p>加载中...</p>';
    try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/comments?post_id=eq.'+postId+'&order=created_at.asc', { headers:{'apikey':SUPABASE_KEY} });
        if (!res.ok) throw new Error('HTTP '+res.status);
        const data = await res.json();
        if (!Array.isArray(data) || !data.length) { div.innerHTML = '<p>暂无回复</p>'; return; }
        div.innerHTML = await Promise.all(data.map(async c => {
            const display = await getDisplayName(c.author||'匿名');
            return `<div class="comment-item"><span class="author">${display}</span>：${c.content||''} ${isAdmin?`<button class="btn btn-danger btn-sm" onclick="deleteComment(${c.id})">删除</button>`:''}</div>`;
        })).then(arr => arr.join(''));
    } catch (e) { div.innerHTML = '<p>加载失败：'+e.message+'</p>'; }
}

// ===== 发表回复 =====
async function addComment() {
    if (await isBannedNickname(nickname)) { alert('您已被封禁，无法回复'); return; }
    const content = document.getElementById('comment-content').value.trim();
    if (!content || !currentPostId) return;
    try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/comments', { method:'POST', headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Prefer':'return=minimal'}, body:JSON.stringify({post_id:currentPostId,content,author:nickname}) });
        if (!res.ok) throw new Error('HTTP '+res.status);
        document.getElementById('comment-content').value = ''; loadComments(currentPostId);
    } catch (e) { alert('回复失败：'+e.message); }
}

// ===== 删除 =====
async function deletePost(id) { if (!isAdmin) return; if (!confirm('删除帖子？')) return; await fetch(SUPABASE_URL+'/rest/v1/posts?id=eq.'+id,{method:'DELETE',headers:{'apikey':SUPABASE_KEY}}); backToCategories(); loadPosts(); }
async function deleteComment(id) { if (!isAdmin) return; if (!confirm('删除回复？')) return; await fetch(SUPABASE_URL+'/rest/v1/comments?id=eq.'+id,{method:'DELETE',headers:{'apikey':SUPABASE_KEY}}); loadComments(currentPostId); }// ===== 封禁（基于昵称） =====
async function isBannedNickname(name) {
    try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/banned_users?nickname=eq.' + encodeURIComponent(name) + '&select=*', { headers:{'apikey':SUPABASE_KEY} });
        const data = await res.json();
        return Array.isArray(data) && data.length > 0;
    } catch (e) { return false; }
}
async function banUser(targetNickname) {
    if (!isAdmin) return;
    const reason = prompt('封禁原因：','违规'); if (!reason) return;
    try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/banned_users', { method:'POST', headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY}, body:JSON.stringify({nickname:targetNickname, reason}) });
        if (res.ok) { alert('已封禁'); backToCategories(); loadPosts(); }
        else alert('封禁失败');
    } catch (e) { alert('网络错误'); }
}
async function unbanUser(id) { if (!isAdmin) return; if (!confirm('解禁？')) return; await fetch(SUPABASE_URL+'/rest/v1/banned_users?id=eq.'+id,{method:'DELETE',headers:{'apikey':SUPABASE_KEY}}); alert('已解禁'); showBannedList(); }
async function showBannedList() {
    const res = await fetch(SUPABASE_URL + '/rest/v1/banned_users?select=*&order=created_at.desc', { headers:{'apikey':SUPABASE_KEY} });
    const data = await res.json();
    if (!Array.isArray(data) || !data.length) { alert('名单为空'); return; }
    let h = '<h3>封禁名单</h3>';
    data.forEach(u => h += `<div class="card" style="display:flex;justify-content:space-between;"><div><strong>${u.nickname||''}</strong><br><small>原因：${u.reason||''}</small></div><button class="btn btn-success btn-sm" onclick="unbanUser(${u.id})">解禁</button></div>`);
    openDrawer(h);
}
function openDrawer(html) { document.getElementById('drawer-content').innerHTML = html; document.getElementById('drawer-overlay').classList.remove('hidden'); document.getElementById('drawer-panel').classList.remove('hidden'); }
function closeDrawer() { document.getElementById('drawer-overlay').classList.add('hidden'); document.getElementById('drawer-panel').classList.add('hidden'); }// ===== 消息提醒 =====
async function loadMessages() {
    const div = document.getElementById('message-list'); div.innerHTML = '<p>加载中...</p>';
    try {
        const resPosts = await fetch(SUPABASE_URL + '/rest/v1/posts?select=id&author=eq.' + encodeURIComponent(nickname), { headers:{'apikey':SUPABASE_KEY} });
        const myPosts = await resPosts.json();
        if (!Array.isArray(myPosts) || !myPosts.length) { div.innerHTML = '<p>暂无新消息</p>'; return; }
        const postIds = myPosts.map(p => p.id);
        const resReplies = await fetch(SUPABASE_URL + '/rest/v1/comments?select=*&post_id=in.(' + postIds.join(',') + ')&author=neq.' + encodeURIComponent(nickname) + '&order=created_at.desc&limit=30', { headers:{'apikey':SUPABASE_KEY} });
        const replies = await resReplies.json();
        if (!Array.isArray(replies) || !replies.length) { div.innerHTML = '<p>暂无新消息</p>'; return; }
        div.innerHTML = await Promise.all(replies.map(async r => {
            const postRes = await fetch(SUPABASE_URL + '/rest/v1/posts?id=eq.' + r.post_id + '&select=title', { headers:{'apikey':SUPABASE_KEY} });
            const postData = await postRes.json();
            const postTitle = (Array.isArray(postData) && postData.length) ? postData[0].title : '(无标题)';
            const display = await getDisplayName(r.author||'匿名');
            const time = r.created_at ? new Date(r.created_at).toLocaleString('zh-CN') : '';
            return `<div class="card" onclick="openPostFromMsg(${r.post_id})"><div class="desc">${display} 回复了你的帖子「${postTitle}」</div><div class="meta">${time}</div></div>`;
        })).then(arr => arr.join(''));
    } catch (e) { div.innerHTML = '<p>加载失败：'+e.message+'</p>'; }
}
function openPostFromMsg(postId) { showTab('forum'); openCategory(null, ''); openPost(postId); }// ===== 个人中心 =====
function renderProfile() {
    document.getElementById('profile-nickname').textContent = nickname;
    document.getElementById('profile-badge').innerHTML = isAdmin ? '<span class="admin-badge">管理员</span>' : '普通用户';
    document.getElementById('admin-panel').classList.toggle('hidden', !isAdmin);
}

async function adminRename() {
    if (!isAdmin) return;
    const oldName = document.getElementById('admin-rename-old').value.trim();
    const newName = document.getElementById('admin-rename-new').value.trim();
    if (!oldName || !newName) return alert('请填写完整');
    // 更新 posts 表
    await fetch(SUPABASE_URL + '/rest/v1/posts?author=eq.' + encodeURIComponent(oldName), {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ author: newName })
    });
    // 更新 comments 表
    await fetch(SUPABASE_URL + '/rest/v1/comments?author=eq.' + encodeURIComponent(oldName), {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ author: newName })
    });
    if (oldName === nickname) { nickname = newName; localStorage.setItem('custom_nickname', newName); }
    alert('昵称已修改'); renderProfile(); backToCategories(); loadPosts();
}

async function adminRenameCategory() {
    if (!isAdmin) return;
    const oldName = document.getElementById('admin-category-old').value.trim();
    const newName = document.getElementById('admin-category-new').value.trim();
    if (!oldName || !newName) return alert('请填写完整');
    const res = await fetch(SUPABASE_URL + '/rest/v1/categories?name=eq.' + encodeURIComponent(oldName), { headers: { 'apikey': SUPABASE_KEY } });
    const data = await res.json();
    if (!Array.isArray(data) || !data.length) return alert('找不到该板块');
    await fetch(SUPABASE_URL + '/rest/v1/categories?id=eq.' + data[0].id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ name: newName })
    });
    alert('板块名已更新'); loadCategories();
}    // ===== 初始化 =====
    showTab('home');
</script>
