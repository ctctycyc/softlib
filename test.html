<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>后端连接测试</title>
    <style>
        body { font-family: system-ui; padding: 20px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: #3390ec; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>后端修复测试</h2>
    <input id="email" type="email" placeholder="邮箱">
    <input id="password" type="password" placeholder="密码">
    <button onclick="test()">验证并测试发送</button>
    <script>
        async function test() {
            // 1. 强制清除旧 Token
            localStorage.clear();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            // 2. 重新登录获取新 Token
            try {
                const loginRes = await fetch('https://rgekpmuujozhkkctpdup.supabase.co/auth/v1/token?grant_type=password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': 'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr' },
                    body: JSON.stringify({ email, password })
                });
                const loginData = await loginRes.json();
                
                if (!loginData.access_token) {
                    alert('登录失败：' + (loginData.error_description || '邮箱或密码错误'));
                    return;
                }
                
                // 3. 保存新 Token
                localStorage.setItem('authToken', loginData.access_token);
                localStorage.setItem('authEmail', email);
                
                // 4. 用新 Token 发送测试消息
                const sendRes = await fetch('https://rgekpmuujozhkkctpdup.supabase.co/rest/v1/chat_messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': 'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr',
                        'Authorization': 'Bearer ' + loginData.access_token
                    },
                    body: JSON.stringify({ email: email, message: '后端修复测试 ' + new Date().toLocaleTimeString() })
                });
                
                if (sendRes.ok) {
                    alert('成功！后端完全正常。\n\n问题出在前端代码，请把我发给您的最终版 chat.html 重新部署一次。');
                } else {
                    alert('发送失败，状态码：' + sendRes.status + '\n\n请截图这个提示发给我。');
                }
            } catch (e) {
                alert('网络错误，请检查连接');
            }
        }
    </script>
</body>
</html>
