<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>极简登录测试</title>
</head>
<body>
    <h2>登录测试</h2>
    <input id="email" type="email" placeholder="邮箱"><br>
    <input id="password" type="password" placeholder="密码"><br>
    <button onclick="login()">登录</button>
    <p id="msg"></p>

    <script>
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const msg = document.getElementById('msg');
            if (!email || !password) { msg.textContent = '请输入邮箱和密码'; return; }
            msg.textContent = '正在登录...';
            try {
                const res = await fetch('https://rgekpmuujozhkkctpdup.supabase.co/auth/v1/token?grant_type=password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': 'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.access_token) {
                    msg.textContent = '登录成功！Supabase 和账号正常。问题在前端代码冲突。';
                    localStorage.setItem('authToken', data.access_token);
                    localStorage.setItem('authEmail', email);
                } else {
                    msg.textContent = '登录失败：' + (data.error_description || '邮箱或密码错误');
                }
            } catch (e) {
                msg.textContent = '网络错误，请检查连接';
            }
        }
    </script>
</body>
</html>
