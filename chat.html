<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天室</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #f4f6f9; margin: 20px; }
    #chat-box { background: white; border-radius: 10px; padding: 10px; height: 250px; overflow-y: auto; margin-bottom: 10px; }
    .msg { margin-bottom: 5px; }
    input { width: calc(100% - 80px); padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 8px 16px; background: #3b6ff5; color: white; border: none; border-radius: 6px; }
    #refresh-btn { margin-left: 5px; background: #888; }
    .hidden { display: none; }
    #admin-panel { margin-top: 10px; border: 1px dashed #ccc; padding: 10px; }
    #admin-panel input { width: calc(50% - 10px); margin-right: 5px; }
  </style>
</head>
<body>
  <h2 id="chat-title">聊天室</h2>
  <a href="./">← 返回</a>
  <div id="chat-box"></div>
  <input id="msg" placeholder="输入消息..."><button id="send">发送</button><button id="refresh-btn">刷新</button>
  <div id="error" style="color:red; margin-top:5px;"></div><div id="admin-panel" class="hidden">
  <p>管理员密码: <input id="admin-pass" type="password" placeholder="输入密码"></p>
  <button id="verify-btn">验证</button>
  <div id="admin-content" class="hidden">
    <p>用户邮箱: <input id="target-email"><br>头衔: <input id="new-title">
    <button id="set-title-btn">设置头衔</button>
    <button id="clear-title-btn" style="background:#e74c3c;">清除头衔</button></p>
    <p>禁言邮箱: <input id="mute-email">
    <button id="mute-btn">禁言</button>
    <button id="unmute-btn" style="background:#2ecc71;">解禁</button></p>
    <div id="admin-error" style="color:red;"></div>
    <p><strong>已有头衔:</strong> <span id="title-list"></span></p>
  </div>
  </div><script>
  // 获取邮箱：URL参数 > Cookie > localStorage
  function getEmail() {
    var query = window.location.search.substring(1);
    var params = query.split('&');
    for (var i = 0; i < params.length; i++) {
      var pair = params[i].split('=');
      if (pair[0] === 'email') return decodeURIComponent(pair[1]);
    }
    var cookie = document.cookie.match(/(?:^|;\s*)chat_email=([^;]*)/);
    if (cookie) return decodeURIComponent(cookie[1]);
    return localStorage.getItem('authEmail');
  }

  var email = getEmail();
  if (!email) {
    alert('请先登录');
    window.location.href = './login.html';
  }

  var SUPABASE_URL = 'https://rgekpmuujozhkkctpdup.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr';
  var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  var box = document.getElementById('chat-box');
  var input = document.getElementById('msg');
  var errorDiv = document.getElementById('error');
  var isAdmin = false;
  var titleCache = {};

  // 简易 HTTP 请求（兼容老浏览器）
  function supabaseGet(table, callback) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', SUPABASE_URL + '/rest/v1/' + table + '?select=*', true);
    xhr.setRequestHeader('apikey', SUPABASE_KEY);
    xhr.onload = function() {
      if (xhr.status === 200) {
        callback(null, JSON.parse(xhr.responseText));
      } else {
        callback(xhr.responseText);
      }
    };
    xhr.onerror = function() { callback('网络错误'); };
    xhr.send();
  }

  function supabaseInsert(table, data, callback) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', SUPABASE_URL + '/rest/v1/' + table, true);
    xhr.setRequestHeader('apikey', SUPABASE_KEY);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('Prefer', 'return=minimal');
    xhr.onload = function() {
      if (xhr.status === 201) {
        callback(null);
      } else {
        callback(xhr.responseText);
      }
    };
    xhr.onerror = function() { callback('网络错误'); };
    xhr.send(JSON.stringify(data));
  }

  function supabaseDelete(table, column, value, callback) {
    var xhr = new XMLHttpRequest();
    xhr.open('DELETE', SUPABASE_URL + '/rest/v1/' + table + '?' + column + '=eq.' + encodeURIComponent(value), true);
    xhr.setRequestHeader('apikey', SUPABASE_KEY);
    xhr.onload = function() { callback(null); };
    xhr.onerror = function() { callback('网络错误'); };
    xhr.send();
  }// 加载头衔
function loadTitles(cb) {
  supabaseGet('user_titles', function(err, data) {
    if (!err && data) {
      for (var i = 0; i < data.length; i++) {
        titleCache[data[i].email] = data[i].title;
      }
    }
    if (cb) cb();
  });
}

// 添加消息到界面
function addMsg(e, msg, id) {
  var div = document.createElement('div');
  div.className = 'msg';
  var title = titleCache[e] || '';
  var badge = title ? '[' + title + '] ' : '';
  div.innerHTML = badge + '<b>' + e + ':</b> ' + msg;
  if (isAdmin) {
    var delBtn = document.createElement('button');
    delBtn.textContent = '删除';
    delBtn.style.cssText = 'font-size:12px; margin-left:8px; color:red; background:none; border:none;';
    delBtn.onclick = function() {
      supabaseDelete('chat_messages', 'id', id, function() {
        div.parentNode.removeChild(div);
      });
    };
    div.appendChild(delBtn);
  }
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// 加载历史消息
function loadHistory() {
  supabaseGet('chat_messages', function(err, data) {
    if (err) { errorDiv.textContent = '加载失败'; return; }
    box.innerHTML = '';
    if (data) {
      // 按时间排序
      data.sort(function(a, b) { return new Date(a.created_at) - new Date(b.created_at); });
      for (var i = 0; i < data.length; i++) {
        addMsg(data[i].email, data[i].message, data[i].id);
      }
    }
  });
}

// 发送消息
document.getElementById('send').onclick = function() {
  var msg = input.value.trim();
  if (!msg) return;
  // 检查禁言
  supabaseGet('mutes', function(err, data) {
    if (!err && data) {
      var muted = false;
      for (var i = 0; i < data.length; i++) {
        if (data[i].email === email) { muted = true; break; }
      }
      if (muted) {
        errorDiv.textContent = '你已被禁言';
        return;
      }
      supabaseInsert('chat_messages', { email: email, message: msg }, function(err) {
        if (err) { errorDiv.textContent = '发送失败'; }
        else { input.value = ''; loadHistory(); }
      });
    }
  });
};

// 手动刷新
document.getElementById('refresh-btn').onclick = loadHistory;

// 每5秒自动刷新（轮询）
setInterval(loadHistory, 5000);    // 管理员激活：点击标题 5 次
    var clickCount = 0;
    document.getElementById('chat-title').onclick = function() {
      clickCount++;
      if (clickCount >= 5) {
        document.getElementById('admin-panel').classList.remove('hidden');
        clickCount = 0;
      }
      setTimeout(function() { clickCount = 0; }, 2000);
    };

    // 验证密码
    document.getElementById('verify-btn').onclick = function() {
      if (document.getElementById('admin-pass').value === 'zeruan2026') {
        isAdmin = true;
        document.getElementById('admin-content').classList.remove('hidden');
        loadHistory(); // 刷新以显示删除按钮
      }
    };

    // 设置头衔
    document.getElementById('set-title-btn').onclick = function() {
      var e = document.getElementById('target-email').value.trim();
      var t = document.getElementById('new-title').value.trim();
      if (!e || !t) return;
      // 直接用原始 fetch 或 XHR，这里用 supabaseInsert 也可，但表结构需要处理 upsert
      var xhr = new XMLHttpRequest();
      xhr.open('POST', SUPABASE_URL + '/rest/v1/user_titles', true);
      xhr.setRequestHeader('apikey', SUPABASE_KEY);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Prefer', 'resolution=merge-duplicates');
      xhr.onload = function() {
        if (xhr.status === 201 || xhr.status === 409) {
          titleCache[e] = t;
          loadHistory();
        }
      };
      xhr.send(JSON.stringify({ email: e, title: t }));
    };

    // 清除头衔
    document.getElementById('clear-title-btn').onclick = function() {
      var e = document.getElementById('target-email').value.trim();
      if (!e) return;
      supabaseDelete('user_titles', 'email', e, function() {
        delete titleCache[e];
        loadHistory();
      });
    };

    // 禁言
    document.getElementById('mute-btn').onclick = function() {
      var e = document.getElementById('mute-email').value.trim();
      if (e) supabaseInsert('mutes', { email: e }, function() {});
    };

    // 解禁
    document.getElementById('unmute-btn').onclick = function() {
      var e = document.getElementById('mute-email').value.trim();
      if (e) supabaseDelete('mutes', 'email', e, function() {});
    };

    // 启动
    loadTitles(function() {
      loadHistory();
    });
  </script>
</body>
</html>
