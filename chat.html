<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天室</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #f5f5f5; margin: 10px; }
    #chat-box { background: white; border-radius: 8px; padding: 10px; height: 300px; overflow-y: auto; margin-bottom: 10px; }
    .msg { margin-bottom: 5px; border-bottom: 1px solid #eee; padding: 5px 0; }
    input, button { padding: 8px; margin: 5px; border-radius: 6px; border: 1px solid #ccc; }
    button { background: #3b6ff5; color: white; border: none; cursor: pointer; }
    .panel { background: white; padding: 10px; border-radius: 8px; margin: 10px 0; display: none; }
    .admin-panel { background: #fff8dc; padding: 10px; border-radius: 8px; margin: 10px 0; display: none; }
  </style>
</head>
<body>
  <h2 id="chat-title">聊天室</h2>
  <div id="chat-box"></div>
  <input type="text" id="msg" placeholder="输入消息..." style="width:70%;">
  <button onclick="sendMsg()">发送</button>
  <button onclick="loadHistory()">刷新</button>
  <br>
  <button onclick="toggleLoginPanel()">登录/注册</button>
  <div id="login-panel" class="panel">
    <h3>登录/注册</h3>
    <input type="email" id="login-email" placeholder="邮箱"><br>
    <input type="password" id="login-password" placeholder="密码"><br>
    <button onclick="handleAuth()" id="login-btn">登录</button>
    <button onclick="switchMode()">切换到注册</button>
    <div id="login-error" style="color:red;"></div>
  </div>
  <button id="admin-toggle" style="display:none; background:#aaa;" onclick="toggleAdminPanel()">管理</button>
  <div id="admin-panel" class="admin-panel">
    <h3>管理</h3>
    <input type="password" id="admin-key" placeholder="密钥"><button onclick="verifyAdmin()">验证</button>
    <div id="admin-content" style="display:none;">
      <input id="target-email" placeholder="用户邮箱"><input id="new-title" placeholder="头衔">
      <button onclick="setTitle()">设置头衔</button><button onclick="clearTitle()">清除头衔</button>
      <br>
      <input id="mute-email" placeholder="禁言邮箱"><button onclick="muteUser()">禁言</button><button onclick="unmuteUser()">解禁</button>
      <div id="admin-error" style="color:red;"></div>
      <div id="title-list"></div>
    </div>
  </div><script>
  const supabase = window.supabase.createClient(
    'https://rgekpmuujozhkkctpdup.supabase.co',
    'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr'
  );

  let isRegister = false;
  let currentEmail = localStorage.getItem('authEmail');
  let titleCache = {};

  // 获取邮箱
  function getEmail() {
    const p = new URLSearchParams(location.search);
    if (p.get('email')) return p.get('email');
    return localStorage.getItem('authEmail');
  }

  // 登录/注册面板
  function toggleLoginPanel() {
    const p = document.getElementById('login-panel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
  }

  function switchMode() {
    isRegister = !isRegister;
    document.getElementById('login-btn').textContent = isRegister ? '注册' : '登录';
    document.querySelector('#login-panel h3').textContent = isRegister ? '注册' : '登录';
  }

  async function handleAuth() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value.trim();
    const err = document.getElementById('login-error');
    if (!email || !password) { err.textContent = '请输入邮箱和密码'; return; }
    try {
      if (isRegister) {
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) throw error;
        err.textContent = '注册成功，请查看邮箱验证（如果开启）。';
      } else {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        localStorage.setItem('authEmail', email);
        currentEmail = email;
        document.getElementById('login-panel').style.display = 'none';
        err.textContent = '';
        alert('登录成功');
      }
    } catch (e) {
      err.textContent = e.message;
    }
  }

  // 加载头衔
  async function loadTitles() {
    const { data } = await supabase.from('user_titles').select('*');
    if (data) data.forEach(r => titleCache[r.email] = r.title);
  }

  // 加载历史消息
  async function loadHistory() {
    const { data } = await supabase.from('chat_messages').select('*').order('created_at', { ascending: true }).limit(50);
    const box = document.getElementById('chat-box');
    box.innerHTML = '';
    if (data) data.forEach(m => {
      const div = document.createElement('div');
      div.className = 'msg';
      const title = titleCache[m.email] ? '[' + titleCache[m.email] + '] ' : '';
      div.textContent = title + m.email + ': ' + m.message;
      box.appendChild(div);
    });
  }

  // 发送消息
  async function sendMsg() {
    const msg = document.getElementById('msg').value.trim();
    if (!msg) return;
    const email = getEmail();
    if (!email) { alert('请先登录'); return; }
    const { error } = await supabase.from('chat_messages').insert({ email, message: msg });
    if (error) alert('发送失败: ' + error.message);
    else { document.getElementById('msg').value = ''; loadHistory(); }
  }

  // 定时刷新
  setInterval(loadHistory, 5000);

  // 管理员
  let clickCount = 0;
  document.getElementById('chat-title').onclick = () => {
    clickCount++;
    if (clickCount >= 5) { document.getElementById('admin-toggle').style.display = 'inline-block'; clickCount = 0; }
    setTimeout(() => clickCount = 0, 2000);
  };

  function toggleAdminPanel() {
    const p = document.getElementById('admin-panel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
  }

  function verifyAdmin() {
    if (document.getElementById('admin-key').value === 'zeruan2026') {
      document.getElementById('admin-content').style.display = 'block';
      loadTitleList();
    } else alert('密钥错误');
  }

  async function setTitle() {
    const e = document.getElementById('target-email').value.trim();
    const t = document.getElementById('new-title').value.trim();
    if (e && t) { await supabase.from('user_titles').upsert({ email: e, title: t }); titleCache[e] = t; loadHistory(); loadTitleList(); }
  }

  async function clearTitle() {
    const e = document.getElementById('target-email').value.trim();
    if (e) { await supabase.from('user_titles').delete().eq('email', e); delete titleCache[e]; loadHistory(); loadTitleList(); }
  }

  async function muteUser() {
    const e = document.getElementById('mute-email').value.trim();
    if (e) await supabase.from('mutes').upsert({ email: e });
  }

  async function unmuteUser() {
    const e = document.getElementById('mute-email').value.trim();
    if (e) await supabase.from('mutes').delete().eq('email', e);
  }

  async function loadTitleList() {
    const { data } = await supabase.from('user_titles').select('*');
    const div = document.getElementById('title-list');
    div.innerHTML = data && data.length ? data.map(r => r.email + ' - ' + r.title).join('<br>') : '暂无头衔';
  }    // 初始化
    loadTitles().then(() => loadHistory());
  </script>
</body>
</html>
