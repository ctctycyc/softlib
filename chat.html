<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Lite 聊天室</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #e8ecef; --card: #ffffff; --text: #222; --sub: #707579; --border: #d0d5da;
            --accent: #3390ec; --bubble-self: #3390ec; --bubble-other: #fff;
            --msg-self-text: #fff; --msg-other-text: #222;
        }
        [data-theme="dark"] {
            --bg: #1a1d21; --card: #24272c; --text: #e8eaed; --sub: #9aa0a6; --border: #3c4043;
            --accent: #5b9bd5; --bubble-self: #5b9bd5; --bubble-other: #2d3136;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        .top-bar { background: var(--card); padding: 10px 15px; display: flex; gap: 10px; border-bottom: 1px solid var(--border); }
        .top-bar h2 { flex: 1; font-size: 1.2rem; cursor: pointer; }
        .icon-btn { background: none; border: none; font-size: 1.2rem; color: var(--sub); cursor: pointer; }
        .message-list { flex: 1; overflow-y: auto; padding: 10px 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg-row { display: flex; gap: 8px; max-width: 80%; }
        .msg-row.self { align-self: flex-end; flex-direction: row-reverse; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; }
        .bubble { padding: 8px 14px; border-radius: 12px; background: var(--bubble-other); border: 1px solid var(--border); }
        .self .bubble { background: var(--accent); color: white; }
        .input-area { padding: 10px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; }
        .input-area textarea { flex: 1; border: 1px solid var(--border); border-radius: 20px; padding: 8px 14px; resize: none; background: var(--bg); color: var(--text); }
        .send-btn { background: var(--accent); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 1rem; cursor: pointer; }
        .hidden { display: none !important; }
        #login-overlay { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 100%; max-width: 400px; padding: 30px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        .login-btn { width: 100%; padding: 12px; background: #3390ec; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
   .drawer { position: fixed; right: -320px; top: 0; height: 100%; width: 300px; background: var(--card); box-shadow: -2px 0 6px rgba(0,0,0,0.1); transition: right 0.25s ease; z-index: 100; padding: 18px; overflow-y: auto; border-left: 1px solid var(--border); }
.drawer.open { right: 0; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 99; display: none; }
.overlay.show { display: block; }
.group-item { padding: 10px; border-radius: 8px; margin-bottom: 4px; cursor: pointer; }
.group-item:hover { background: var(--border); }
.group-item.active { background: var(--accent); color: white; }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="text-align:center; margin-bottom:20px;">Telegram Lite</h2>
            <input id="login-email" type="email" placeholder="邮箱">
            <input id="login-password" type="password" placeholder="密码">
            <button class="login-btn" id="login-btn">登录</button>
            <p id="login-error" style="color:red; text-align:center; margin-top:10px;"></p>
        </div>
    </div>

    <!-- 主聊天界面 -->
    <div id="app-main" class="hidden" style="display:flex; flex-direction:column; height:100vh;">
        <div class="top-bar">
            <h2 id="chat-title">公共大厅</h2>
            <button class="icon-btn" id="refresh-btn"><i class="fas fa-sync-alt"></i></button>
            <button class="icon-btn" id="theme-btn"><i class="fas fa-moon"></i></button>
        </div>
        <div class="message-list" id="chat-box"></div>
        <div class="input-area">
            <textarea id="msg" placeholder="输入消息..." rows="1"></textarea>
            <button class="send-btn" id="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
        <div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div id="drawer" class="drawer">
    <button class="icon-btn" style="float:right;" onclick="closeDrawer()"><i class="fas fa-times"></i></button>
    <div id="drawer-content"></div>
</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rgekpmuujozhkkctpdup.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr';
        let currentUserEmail = '';

        // 登录逻辑（最简版，绝对可靠）
        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            const err = document.getElementById('login-error');
            if (!email || !password) { err.textContent = '请输入邮箱和密码'; return; }
            err.textContent = '正在登录...';
            try {
                const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
             method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.access_token) {
                    localStorage.setItem('authToken', data.access_token);
                    localStorage.setItem('authEmail', email);
                    currentUserEmail = email;
                    document.getElementById('login-overlay').classList.add('hidden');
                    document.getElementById('app-main').classList.remove('hidden');
                    loadHistory();
                } else {
                    err.textContent = data.error_description || '邮箱或密码错误';
                }
            } catch (e) { err.textContent = '网络错误'; }
        });      // 加载消息
        async function loadHistory() {
            const res = await fetch(SUPABASE_URL + '/rest/v1/chat_messages?select=*&order=created_at.asc&limit=50', {
                headers: { 'apikey': SUPABASE_KEY }
            });
            const msgs = await res.json();
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            if (Array.isArray(msgs)) {
                msgs.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'msg-row ' + (m.email === currentUserEmail ? 'self' : 'other');
                    div.innerHTML = `<div class="avatar">${m.email[0].toUpperCase()}</div><div class="bubble">${m.message}</div>`;
                    box.appendChild(div);
                });
            }
            box.scrollTop = box.scrollHeight;
        }

        // 发送消息（增强版）
document.getElementById('send-btn').addEventListener('click', async () => {
    const msg = document.getElementById('msg').value.trim();
    if (!msg) return;
    if (!currentUserEmail) {
        alert('登录状态丢失，请刷新页面重新登录');
        return;
    }
    try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/chat_messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
            body: JSON.stringify({ email: currentUserEmail, message: msg })
        });
        if (res.ok) {
            document.getElementById('msg').value = '';
            // 重新加载消息列表
            await loadHistory();
        } else {
            const err = await res.json();
            alert('发送失败：' + (err.message || '未知错误'));
        }
    } catch (e) {
        alert('网络错误，请检查连接');
    }
});
        // 回车发送
        document.getElementById('msg').addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); document.getElementById('send-btn').click(); }
        });

        // 主题切换
        const themeBtn = document.getElementById('theme-btn');
        themeBtn.addEventListener('click', () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });

        // 刷新按钮
        document.getElementById('refresh-btn').addEventListener('click', loadHistory);

        // 自动登录
        if (localStorage.getItem('authToken')) {
            currentUserEmail = localStorage.getItem('authEmail');
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('app-main').classList.remove('hidden');
            loadHistory();
        }
    
        // ========== 群组功能（抽屉版）==========
let currentGroupId = null;
let groups = [];

function openDrawer(html) { document.getElementById('drawer-content').innerHTML = html; document.getElementById('drawer').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

async function loadGroups() {
    const res = await fetch(SUPABASE_URL + '/rest/v1/chat_groups?select=*&order=created_at.asc', { headers: { 'apikey': SUPABASE_KEY } });
    groups = (await res.json()) || [];
}

document.querySelector('.top-bar').insertAdjacentHTML('afterbegin', '<button class="icon-btn" id="group-btn"><i class="fas fa-bars"></i></button>');
document.getElementById('group-btn').addEventListener('click', async () => {
    await loadGroups();
    let html = '<h3>群组列表</h3>';
    groups.forEach(g => {
        html += `<div class="group-item" onclick="switchGroup(${g.id},'${g.name}')">${g.name}</div>`;
    });
    html += '<hr><button class="login-btn" onclick="createGroup()" style="margin-top:8px;">新建群组</button>';
    openDrawer(html);
});

async function switchGroup(id, name) {
    currentGroupId = id;
    document.getElementById('chat-title').textContent = name;
    closeDrawer();
    loadHistory();
}

async function createGroup() {
    const name = prompt('群组名称：');
    if (!name) return;
    const token = localStorage.getItem('authToken');
    await fetch(SUPABASE_URL + '/rest/v1/chat_groups', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ name, owner_email: currentUserEmail })
    });
    closeDrawer();
    alert('创建成功！再次点击群组按钮查看。');
        }
    </script>
</body>
</html>
