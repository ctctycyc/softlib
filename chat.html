<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>聊天室</title>
    <style>
        :root {
            --bg: #e8ecef; --card: #ffffff; --text: #222; --accent: #3390ec;
        }
        [data-theme="dark"] {
            --bg: #1a1d21; --card: #24272c; --text: #e8eaed; --accent: #5b9bd5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        .top-bar { background: var(--card); padding: 10px 15px; border-bottom: 1px solid #ccc; display: flex; gap: 10px; align-items: center; }
        .top-bar h2 { flex: 1; font-size: 1.2rem; }
        .icon-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text); }
        .message-list { flex: 1; overflow-y: auto; padding: 10px 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg-row { display: flex; gap: 8px; max-width: 80%; }
        .msg-row.self { align-self: flex-end; flex-direction: row-reverse; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; }
        .bubble { padding: 8px 14px; border-radius: 12px; background: #fff; border: 1px solid #ddd; }
        .self .bubble { background: var(--accent); color: white; }
        .input-area { padding: 10px; background: var(--card); border-top: 1px solid #ccc; display: flex; gap: 8px; align-items: flex-end; }
        .input-area textarea { flex: 1; border: 1px solid #ccc; border-radius: 20px; padding: 8px 14px; resize: none; background: var(--bg); color: var(--text); min-height: 38px; }
        .send-btn { background: var(--accent); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 1rem; cursor: pointer; }
        .login-box { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
        .login-box div { background: var(--card); padding: 30px; border-radius: 12px; width: 300px; text-align: center; }
        .login-box input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; background: var(--bg); color: var(--text); }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 8px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="login-overlay" class="login-box">
        <div>
            <h2>登录</h2>
            <input id="login-email" type="email" placeholder="邮箱">
            <input id="login-password" type="password" placeholder="密码">
            <button onclick="handleLogin()">登录</button>
            <p id="login-error" style="color:red;margin-top:8px;"></p>
        </div>
    </div>

    <div id="app-main" class="hidden">
        <div class="top-bar">
            <h2>聊天室</h2>
            <button class="icon-btn" id="theme-toggle">🌓</button>
        </div>
        <div class="message-list" id="chat-box"></div>
        <div class="input-area">
            <textarea id="msg" placeholder="输入消息..." rows="1"></textarea>
            <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rgekpmuujozhkkctpdup.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr';
        let currentUserEmail = '';

        // 主题
        const themeBtn = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌓';
        themeBtn.onclick = () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            themeBtn.textContent = next === 'dark' ? '☀️' : '🌓';
        };

        // 自动登录
        if (localStorage.getItem('authToken') && localStorage.getItem('authEmail')) {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('app-main').classList.remove('hidden');
            currentUserEmail = localStorage.getItem('authEmail');
            loadHistory();
        }

        // 登录
        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            const err = document.getElementById('login-error');
            if (!email || !password) { err.textContent = '请输入邮箱和密码'; return; }
            err.textContent = '正在登录...';
            try {
                const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.access_token) {
                    localStorage.setItem('authToken', data.access_token);
                    localStorage.setItem('authEmail', email);
                    document.getElementById('login-overlay').classList.add('hidden');
                    document.getElementById('app-main').classList.remove('hidden');
                    currentUserEmail = email;
                    loadHistory();
                } else {
                    err.textContent = data.error_description || '邮箱或密码错误';
                }
            } catch (e) { err.textContent = '网络错误'; }
        }

        // 加载消息
        async function loadHistory() {
    try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/chat_messages?select=*&order=created_at.asc&limit=50', {
            headers: { 'apikey': SUPABASE_KEY }
        });
        const msgs = await res.json();
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        if (Array.isArray(msgs)) {
            msgs.forEach(m => {
                const div = document.createElement('div');
                div.className = 'msg-row ' + (m.email === currentUserEmail ? 'self' : 'other');
                div.innerHTML = `<div class="avatar">${m.email[0].toUpperCase()}</div><div class="bubble">${m.message}</div>`;
                box.appendChild(div);
            });
        }
        box.scrollTop = box.scrollHeight;
    } catch (e) {
        console.error('加载消息失败', e);
    }
        }

        // 发送消息
        async function sendMsg() {
            if (!currentUserEmail) { alert('请先登录'); return; }
            const msg = document.getElementById('msg').value.trim();
            if (!msg) return;
            try {
                const res = await fetch(SUPABASE_URL + '/rest/v1/chat_messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + localStorage.getItem('authToken') },
                    body: JSON.stringify({ email: currentUserEmail, message: msg })
                });
                if (res.ok) {
                    document.getElementById('msg').value = '';
                    loadHistory();
                } else {
                    alert('发送失败，状态码：' + res.status);
                }
            } catch (e) { alert('网络错误'); }
        }

        // 回车发送
        document.getElementById('msg').addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); sendMsg(); }
        });
    </script>
</body>
</html>
