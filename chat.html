<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天室</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #f4f6f9; margin: 20px; }
    #chat-box { background: white; border-radius: 10px; padding: 10px; height: 250px; overflow-y: auto; margin-bottom: 10px; }
    .msg { margin-bottom: 5px; }
    input { width: calc(100% - 80px); padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 8px 16px; background: #3b6ff5; color: white; border: none; border-radius: 6px; }
    #error { color: red; margin-top: 5px; }
  </style>
</head>
<body>
  <h2>聊天室</h2>
  <a href="./">← 返回</a>
  <div id="chat-box"></div>
  <input id="msg" placeholder="输入消息..."><button id="send">发送</button>
  <div id="error"></div>

  <script>
    const supabase = window.supabase.createClient(
      'https://rgekpmuujozhkkctpdup.supabase.co',
      'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr'
    );

    const email = localStorage.getItem('authEmail');
    if (!email) { alert('请先登录'); location.href = './login.html'; }

    const box = document.getElementById('chat-box');
    const input = document.getElementById('msg');
    const sendBtn = document.getElementById('send');
    const errorDiv = document.getElementById('error');

    // 加载历史
    async function load() {
      const { data, error } = await supabase.from('chat_messages').select('*').order('created_at', { ascending: true }).limit(50);
      if (error) { errorDiv.textContent = '加载失败：' + error.message; return; }
      box.innerHTML = '';
      data.forEach(m => addMsg(m.email, m.message));
    }

    function addMsg(e, m) {
      const div = document.createElement('div');
      div.className = 'msg';
      div.textContent = e + ': ' + m;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    // 发送
    sendBtn.onclick = async () => {
      const msg = input.value.trim();
      if (!msg) return;
      const { error } = await supabase.from('chat_messages').insert({ email, message: msg });
      if (error) {
        errorDiv.textContent = '发送失败：' + error.message;
      } else {
        input.value = '';
        errorDiv.textContent = '';
      }
    };

    // 实时接收
    supabase.channel('chat-room')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, payload => {
        addMsg(payload.new.email, payload.new.message);
      })
      .subscribe();

    load();
  </script>
</body>
</html>
