<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>实时聊天室</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f0f2f5; --card: #fff; --text: #222; --accent: #3390ec; }
        [data-theme="dark"] { --bg: #1a1d21; --card: #24272c; --text: #e8eaed; --accent: #5b9bd5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        .top-bar { background: var(--card); padding: 10px 15px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
        .message-list { flex: 1; overflow-y: auto; padding: 10px 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { display: flex; gap: 8px; }
        .msg.own { flex-direction: row-reverse; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; flex-shrink: 0; }
        .bubble { padding: 8px 14px; border-radius: 12px; background: #fff; border: 1px solid #ddd; max-width: 75%; word-break: break-word; }
        .own .bubble { background: var(--accent); color: white; }
        .input-area { padding: 10px; background: var(--card); border-top: 1px solid #ccc; display: flex; gap: 8px; align-items: flex-end; }
        .input-area textarea { flex: 1; border: 1px solid #ccc; border-radius: 20px; padding: 8px 14px; resize: none; background: var(--bg); color: var(--text); min-height: 38px; }
        .input-area button { background: var(--accent); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="top-bar">
        <h2>实时聊天室</h2>
        <div>
            <button class="icon-btn" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
        </div>
    </div>
    <div class="message-list" id="messages"></div>
    <div class="input-area">
        <textarea id="msgInput" placeholder="输入消息..." rows="1"></textarea>
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div><script>
    // 初始化 Supabase
    const SUPABASE_URL = 'https://rgekpmuujozhkkctpdup.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let myEmail = '';

    // 自动以游客身份登录（使用匿名邮箱）
    async function signInAnonymously() {
        const { data, error } = await supabase.auth.signInWithPassword({
            email: 'guest@guest.com',
            password: 'guest123'
        });
        if (error) {
            // 如果游客账号不存在，就注册一个
            await supabase.auth.signUp({
                email: 'guest@guest.com',
                password: 'guest123'
            });
            return signInAnonymously();
        }
        myEmail = data.user.email;
    }

    // 发送消息
    async function sendMessage() {
        const msg = document.getElementById('msgInput').value.trim();
        if (!msg) return;

        const { error } = await supabase
            .from('chat_messages')
            .insert([{ email: myEmail, message: msg }]);

        if (!error) {
            document.getElementById('msgInput').value = '';
        }
    }

    // 监听新消息（实时推送）
    function subscribeToMessages() {
        supabase
            .channel('public-chat')
            .on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'chat_messages'
            }, (payload) => {
                const msg = payload.new;
                const container = document.getElementById('messages');
                const div = document.createElement('div');
                div.className = 'msg ' + (msg.email === myEmail ? 'own' : '');
                div.innerHTML = `
                    <div class="avatar">${msg.email[0].toUpperCase()}</div>
                    <div class="bubble">${msg.message}</div>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            })
            .subscribe();
    }        // 主题切换
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        // 回车发送
        document.getElementById('msgInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
        });

        // 启动
        (async () => {
            await signInAnonymously();
            subscribeToMessages();
            // 加载历史消息
            const { data } = await supabase
                .from('chat_messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(50);
            if (data) {
                data.forEach(msg => {
                    const container = document.getElementById('messages');
                    const div = document.createElement('div');
                    div.className = 'msg ' + (msg.email === myEmail ? 'own' : '');
                    div.innerHTML = `
                        <div class="avatar">${msg.email[0].toUpperCase()}</div>
                        <div class="bubble">${msg.message}</div>
                    `;
                    container.appendChild(div);
                });
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
        })();
    </script>
</body>
</html>
