<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天室 - 软件库</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #f4f6f9; margin: 20px; }
    #chat-box { background: white; border-radius: 10px; padding: 10px; height: 250px; overflow-y: auto; margin-bottom: 10px; }
    .msg { margin-bottom: 5px; }
    .title-badge { background: #f0a500; color: white; border-radius: 4px; padding: 0 4px; font-size: 12px; margin-right: 4px; }
    input { width: calc(100% - 80px); padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 8px 16px; background: #3b6ff5; color: white; border: none; border-radius: 6px; }
    #error { color: red; margin-top: 5px; }
    .admin-panel { margin-top: 15px; border: 1px dashed #ccc; padding: 10px; border-radius: 8px; display: none; }
    .admin-panel input { width: calc(50% - 10px); margin-right: 5px; }
    /* 登录面板样式 */
    #login-panel { margin-top: 10px; border: 1px dashed #ccc; padding: 10px; border-radius: 8px; display: none; }
    #login-panel input { width: calc(100% - 20px); padding: 8px; margin-bottom: 6px; }
    #login-toggle-btn { margin-top: 10px; }
  </style>
</head>
<body>
  <h2 id="chat-title">聊天室</h2>

  <!-- 登录/注册按钮（未登录时显示） -->
  <button id="login-toggle-btn" onclick="toggleLoginPanel()" style="background:#aaa;">登录 / 注册</button>

  <!-- 登录面板 -->
  <div id="login-panel">
    <h3 id="auth-title">登录</h3>
    <input type="email" id="auth-email" placeholder="邮箱">
    <input type="password" id="auth-password" placeholder="密码">
    <div style="margin-top:5px;">
      <button id="auth-submit-btn" onclick="handleAuth()">登录</button>
      <button id="switch-mode-btn" style="background:#aaa;" onclick="switchAuthMode()">没有账号？去注册</button>
    </div>
    <div id="auth-error" style="color:red; margin-top:5px;"></div>
  </div>

  <div id="chat-box"></div>
  <input id="msg" placeholder="输入消息..."><button id="send">发送</button><button id="refresh-btn" style="margin-left:5px; background:#888;">刷新</button>
  <div id="error"></div>

  <!-- 管理面板（点击标题5次出现） -->
  <button id="toggle-admin-btn" style="margin-top:10px; background:#aaa; display:none;">管理头衔</button>
  <div id="admin-panel" class="admin-panel">
    <h3>管理头衔</h3>
    <p>管理员密钥：<input id="admin-key-input" type="password" placeholder="输入密钥"></p>
    <button id="verify-admin-btn">验证</button>
    <div id="admin-content" class="hidden">
      <input id="target-email" placeholder="用户邮箱"><input id="new-title" placeholder="头衔">
      <div style="margin-top:5px;">
        <button id="set-title-btn">设置头衔</button>
        <button id="clear-title-btn" style="background:#e74c3c;">清除头衔</button>
      </div>
      <div style="margin-top:10px;">
        <strong>禁言管理</strong><br>
        <input id="mute-email" placeholder="用户邮箱">
        <button id="mute-btn">禁言</button>
        <button id="unmute-btn" style="background:#2ecc71;">解除禁言</button>
      </div>
      <div id="admin-error" style="color:red; margin-top:5px;"></div>
      <div style="margin-top:10px;">
        <strong>已有头衔：</strong>
        <div id="title-list" style="font-size:13px; margin-top:5px;"></div>
      </div>
    </div>
  </div><script>
  var SUPABASE_URL = 'https://rgekpmuujozhkkctpdup.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr';
  var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 登录模式切换
  var isRegisterMode = false;

  // 获取邮箱（URL > Cookie > localStorage）
  function getEmail() {
    var query = window.location.search.substring(1);
    var params = query.split('&');
    for (var i = 0; i < params.length; i++) {
      var pair = params[i].split('=');
      if (pair[0] === 'email') return decodeURIComponent(pair[1]);
    }
    var cookie = document.cookie.match(/(?:^|;\s*)chat_email=([^;]*)/);
    if (cookie) return decodeURIComponent(cookie[1]);
    return localStorage.getItem('authEmail');
  }

  // 当前登录邮箱（可能为 null）
  var email = getEmail();

  // 登录状态界面控制
  function updateLoginUI() {
    var currentEmail = getEmail();
    var loginToggleBtn = document.getElementById('login-toggle-btn');
    var loginPanel = document.getElementById('login-panel');
    if (currentEmail) {
      // 已登录：隐藏登录按钮和面板，显示邮箱
      loginToggleBtn.textContent = currentEmail + ' (已登录)';
      loginToggleBtn.disabled = true;
      loginPanel.style.display = 'none';
    } else {
      // 未登录：显示登录按钮
      loginToggleBtn.textContent = '登录 / 注册';
      loginToggleBtn.disabled = false;
    }
  }
  updateLoginUI();

  // 切换登录面板显示
  function toggleLoginPanel() {
    var panel = document.getElementById('login-panel');
    if (panel.style.display === 'none' || panel.style.display === '') {
      panel.style.display = 'block';
    } else {
      panel.style.display = 'none';
    }
  }

  // 切换登录/注册模式
  function switchAuthMode() {
    isRegisterMode = !isRegisterMode;
    document.getElementById('auth-title').textContent = isRegisterMode ? '注册' : '登录';
    document.getElementById('auth-submit-btn').textContent = isRegisterMode ? '注册' : '登录';
    document.getElementById('switch-mode-btn').textContent = isRegisterMode ? '已有账号？去登录' : '没有账号？去注册';
    document.getElementById('auth-error').textContent = '';
  }

  // 处理登录/注册
  async function handleAuth() {
    var emailInput = document.getElementById('auth-email').value.trim();
    var passwordInput = document.getElementById('auth-password').value.trim();
    var errorDiv = document.getElementById('auth-error');
    errorDiv.textContent = '';
    if (!emailInput || !passwordInput) {
      errorDiv.textContent = '请输入邮箱和密码';
      return;
    }
    try {
      if (isRegisterMode) {
        var { data, error } = await supabase.auth.signUp({ email: emailInput, password: passwordInput });
        if (error) throw error;
        // 注册成功，自动设置本地存储（如果 Confirm email 关闭，则自动登录）
        // 这里简单处理：调用登录
        var { data: loginData, error: loginError } = await supabase.auth.signInWithPassword({ email: emailInput, password: passwordInput });
        if (loginError) {
          alert('注册成功，请登录');
          return;
        }
        localStorage.setItem('authToken', loginData.session.access_token);
        localStorage.setItem('authEmail', emailInput);
        email = emailInput;
        updateLoginUI();
        toggleLoginPanel();
      } else {
        var { data: loginData2, error: loginError2 } = await supabase.auth.signInWithPassword({ email: emailInput, password: passwordInput });
        if (loginError2) throw loginError2;
        localStorage.setItem('authToken', loginData2.session.access_token);
        localStorage.setItem('authEmail', emailInput);
        email = emailInput;
        updateLoginUI();
        toggleLoginPanel();
      }
    } catch (err) {
      errorDiv.textContent = err.message || '操作失败';
    }
  }

  var box = document.getElementById('chat-box');
  var input = document.getElementById('msg');
  var errorDiv = document.getElementById('error');
  var isAdmin = false;
  var titleCache = {};

  // 加载头衔
  async function loadTitles() {
    var res = await supabase.from('user_titles').select('*');
    if (res.data) res.data.forEach(function(row) { titleCache[row.email] = row.title; });
  }

  // 显示消息
  function addMsg(e, msg, id) {
    var div = document.createElement('div');
    div.className = 'msg';
    var title = titleCache[e] || '';
    var badge = title ? '[' + title + '] ' : '';
    div.innerHTML = badge + '<b>' + e + ':</b> ' + msg;
    if (isAdmin && id) {
      var del = document.createElement('button');
      del.textContent = '删除';
      del.style.cssText = 'font-size:12px; margin-left:8px; color:red; background:none; border:none;';
      del.onclick = async function() {
        var res = await supabase.from('chat_messages').delete().eq('id', id);
        if (!res.error) div.remove();
      };
      div.appendChild(del);
    }
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  // 加载历史消息
  async function loadHistory() {
    var res = await supabase.from('chat_messages').select('*').order('created_at', { ascending: true }).limit(50);
    if (res.error) { errorDiv.textContent = '加载失败'; return; }
    box.innerHTML = '';
    if(res.data) res.data.forEach(function(m) { addMsg(m.email, m.message, m.id); });
    }

    // 发送按钮
    document.getElementById('send').onclick = async function() {
      var msg = input.value.trim();
      if (!msg) return;
      var currentEmail = getEmail();
      if (!currentEmail) {
        alert('请先登录或注册');
        document.getElementById('login-panel').style.display = 'block';
        return;
      }
      var muteCheck = await supabase.from('mutes').select('*').eq('email', currentEmail).maybeSingle();
      if (muteCheck.data) { errorDiv.textContent = '你已被禁言'; return; }
      var res = await supabase.from('chat_messages').insert({ email: currentEmail, message: msg });
if (res.error) {
  errorDiv.textContent = '发送失败：' + res.error.message + ' (代码: ' + res.error.code + ')';
  alert('发送失败：' + res.error.message);
}
else {
  input.value = '';
  loadHistory();
    }
    };

    document.getElementById('refresh-btn').onclick = loadHistory;
    setInterval(loadHistory, 5000);// 管理员激活
var clickCount = 0;
document.getElementById('chat-title').onclick = function() {
  clickCount++;
  if (clickCount >= 5) {
    document.getElementById('toggle-admin-btn').style.display = 'inline-block';
    clickCount = 0;
  }
  setTimeout(function() { clickCount = 0; }, 2000);
};

var toggleAdminBtn = document.getElementById('toggle-admin-btn');
var adminPanel = document.getElementById('admin-panel');
var verifyBtn = document.getElementById('verify-admin-btn');
var adminContent = document.getElementById('admin-content');
var adminError = document.getElementById('admin-error');
var adminVerified = false;

toggleAdminBtn.onclick = function() {
  if (adminPanel.style.display === 'none' || adminPanel.style.display === '') {
    adminPanel.style.display = 'block';
  } else {
    adminPanel.style.display = 'none';
    adminContent.classList.add('hidden');
  }
};

verifyBtn.onclick = function() {
  var key = document.getElementById('admin-key-input').value;
  if (key === 'zeruan2026') {
    adminVerified = true;
    isAdmin = true;
    adminContent.classList.remove('hidden');
    adminError.textContent = '';
    loadTitleList();
    loadHistory();
  } else {
    adminVerified = false;
    isAdmin = false;
    adminError.textContent = '密钥错误';
    adminContent.classList.add('hidden');
    loadHistory();
  }
};// 设置头衔
document.getElementById('set-title-btn').onclick = async function() {
  if (!adminVerified) { alert('请先验证管理员密钥'); return; }
  var e = document.getElementById('target-email').value.trim();
  var t = document.getElementById('new-title').value.trim();
  if (!e || !t) return;
  var res = await supabase.from('user_titles').upsert({ email: e, title: t });
  if (res.error) { adminError.textContent = '设置失败：' + res.error.message; }
  else { adminError.textContent = '头衔设置成功！'; titleCache[e] = t; loadHistory(); loadTitleList(); }
};

// 清除头衔
document.getElementById('clear-title-btn').onclick = async function() {
  if (!adminVerified) { alert('请先验证管理员密钥'); return; }
  var e = document.getElementById('target-email').value.trim();
  if (!e) return;
  var res = await supabase.from('user_titles').delete().eq('email', e);
  if (res.error) { adminError.textContent = '清除失败：' + res.error.message; }
  else { adminError.textContent = '头衔已清除！'; delete titleCache[e]; loadHistory(); loadTitleList(); }
};

// 禁言
document.getElementById('mute-btn').onclick = async function() {
  if (!adminVerified) { alert('请先验证管理员密钥'); return; }
  var e = document.getElementById('mute-email').value.trim();
  if (e) await supabase.from('mutes').upsert({ email: e });
};

// 解禁
document.getElementById('unmute-btn').onclick = async function() {
  if (!adminVerified) { alert('请先验证管理员密钥'); return; }
  var e = document.getElementById('mute-email').value.trim();
  if (e) await supabase.from('mutes').delete().eq('email', e);
};

async function loadTitleList() {
  var res = await supabase.from('user_titles').select('*');
  var listDiv = document.getElementById('title-list');
  if (res.data && res.data.length > 0) {
    var html = '';
    res.data.forEach(function(row) { html += '<div>' + row.email + ' - ' + row.title + '</div>'; });
    listDiv.innerHTML = html;
  } else { listDiv.innerHTML = '暂无头衔'; }
    }    // 初始化
    loadTitles().then(function() {
      loadHistory();
    });
  </script>
</body>
</html>
