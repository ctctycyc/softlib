<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天室</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #f5f5f5; margin: 10px; }
    #chat-box { background: white; border-radius: 8px; padding: 10px; height: 250px; overflow-y: auto; margin-bottom: 10px; }
    .msg { border-bottom: 1px solid #eee; padding: 5px 0; }
    button { margin: 5px; padding: 8px 14px; border-radius: 6px; border: none; background: #3b6ff5; color: white; }
    input { padding: 8px; margin: 5px; border-radius: 6px; border: 1px solid #ccc; }
    .panel { background: white; padding: 10px; border-radius: 8px; margin: 10px 0; display: none; }
  </style>
</head>
<body>
  <h2>聊天室</h2>
  <div id="chat-box"></div>
  <input type="text" id="msg" placeholder="输入消息..."><button onclick="sendMsg()">发送</button>
  <button onclick="loadHistory()">刷新</button>
  <br>
  <button onclick="document.getElementById('login-panel').style.display='block'">登录/注册</button>
  <div id="login-panel" class="panel">
    <h3>登录</h3>
    <input type="email" id="login-email" placeholder="邮箱"><br>
    <input type="password" id="login-password" placeholder="密码"><br>
    <button onclick="handleAuth()">登录</button>
    <button onclick="switchMode()">切换到注册</button>
    <div id="login-error" style="color:red;"></div>
  </div><script>
  const supabase = window.supabase.createClient(
    'https://rgekpmuujozhkkctpdup.supabase.co',
    'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr'
  );

  let isRegister = false;

  function getEmail() {
    const p = new URLSearchParams(location.search);
    if (p.get('email')) return p.get('email');
    return localStorage.getItem('authEmail');
  }

  function switchMode() {
    isRegister = !isRegister;
    document.querySelector('#login-panel h3').textContent = isRegister ? '注册' : '登录';
    document.querySelector('#login-panel button:first-of-type').textContent = isRegister ? '注册' : '登录';
  }

  async function handleAuth() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value.trim();
    const err = document.getElementById('login-error');
    err.textContent = '';
    if (!email || !password) { err.textContent = '请输入邮箱和密码'; return; }
    try {
      if (isRegister) {
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) throw error;
        err.textContent = '注册成功，请查看邮箱验证（如果开启）。';
      } else {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        localStorage.setItem('authEmail', email);
        document.getElementById('login-panel').style.display = 'none';
        alert('登录成功');
      }
    } catch (e) {
      err.textContent = e.message;
      alert('错误: ' + e.message);
    }
  }

  async function loadHistory() {
    const { data } = await supabase.from('chat_messages').select('*').order('created_at', { ascending: true }).limit(50);
    const box = document.getElementById('chat-box');
    box.innerHTML = '';
    if (data) data.forEach(m => {
      const div = document.createElement('div');
      div.className = 'msg';
      div.textContent = m.email + ': ' + m.message;
      box.appendChild(div);
    });
  }

  async function sendMsg() {
    const msg = document.getElementById('msg').value.trim();
    if (!msg) return;
    const email = getEmail();
    if (!email) { alert('请先登录'); return; }
    const { error } = await supabase.from('chat_messages').insert({ email, message: msg });
    if (error) alert('发送失败: ' + error.message);
    else { document.getElementById('msg').value = ''; loadHistory(); }
  }    // 初始化
    loadHistory();
    setInterval(loadHistory, 5000);
  </script>
</body>
</html>
