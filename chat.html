<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>聊天室 · 社区</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #222;
      --sub: #999;
      --bubble-self: #ff5e62;
      --bubble-other: #ffffff;
      --border: #e0e0e0;
      --accent: #ff5e62;
      --radius: 22px;
      --shadow: 0 2px 10px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; height: 100vh; padding: 12px;
    }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px; padding: 0 4px;
    }
    .header h2 { font-size: 20px; font-weight: 700; margin: 0; }
    .chat-wrap {
      flex: 1; overflow-y: auto; display: flex; flex-direction: column;
      gap: 14px; padding: 8px 4px;
    }
    .msg-row {
      display: flex; flex-direction: column; max-width: 82%;
    }
    .msg-row.self { align-self: flex-end; }
    .msg-row.other { align-self: flex-start; }
    .bubble {
      padding: 10px 14px; border-radius: 18px; font-size: 15px;
      line-height: 1.45; word-break: break-word; box-shadow: var(--shadow);
      position: relative;
    }
    .self .bubble {
      background: var(--bubble-self); color: white;
      border-bottom-right-radius: 4px;
    }
    .other .bubble {
      background: var(--bubble-other); border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .meta {
      display: flex; align-items: center; gap: 6px; margin-top: 5px;
      font-size: 12px; color: var(--sub); padding: 0 4px;
    }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%; background: #ccc;
      color: white; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .title-badge {
      background: #f0a500; color: white; border-radius: 10px;
      padding: 0 6px; font-size: 10px; font-weight: 600; line-height: 1.4;
    }
    .input-area {
      display: flex; gap: 6px; margin-top: 10px;
      background: var(--card); padding: 8px 12px; border-radius: 30px;
      box-shadow: var(--shadow); align-items: center;
    }
    .input-area input {
      flex: 1; border: none; outline: none; font-size: 15px;
      background: transparent; padding: 8px 4px;
    }
    .input-area button {
      background: var(--accent); color: white; border: none;
      border-radius: 20px; padding: 8px 18px; font-weight: 600;
      cursor: pointer; font-size: 14px;
    }
    .action-btns {
      display: flex; gap: 8px; margin-top: 6px;
    }
    .action-btns button {
      flex: 1; border: none; border-radius: 14px; padding: 8px;
      font-size: 13px; cursor: pointer; background: #e0e0e0; color: #333;
    }
    .action-btns button.primary { background: var(--accent); color: white; }
    .login-panel {
      margin-top: 8px; background: var(--card); border-radius: 16px;
      padding: 12px; display: none; box-shadow: var(--shadow);
    }
    .login-panel input {
      width: 100%; padding: 8px; margin-bottom: 8px;
      border: 1px solid var(--border); border-radius: 10px;
    }
    .admin-panel {
      margin-top: 8px; background: var(--card); border-radius: 16px;
      padding: 12px; display: none; box-shadow: var(--shadow);
    }
    .admin-panel input {
      width: calc(100% - 16px); padding: 8px; margin-bottom: 8px;
      border: 1px solid var(--border); border-radius: 10px;
    }
  </style>
</head><body>
  <div class="header">
    <h2 id="chat-title">💬 聊天室</h2>
  </div>

  <div class="chat-wrap" id="chat-box"></div>

  <div class="input-area">
    <input id="msg" placeholder="说点什么..." autocomplete="off">
    <button id="send" onclick="sendMessage()">发送</button>
  </div>

  <div class="action-btns">
    <button id="login-toggle-btn" onclick="toggleLogin()">登录 / 注册</button>
    <button id="refresh-btn" onclick="loadHistory()">刷新消息</button>
  </div>

  <!-- 登录/注册面板 -->
  <div class="login-panel" id="login-panel">
    <h4 id="auth-title">登录</h4>
    <input type="email" id="auth-email" placeholder="邮箱">
    <input type="password" id="auth-password" placeholder="密码">
    <div style="display:flex; gap:8px;">
      <button class="primary" id="auth-submit-btn" onclick="handleAuth()">登录</button>
      <button id="switch-mode-btn" onclick="switchAuthMode()">没有账号？去注册</button>
    </div>
    <div id="auth-error" style="color:red; margin-top:6px; font-size:13px;"></div>
  </div>

  <!-- 管理面板（点标题5次出现） -->
  <button id="toggle-admin-btn" class="primary" style="margin-top:8px; display:none;">管理</button>
  <div class="admin-panel" id="admin-panel">
    <h4>管理面板</h4>
    <input id="admin-key-input" type="password" placeholder="管理员密钥">
    <button id="verify-admin-btn" class="primary" onclick="verifyAdmin()">验证</button>
    <div id="admin-content" style="display:none; margin-top:8px;">
      <input id="target-email" placeholder="用户邮箱"><input id="new-title" placeholder="头衔">
      <div style="display:flex; gap:8px; margin-top:6px;">
        <button class="primary" id="set-title-btn" onclick="setTitle()">设置头衔</button>
        <button id="clear-title-btn" onclick="clearTitle()">清除头衔</button>
      </div>
      <input id="mute-email" placeholder="禁言邮箱" style="margin-top:8px;">
      <div style="display:flex; gap:8px; margin-top:6px;">
        <button id="mute-btn" onclick="muteUser()">禁言</button>
        <button id="unmute-btn" onclick="unmuteUser()">解禁</button>
      </div>
      <div id="admin-error" style="color:red; margin-top:6px;"></div>
      <div id="title-list" style="font-size:13px; margin-top:8px;"></div>
    </div>
  </div><script>
  // ========== 配置 ==========
  const SUPABASE_URL = 'https://rgekpmuujozhkkctpdup.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let isRegisterMode = false;
  let isAdmin = false;
  let titleCache = {};
  let currentEmail = null;

  // 获取邮箱
  function getEmail() {
    const p = new URLSearchParams(location.search);
    if (p.get('email')) return p.get('email');
    const c = document.cookie.match(/(?:^|;\s*)chat_email=([^;]*)/);
    if (c) return decodeURIComponent(c[1]);
    return localStorage.getItem('authEmail');
  }

  // 更新登录状态界面
  function updateLoginUI() {
    currentEmail = getEmail();
    const btn = document.getElementById('login-toggle-btn');
    if (currentEmail) {
      btn.textContent = '已登录: ' + currentEmail;
      btn.className = 'primary';
      document.getElementById('login-panel').style.display = 'none';
    } else {
      btn.textContent = '登录 / 注册';
      btn.className = '';
    }
  }
  updateLoginUI();

  // 显示/隐藏登录面板
  function toggleLogin() {
    const p = document.getElementById('login-panel');
    p.style.display = (p.style.display === 'none' || p.style.display === '') ? 'block' : 'none';
  }

  // 切换登录/注册模式
  function switchAuthMode() {
    isRegisterMode = !isRegisterMode;
    document.getElementById('auth-title').textContent = isRegisterMode ? '注册' : '登录';
    document.getElementById('auth-submit-btn').textContent = isRegisterMode ? '注册' : '登录';
    document.getElementById('switch-mode-btn').textContent = isRegisterMode ? '已有账号？去登录' : '没有账号？去注册';
  }

  // 登录/注册处理（兼容邮箱验证）
  async function handleAuth() {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value.trim();
    const errDiv = document.getElementById('auth-error');
    errDiv.textContent = '';
    if (!email || !password) {
      errDiv.textContent = '请输入邮箱和密码';
      return;
    }
    try {
      if (isRegisterMode) {
        // 注册
        const signUpRes = await fetch(SUPABASE_URL + '/auth/v1/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
          body: JSON.stringify({ email, password })
        });
        const signUpData = await signUpRes.json();
        // 注册成功通常没有 access_token，需要邮箱验证
        if (signUpData.identities || signUpData.id) {
          errDiv.textContent = '注册成功！请去邮箱查收验证邮件，然后返回登录。';
        } else {
          throw new Error(signUpData.error_description || signUpData.msg || '注册失败');
        }
      } else {
        // 登录
        const signInRes = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
          body: JSON.stringify({ email, password })
        });
        const signInData = await signInRes.json();
        if (signInData.access_token) {
          localStorage.setItem('authToken', signInData.access_token);
          localStorage.setItem('authEmail', email);
          updateLoginUI();
          document.getElementById('login-panel').style.display = 'none';
          errDiv.textContent = '';
        } else {
          // 未验证邮箱或其他错误
          if (signInData.error === 'Email not confirmed') {
            errDiv.textContent = '邮箱尚未验证，请去邮箱点击验证链接后再登录。';
          } else {
            throw new Error(signInData.error_description || '邮箱或密码错误');
          }
        }
      }
    } catch (e) {
      errDiv.textContent = e.message;
    }
  }// 头像生成
function avatarHTML(email) {
  const letter = email.charAt(0).toUpperCase();
  const colors = ['#FF5E62','#FF8A5C','#F9C74F','#90BE6D','#4D908E','#577590','#F94144','#F8961E'];
  const color = colors[Math.abs(hashCode(email)) % colors.length];
  return `<span class="avatar" style="background:${color};">${letter}</span>`;
}
function hashCode(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = (hash * 31 + str.charCodeAt(i)) & 0x7fffffff;
  return hash;
}

function timeAgo(dateStr) {
  const now = Date.now();
  const then = new Date(dateStr).getTime();
  const diff = Math.floor((now - then) / 1000);
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff/60) + '分钟前';
  if (diff < 86400) return Math.floor(diff/3600) + '小时前';
  return new Date(dateStr).toLocaleDateString('zh-CN');
}

function addMessage(msg) {
  const box = document.getElementById('chat-box');
  const isSelf = currentEmail && msg.email === currentEmail;
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isSelf ? 'self' : 'other');

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = msg.message;

  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.innerHTML = avatarHTML(msg.email);
  const title = titleCache[msg.email] || '';
  if (title) {
    const badge = document.createElement('span');
    badge.className = 'title-badge';
    badge.textContent = title;
    meta.appendChild(badge);
  }
  const nameSpan = document.createElement('span');
  nameSpan.textContent = msg.email;
  meta.appendChild(nameSpan);
  const timeSpan = document.createElement('span');
  timeSpan.textContent = timeAgo(msg.created_at);
  meta.appendChild(timeSpan);

  row.appendChild(bubble);
  row.appendChild(meta);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

async function loadHistory() {
  const { data } = await supabase.from('chat_messages').select('*').order('created_at', { ascending: true }).limit(50);
  document.getElementById('chat-box').innerHTML = '';
  if (data) data.forEach(addMessage);
}

async function loadTitles() {
  const { data } = await supabase.from('user_titles').select('*');
  if (data) data.forEach(r => titleCache[r.email] = r.title);
}

// 发送消息
async function sendMessage() {
  const msg = document.getElementById('msg').value.trim();
  if (!msg) return;
  const email = getEmail();
  if (!email) { alert('请先登录'); return; }
  const mute = await supabase.from('mutes').select('*').eq('email', email).maybeSingle();
  if (mute.data) { alert('你已被禁言'); return; }
  await supabase.from('chat_messages').insert({ email, message: msg });
  document.getElementById('msg').value = '';
  loadHistory();
}

// 定时刷新
setInterval(loadHistory, 5000);    // 管理员激活：点标题5次
    let clickCount = 0;
    document.getElementById('chat-title').onclick = () => {
      clickCount++;
      if (clickCount >= 5) {
        document.getElementById('toggle-admin-btn').style.display = 'block';
        clickCount = 0;
      }
      setTimeout(() => clickCount = 0, 2000);
    };

    document.getElementById('toggle-admin-btn').addEventListener('click', () => {
      const p = document.getElementById('admin-panel');
      p.style.display = (p.style.display === 'none' || p.style.display === '') ? 'block' : 'none';
    });

    function verifyAdmin() {
      if (document.getElementById('admin-key-input').value === 'zeruan2026') {
        isAdmin = true;
        document.getElementById('admin-content').style.display = 'block';
        loadTitleList();
        loadHistory();
      } else {
        alert('密钥错误');
      }
    }

    async function setTitle() {
      const e = document.getElementById('target-email').value.trim();
      const t = document.getElementById('new-title').value.trim();
      if (e && t) {
        await supabase.from('user_titles').upsert({ email: e, title: t });
        titleCache[e] = t;
        loadHistory();
        loadTitleList();
      }
    }

    async function clearTitle() {
      const e = document.getElementById('target-email').value.trim();
      if (e) {
        await supabase.from('user_titles').delete().eq('email', e);
        delete titleCache[e];
        loadHistory();
        loadTitleList();
      }
    }

    async function muteUser() {
      const e = document.getElementById('mute-email').value.trim();
      if (e) await supabase.from('mutes').upsert({ email: e });
    }

    async function unmuteUser() {
      const e = document.getElementById('mute-email').value.trim();
      if (e) await supabase.from('mutes').delete().eq('email', e);
    }

    async function loadTitleList() {
      const { data } = await supabase.from('user_titles').select('*');
      const div = document.getElementById('title-list');
      if (data && data.length) {
        div.innerHTML = data.map(r => `<div>${r.email} - ${r.title}</div>`).join('');
      } else div.textContent = '暂无头衔';
    }

    // 初始化
    loadTitles().then(() => loadHistory());
  </script>
</body>
</html>
