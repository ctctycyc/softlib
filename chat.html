<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天室</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #f4f6f9; margin: 0; padding: 16px; }
    .chat-container { max-width: 500px; margin: auto; }
    .back-link { display: inline-block; margin-bottom: 12px; color: #3b6ff5; text-decoration: none; }
    #chat-box { background: white; border-radius: 12px; padding: 12px; height: 300px; overflow-y: auto; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .msg { margin-bottom: 6px; }
    .msg strong { color: #2c3e50; }
    input { width: calc(100% - 22px); padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    button { width: 100%; padding: 10px; background: #3b6ff5; color: white; border: none; border-radius: 8px; margin-top: 6px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="chat-container">
    <a href="./" class="back-link">← 返回软件库</a>
    <h2>聊天室</h2>
    <div id="chat-box"></div>
    <input type="text" id="msg-input" placeholder="输入消息..." autofocus>
    <button id="send-btn">发送</button>
  </div>

  <script>
    // 初始化 Supabase 客户端
    const supabase = window.supabase.createClient(
      'https://rgekpmuujozhkkctpdup.supabase.co',
      'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr'
    );

    // 检查登录状态
    const email = localStorage.getItem('authEmail');
    if (!email) {
      alert('请先登录后再进入聊天室');
      location.href = './login.html';
    }

    // 加载历史消息
    async function loadHistory() {
      const { data, error } = await supabase
        .from('chat_messages')
        .select('*')
        .order('created_at', { ascending: true })
        .limit(50);
      if (error) {
        alert('加载历史消息失败：' + error.message);
        return;
      }
      const box = document.getElementById('chat-box');
      box.innerHTML = '';
      if (data) data.forEach(m => addMsg(m.email, m.message));
    }

    function addMsg(email, msg) {
      const box = document.getElementById('chat-box');
      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = `<strong>${email}:</strong> ${msg}`;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    // 发送消息（错误直接弹窗）
    async function sendMsg() {
      const input = document.getElementById('msg-input');
      const msg = input.value.trim();
      if (!msg) return;

      const { error } = await supabase
        .from('chat_messages')
        .insert({ email: email, message: msg });

      if (error) {
        alert('发送失败：' + error.message + ' (代码: ' + error.code + ')');
      } else {
        input.value = '';
      }
    }

    // 确保按钮点击绑定成功
    document.getElementById('send-btn').addEventListener('click', sendMsg);

    // 实时接收新消息
    supabase
      .channel('chat-room')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, payload => {
        addMsg(payload.new.email, payload.new.message);
      })
      .subscribe();

    // 初始加载
    loadHistory();
  </script>
</body>
</html>
