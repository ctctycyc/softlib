<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天室登录</title>
    <style>
        body { font-family: system-ui; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; }
        .box { background: #fff; padding: 30px; border-radius: 12px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: #3390ec; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        .error { color: red; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Telegram Lite</h2>
        <input id="email" type="email" placeholder="邮箱">
        <input id="password" type="password" placeholder="密码">
        <button onclick="login()">登录</button>
        <div class="error" id="error"></div>
    </div>
    <script>
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const err = document.getElementById('error');
            if (!email || !password) { err.textContent = '请输入邮箱和密码'; return; }
            err.textContent = '正在登录...';
            try {
                const res = await fetch('https://rgekpmuujozhkkctpdup.supabase.co/auth/v1/token?grant_type=password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': 'sb_publishable_uMbII7ITUT5lddC8ZlAZGQ_sRVTFLBr' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.access_token) {
                    localStorage.setItem('authToken', data.access_token);
                    localStorage.setItem('authEmail', email);
                    window.location.href = 'chat.html';
                } else {
                    err.textContent = data.error_description || '邮箱或密码错误';
                }
            } catch (e) {
                err.textContent = '网络错误';
            }
        }
    </script>
</body>
</html>
